<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>矩阵起盘 SOP · 朱砂操盘台</title>
<link rel="stylesheet" href="/assets/tw.css?v=1" />
<link rel="stylesheet" href="/assets/atelier.css?v=108" />
<style>
  .ph-num{ font-family:Times New Roman,serif; font-size:34px; line-height:1; color:var(--cinnabar); opacity:.9; }
  .tline{ position:relative; padding-left:18px; }
  .tline::before{ content:''; position:absolute; left:5px; top:7px; width:7px; height:7px; border-radius:50%; background:var(--cinnabar); }
  table.mx{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.mx th,table.mx td{ padding:8px 10px; text-align:left; border-top:1px solid var(--line); vertical-align:top; }
  table.mx th{ color:var(--ink-soft); font-weight:600; border-top:none; }
</style>
</head>
<body class="stage grain min-h-screen" data-page="matrix">
<main class="ag-page">
  <div class="mb-6">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">获客 AGENT · 起盘手册</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02">矩阵<span class="italic" style="color:var(--cinnabar)">起盘</span> SOP</h1>
    <p class="mt-2 text-[13px] text-[var(--ink-soft)] max-w-2xl">3 个老号（先养号）+ 1 个店铺卖考研资料，从养号到起号到截流卖货的完整落地路径。<span class="text-[var(--cinnabar-deep)]">⛔ 老号务必先养号，别一上来就发广告。</span></p>
    <div class="flex flex-wrap gap-2 mt-3">
      <a href="/账号矩阵.html" class="btn-go rounded-lg px-4 py-2 text-[12px] font-medium" style="text-decoration:none">→ 去账号矩阵一键铺号</a>
      <a href="/获客计划.html" class="btn-ghost rounded-lg px-4 py-2 text-[12px]" style="text-decoration:none">→ 去获客计划建养号/截流</a>
    </div>
  </div>
  <div id="sop"></div>
  <footer class="mt-12 pt-6 border-t hairline text-[11px] text-[var(--ink-soft)]">
    <span class="font-song">合规红线：不写押题/必过/原题；导流只用"主页群聊/评论区扣设计史"；老号养号期不挂任何链接。</span>
  </footer>
</main>
<script src="/assets/tracks.js?v=25"></script>
<script src="/assets/app.js?v=63"></script>
<script>
(function render(){
  const box=document.getElementById('sop');
  let mx=null,tname=''; try{ let t=getTrack(); if(!(t&&t.matrix)&&window.TRACKS){ for(const id in window.TRACKS){ if(window.TRACKS[id].matrix){ t=window.TRACKS[id]; break; } } } mx=t&&t.matrix; tname=t?t.name:''; }catch(e){}
  if(!mx){ box.innerHTML='<div class="card p-8 text-center text-[13px] text-[var(--ink-soft)]">当前智能体没有配置矩阵预设。切换到「设计考研」智能体查看。</div>'; return; }
  const M=window.mark||(s=>String(s||''));
  let html='';
  // 账号分工
  html+=`<div class="card p-5 mb-5">
    <div class="font-song font-bold text-[15px] mb-3">一、3 个号怎么分工（差异化，避免自己撞自己）</div>
    <div class="overflow-x-auto"><table class="mx"><thead><tr><th style="width:22%">号 · 角色</th><th style="width:34%">主打内容</th><th>核心目标</th></tr></thead><tbody>
    ${mx.accounts.map(a=>`<tr><td><b style="color:var(--cinnabar-deep)">${M(a.role)}</b><div class="text-[11px] text-[var(--ink-soft)] mt-0.5">${M(a.nick)}</div></td><td>${M(a.focus)}</td><td>${M(a.goal)}</td></tr>`).join('')}
    </tbody></table></div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-3">🛒 店铺：${M(mx.shop||'')}</div>
  </div>`;
  // 阶段
  html+=`<div class="font-song font-bold text-[15px] mb-3">二、分三阶段起盘（老号先养号）</div>`;
  html+=(mx.phases||[]).map((p,i)=>`<div class="card p-5 mb-4">
    <div class="flex items-start gap-4">
      <div class="ph-num">${i+1}</div>
      <div class="flex-1">
        <div class="flex items-baseline gap-2 flex-wrap"><div class="font-song font-bold text-[15px]">${M(p.name)}</div><span class="text-[11px] px-2 py-0.5 rounded-full" style="background:rgba(255,36,66,.1);color:var(--cinnabar-deep)">${M(p.span)}</span></div>
        <div class="text-[12.5px] text-[var(--ink-soft)] mt-1 mb-2.5">🎯 ${M(p.goal)}</div>
        <div class="space-y-1.5">${(p.todo||[]).map(t=>`<div class="tline text-[13px] leading-snug">${M(t)}</div>`).join('')}</div>
      </div>
    </div></div>`).join('');
  // 发布节奏 + 截流词
  html+=`<div class="grid sm:grid-cols-2 gap-4 mb-5">
    <div class="card p-5">
      <div class="font-song font-bold text-[15px] mb-3">三、每日发布节奏</div>
      <div class="space-y-2">${(mx.cadence||[]).map(c=>`<div class="flex items-center gap-3 out p-2.5 rounded-lg"><b style="color:var(--cinnabar-deep);min-width:52px">${M(c.time)}</b><span class="text-[13px]">${M(c.type)}</span><span class="text-[11px] text-[var(--ink-soft)] ml-auto">${M(c.note)}</span></div>`).join('')}</div>
      <div class="text-[11px] text-[var(--ink-soft)] mt-2.5">每号每天 1–3 条，主号爆款换口诀换封面后一稿多发到其它号。</div>
    </div>
    <div class="card p-5">
      <div class="font-song font-bold text-[15px] mb-3">四、截流关键词</div>
      <div class="flex flex-wrap gap-2">${(mx.interceptKeywords||[]).map(k=>`<span class="text-[12px] px-2.5 py-1 rounded-full" style="background:var(--paper-2);border:1px solid var(--line)">${M(k)}</span>`).join('')}</div>
      <div class="text-[11px] text-[var(--ink-soft)] mt-3">养号满 ${(mx.nurture&&mx.nurture.days)||7} 天后，在「获客计划」用这些词建<b>搜索截流</b>，去同行评论区收集潜客（保守、出验证即停）。</div>
    </div>
  </div>`;
  box.innerHTML=html;
})();
</script>
</body>
</html>
