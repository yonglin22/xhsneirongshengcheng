<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>合规自检 · 第八步 · 赛道智能体操盘台</title>
<link rel="stylesheet" href="/assets/tw.css?v=1" />
<link rel="stylesheet" href="/assets/atelier.css?v=43" />
</head>
<body class="stage grain min-h-screen" data-page="compliance">

<!-- 旧 header 已移除：导航由全局外壳（左边栏+顶栏）统一承载 -->
<main class="ag-page">

  <a href="/流水线.html" class="btn-ghost rounded-lg px-3.5 py-2 text-[13px] inline-flex items-center gap-1.5 mb-5">← 返回上一步 · 创作流水线</a>
  <div class="mb-8">
    <div class="text-[var(--cinnabar)] text-[12px] tracking-[.3em] font-medium mb-2">第八步 · 发布前最后一道闸</div>
    <h1 class="font-display font-light leading-[.9] text-[clamp(36px,6vw,70px)] tracking-tight">合规<span class="italic" style="color:var(--cinnabar)">自检</span></h1>
    <p class="mt-3 text-[14px] text-[var(--ink-soft)] max-w-xl">违禁词 / 绝对化用词 / 升学保证 / 站外导流 / 未核实硬信息 / 他人隐私，逐项查并给改后版本。<span class="text-[var(--cinnabar-deep)]">⛔ 通过后仍需运营终审改定才发。</span></p>
  </div>

  <div class="grid lg:grid-cols-[1fr_1fr] gap-7 items-start">

    <!-- 输入 -->
    <section class="card p-5 space-y-3.5">
      <div class="flex items-center justify-between">
        <h2 class="font-song font-bold text-[15px]">待检内容</h2>
        <button id="importBtn" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">从流水线导入</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[11px] text-[var(--ink-soft)]">按平台规则检</span>
        <div id="cpfTabs" class="inline-flex rounded-lg overflow-hidden" style="border:1px solid var(--line)">
          <button class="cpf-tab" data-pf="xhs" style="padding:5px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer">📕 小红书</button>
          <button class="cpf-tab" data-pf="gzh" style="padding:5px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer;border-left:1px solid var(--line)">📰 公众号</button>
        </div>
      </div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">标题</label>
        <input id="cTitle" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="标题" /></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">封面文案</label>
        <input id="cCover" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="封面文案（两行用 / 或换行分隔）" /></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">正文</label>
        <textarea id="cBody" rows="9" class="field w-full rounded-lg px-3 py-2.5 text-[13.5px] leading-relaxed" placeholder="正文全文"></textarea></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">标签</label>
        <input id="cTags" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="#美术考研 #考研 …" /></div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="text-[12px] text-[var(--ink-soft)]">笔记图片（封面 / 配图）</label>
          <div class="flex gap-2">
            <button id="imgCheck" class="btn-ghost rounded-md px-2.5 py-1 text-[11px]">🔍 图片合规初查</button>
            <button id="imgUp" class="btn-ghost rounded-md px-2.5 py-1 text-[11px]">📎 上传</button>
          </div>
        </div>
        <input id="cImgFile" type="file" class="hidden" multiple accept="image/*" />
        <div id="imgList" class="flex flex-wrap gap-2"></div>
        <div id="imgCheckStatus" class="text-[11px] text-[var(--ink-soft)] mt-1"></div>
      </div>
      <div class="flex items-center gap-2.5 pt-1">
        <button id="checkBtn" class="btn-go flex-1 rounded-xl py-3 text-[14px] font-medium flex items-center justify-center gap-2"><span id="ci">🛡</span><span id="ct">开始自检</span></button>
        <select id="model" class="field rounded-xl px-3 py-3 text-[12px] hidden">
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
      </div>
      <div id="status" class="text-[12px] text-[var(--ink-soft)] min-h-[18px]"></div>
    </section>

    <!-- 报告 -->
    <section>
      <div id="report" class="card p-8 text-center text-[13px] text-[var(--ink-soft)]">左侧填好待检内容（或「从流水线导入」），点「开始自检」，这里出风险清单与改后版本。</div>
    </section>
  </div>

  <footer class="mt-14 pt-6 border-t hairline flex flex-wrap items-center justify-between gap-3 text-[11px] text-[var(--ink-soft)]">
    <span>第八步 · 挂载 KB4 违禁词与平台规则</span>
    <span class="font-song">这是法律与限流的护栏 · 有风险必须改后再发</span>
  </footer>
</main>

<!-- 从流水线导入：历史记录选择弹窗 -->
<div id="impModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px">
  <div class="card" style="width:min(640px,94vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)">
      <div class="font-song" style="font-weight:700;font-size:16px">📋 选择要自检的成稿（历史记录）</div>
      <button id="impClose" class="btn-ghost rounded-lg" style="padding:6px 14px;font-size:12px">关闭</button>
    </div>
    <div id="impList" style="padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px"></div>
  </div>
</div>
<style>
  .imp-row{ display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:var(--paper-2); }
  .imp-row:hover{ border-color:rgba(255,36,66,.3); }
  .imp-go{ flex:0 0 auto; font-size:12px; font-weight:600; color:#444; background:#f5f5f5; border:1px solid #ddd; border-radius:999px; padding:6px 16px; cursor:pointer; transition:.15s; }
  .imp-go:hover{ filter:brightness(.98); transform:translateY(-1px); }
</style>

<script src="/assets/tracks.js?v=16"></script>
<script src="/assets/app.js?v=41"></script>
<script>
$('#model').value = localStorage.getItem('ag_model') || 'claude-opus-4-8';
$('#model').addEventListener('change', e => localStorage.setItem('ag_model', e.target.value));

let cImages = [];
function imgSrc(u){ return (u||'').startsWith('data:') ? u : '/api/img-proxy?u='+encodeURIComponent(u); }
// 长图笔记（note://）/ 模板卡（tpl://）渲染（与成稿预览一致），避免被当成 <img> 裂图
function hexA(h,a){ const m=/^#?([0-9a-f]{6})$/i.exec(String(h||'').trim()); if(!m)return 'rgba(255,150,60,'+a+')'; const n=parseInt(m[1],16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
function noteStyleVars(page){ const p=page||{}; const memo=!!p.memo;
  const bg=/^#?[0-9a-f]{6}$/i.test(p.bg||'')?(p.bg[0]==='#'?p.bg:'#'+p.bg):('#ffffff');
  const acc=/^#?[0-9a-f]{6}$/i.test(p.accent||'')?(p.accent[0]==='#'?p.accent:'#'+p.accent):(memo?'#ffb300':'#ff6a3d');
  const hl=/^#?[0-9a-f]{6}$/i.test(p.hl||'')?(p.hl[0]==='#'?p.hl:'#'+p.hl):(memo?'#ffe14d':'#ff8a3d');
  const dark=!!p.dark, ink=dark?'#ffffff':'#16181d', ink2=dark?'rgba(255,255,255,.88)':'#33373d', meta=dark?'rgba(255,255,255,.62)':'#b6bbc2', tag=dark?'rgba(255,255,255,.78)':'#3a5a8c';
  return `--nt-bg:${bg};--nt-ink:${ink};--nt-ink2:${ink2};--nt-meta:${meta};--nt-tag:${tag};--nt-accent:${acc};--nt-hl:${hexA(hl,.42)};--nt-hl-line:${hl}`; }
function noteBlock(b){ if(!b)return''; const t=b.t||'p';
  if(t==='title')return `<div class="nt-h1">${mark(b.text||'')}</div>`;
  if(t==='meta')return `<div class="nt-meta">${mark(b.text||'')}</div>`;
  if(t==='sec')return `<div class="nt-sec"><span class="nt-dot"></span>${mark(b.text||'')}</div>`;
  if(t==='sub')return `<div class="nt-sub">${mark(b.text||'')}</div>`;
  if(t==='ol')return `<ul class="nt-ol">${(b.items||[]).map((x,k)=>`<li><svg class="nt-num" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="#ff6a3d"/><text x="11" y="11.5" fill="#ffffff" font-size="12.5" font-weight="800" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,PingFang SC,sans-serif">${k+1}</text></svg><span class="nt-tx">${mark(x)}</span></li>`).join('')}</ul>`;
  if(t==='tags')return ''; // 长图笔记图里不放话题标签
  return `<p class="nt-p">${mark(b.text||'')}</p>`; }
function isCoverPage(page){ const b=(page&&page.blocks)||[]; return b.length&&b[0].t==='title'&&b.every(x=>['title','meta','tags'].includes(x.t)); }
function memoDateStr(){ const d=new Date(),h=d.getHours(),ap=h<12?'上午':'下午',h12=h%12||12; return `${d.getMonth()+1}月${d.getDate()}日 ${ap}${h12}:${String(d.getMinutes()).padStart(2,'0')}`; }
const MEMO_STATUS='<div class="nt-ios-status"><span class="nt-clock">9:41</span><span class="nt-stat-r"><svg class="nt-si" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5.5" width="3" height="6.5" rx="1"/><rect x="10" y="3" width="3" height="9" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg class="nt-si" viewBox="0 0 17 12"><path d="M8.5 9.2a1.3 1.3 0 100 2.6 1.3 1.3 0 000-2.6z"/><path d="M8.5 5.4c1.6 0 3 .6 4.1 1.7l-1.6 1.6A3.5 3.5 0 008.5 8.6c-1 0-1.8.3-2.5 1L4.4 7.1A5.8 5.8 0 018.5 5.4z"/><path d="M8.5 1.8c2.6 0 4.9 1 6.6 2.7l-1.6 1.6A7 7 0 008.5 4.5 7 7 0 003.5 6.1L1.9 4.5A9.3 9.3 0 018.5 1.8z"/></svg><svg class="nt-bat" viewBox="0 0 28 13"><rect x=".6" y=".6" width="22.8" height="11.8" rx="3.4" fill="none" stroke="currentColor" stroke-opacity=".4" stroke-width="1.1"/><rect x="2.2" y="2.2" width="16" height="8.6" rx="1.8"/><path d="M25 4.4c1.2.4 1.2 3.8 0 4.2z" opacity=".4"/></svg></span></div>';
const MEMO_NAV='<div class="nt-ios-nav"><span class="nt-nav-back">&lsaquo; 备忘录</span><span class="nt-nav-r"><svg class="nt-ny" viewBox="0 0 20 22"><path d="M10 1.2 13.4 4.6l-1.3 1.3-1.2-1.2V14h-1.8V4.7L7.9 5.9 6.6 4.6 10 1.2z"/><path d="M4.5 8.5h2.7v1.8H5.3v9.4h9.4v-9.4h-1.9V8.5h2.7c.6 0 1.1.5 1.1 1.1v10.6c0 .6-.5 1.1-1.1 1.1H4.5c-.6 0-1.1-.5-1.1-1.1V9.6c0-.6.5-1.1 1.1-1.1z"/></svg><svg class="nt-ny" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10.4" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="7.2" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="16.8" cy="12" r="1.5"/></svg></span></div>';
const MEMO_TOP='<div class="nt-ios-top">'+MEMO_STATUS+MEMO_NAV+'</div>';
const MEMO_TOOLS='<div class="nt-ios-tools"><svg class="nt-tool" viewBox="0 0 22 22"><rect x="2.5" y="3.5" width="17" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M2.5 8.7h17M2.5 13.5h17M8.7 3.5v15M13.3 3.5v15" stroke="currentColor" stroke-width="1.3"/></svg><svg class="nt-tool" viewBox="0 0 22 22"><rect x="3.5" y="3.5" width="15" height="15" rx="4" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M7 11 9.6 13.6 15 7.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><svg class="nt-tool" viewBox="0 0 28 22"><text x="14" y="16.5" font-size="15" font-weight="700" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" fill="currentColor">Aa</text></svg><svg class="nt-tool" viewBox="0 0 24 22"><rect x="2.5" y="6" width="19" height="12.5" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12.2" r="3.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8.3 6 9.7 3.8h4.6L15.7 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg><svg class="nt-tool acc" viewBox="0 0 22 22"><path d="M14.6 2.8 19.2 7.4 8.5 18.1H4v-4.5L14.6 2.8z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></div>';
const MEMO_BOTTOM='<div class="nt-ios-bottom">'+MEMO_TOOLS+'<div class="nt-home"></div></div>';
function noteCardHTML(page){ const cover=isCoverPage(page); const memo=!!(page&&page.memo); const inner=((page&&page.blocks)||[]).map(noteBlock).join(''); if(memo){ const nav=MEMO_NAV.replace('</span><span class="nt-nav-r">', `</span><span class="nt-nav-date">${memoDateStr()}</span><span class="nt-nav-r">`); const top='<div class="nt-ios-top">'+MEMO_STATUS+nav+'</div>'; return `<div class="cv-note is-memo" style="${noteStyleVars(page)}">${top}<div class="cv-note-fit">${inner}</div>${MEMO_BOTTOM}</div>`; } return `<div class="cv-note${cover?' is-cover':''}" style="${noteStyleVars(page)}">${cover?inner:`<div class="cv-note-fit">${inner}</div>`}</div>`; }
function fitNote(el){ const fit=el.querySelector('.cv-note-fit'); if(!fit)return; fit.style.transform=''; fit.style.width='100%'; const cs=getComputedStyle(el); const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom); const avail=el.clientHeight-padV, need=fit.scrollHeight; if(need>avail+1&&avail>0){ const s=Math.max(.45,avail/need); fit.style.transform='scale('+s+')'; fit.style.width=(100/s)+'%'; } }
function fitAllNotes(root){ (root||document).querySelectorAll('.cv-note:not(.is-cover)').forEach(fitNote); requestAnimationFrame(()=>requestAnimationFrame(()=>{ (root||document).querySelectorAll('.cv-note:not(.is-cover)').forEach(fitNote); })); }
function autoEm(s){ return String(s||'').replace(/==(.+?)==/g,'<em>$1</em>').replace(/(?<!<em>)(\d+[%＋+分天]?|「[^」]+」)/g,'<em>$1</em>'); }
function coverTemplateHTML(spec, lines, opt){ opt=opt||{}; const parts=String(spec||'').split('|'); const id=parts[0];
  const adj=[parts[1]?'adj-'+parts[1]:'',parts[2]?'adj-'+parts[2]:'',parts[3]?'tsz-'+parts[3]:''].filter(Boolean).join(' ');
  lines=(lines||[]).filter(Boolean);
  const title=autoEm(lines[0]||''); const sub=(lines.slice(1).join(' ')||'').replace(/==(.+?)==/g,'$1');
  const acc=((parts[5]&&/^[0-9a-f]{6}$/i.test(parts[5]))?('#'+parts[5]):'')||opt.accent||'#ff2442';
  const adjBg=(parts[4]&&/^[0-9a-f]{6}$/i.test(parts[4]))?('#'+parts[4]):'';
  const bg=adjBg||opt.bg||'#ffffff';
  const isDark=(h=>{const m=/^#?([0-9a-f]{6})$/i.exec(h||'');if(!m)return false;const n=parseInt(m[1],16);return (0.299*(n>>16&255)+0.587*(n>>8&255)+0.114*(n&255))<110;})(bg);
  const ink=opt.ink||(isDark?'#ffffff':'#16181d');
  const vars=`--c-bg:${bg};--c-ink:${ink};--c-accent:${acc}`;
  const tt=`<div class="ct-t">${title}</div>`, ss=sub?`<div class="ct-s">${sub}</div>`:'';
  let inner;
  if(id==='memo') inner=`<div class="ct-memobar"><span class="l">&lsaquo; 备忘录</span><span class="c">${(typeof memoDateStr==='function'?memoDateStr():'')}</span><span class="l">完成</span></div>${tt}${ss}`;
  else if(id==='mag') inner=`<div class="ct-kicker"><span>FEATURE</span><span>VOL.01</span></div>${tt}${ss}<div class="ct-foot">朱砂·操盘台</div>`;
  else if(id==='block') inner=`<div class="ct-block">${tt}</div>${ss}`;
  else if(id==='split') inner=`<div class="ct-img"></div><div class="ct-cap">${tt}${ss}</div>`;
  else if(id==='grid') inner=`<div class="ct-kicker"><span>VERTICAL</span><span>NO.01</span></div>${tt}${ss}`;
  else if(id==='clash') inner=`<div class="ct-top">${tt}</div>${ss}`;
  else inner=`${tt}${ss}`;
  return `<div class="cv-ctpl ctpl-${id} ${adj}" style="${vars}">${inner}</div>`;
}
function coverLinesForTpl(){ const c=($('#cCover')&&$('#cCover').value||'').trim(); const arr=c?c.split(/\s*\/\s*|\n+/).map(x=>x.trim()).filter(Boolean):[]; if(arr.length) return arr; const t=($('#cTitle')&&$('#cTitle').value||'').trim(); return t?[t]:[]; }
// 单个缩略：note:// / tpl:// / ctpl:// → CSS 卡；普通 URL/data → 图片
function imgCellHTML(u, wpx){ u=u||'';
  if(u.startsWith('ctpl://')) return `<div class="cv-frame tpl" style="width:${wpx}px;box-shadow:none;border:1px solid var(--line)">${coverTemplateHTML(u.slice(7), coverLinesForTpl())}</div>`;
  if(u.startsWith('note://')) return `<div class="cv-frame tpl note-zoom" data-note="${+u.slice(7)}" title="点击放大" style="width:${wpx}px;box-shadow:none;border:1px solid var(--line);cursor:zoom-in">${noteCardHTML((window.__notePages||[])[+u.slice(7)])}</div>`;
  if(u.startsWith('tpl://')) return `<div class="cv-frame tpl" style="width:${wpx}px;box-shadow:none;border:1px solid var(--line)"><div class="cv-tpl t0"></div></div>`;
  return `<div class="out p-0" style="width:${wpx}px;aspect-ratio:3/4;border-radius:8px;overflow:hidden"><img class="zoomable" title="点击放大" src="${imgSrc(u)}" style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in"/></div>`; }
// 长图笔记卡点击放大（CSS 卡不是图，用大号 cv-frame 弹层显示）
function showNoteLightbox(page){ if(!page)return;
  let lb=document.getElementById('__noteLb');
  if(!lb){ lb=document.createElement('div'); lb.id='__noteLb'; lb.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:24px;cursor:zoom-out'; document.body.appendChild(lb); lb.addEventListener('click',()=>lb.style.display='none'); document.addEventListener('keydown',e=>{if(e.key==='Escape')lb.style.display='none';}); }
  lb.innerHTML='<div class="cv-frame" style="width:min(86vw,360px);box-shadow:0 12px 48px rgba(0,0,0,.55)">'+noteCardHTML(page)+'</div>';
  lb.style.display='flex'; requestAnimationFrame(()=>requestAnimationFrame(()=>fitAllNotes(lb)));
}
function bindNoteZoom(root){ (root||document).querySelectorAll('.note-zoom[data-note]').forEach(fr=>fr.addEventListener('click',()=>showNoteLightbox((window.__notePages||[])[+fr.dataset.note]))); }
function renderImgs(){
  const box = $('#imgList'); if(!box) return;
  box.innerHTML = cImages.map((u,i)=>`
    <div style="position:relative">
      ${imgCellHTML(u.url||u, 84)}
      ${(u.verdict)?`<div class="text-[10px] text-center mt-0.5" style="color:${u.bad?'var(--cinnabar-deep)':(/文字卡/.test(u.verdict)?'var(--ink-soft)':'#00a152')}">${u.verdict}</div>`:(u.cap&&u.cap.title?`<div class="text-[9.5px] text-center mt-0.5 text-[var(--ink-soft)] leading-tight" style="width:84px">${mark(u.cap.title)}</div>`:'')}
      <span class="ci-del" data-i="${i}" style="position:absolute;top:-6px;right:-6px;width:19px;height:19px;border-radius:999px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;font-size:10px;box-shadow:0 1px 4px rgba(0,0,0,.15)">✕</span>
    </div>`).join('');
  box.querySelectorAll('.ci-del').forEach(x=>x.addEventListener('click',()=>{ cImages.splice(+x.dataset.i,1); renderImgs(); }));
  fitAllNotes(box); bindNoteZoom(box);
}
function downscaleImage(file, max = 1100) {

function fmtTime(ts) { const dt = new Date(ts); const p = n => String(n).padStart(2, '0'); return `${dt.getFullYear()}/${p(dt.getMonth()+1)}/${p(dt.getDate())} ${p(dt.getHours())}:${p(dt.getMinutes())}`; }
async function listHistory() { return (window.Cloud && await Cloud.loggedIn()) ? await Cloud.list() : plHistory(); }
async function getHistoryData(id) { if (window.Cloud && await Cloud.loggedIn()) { const d = await Cloud.get(id); if (d) return d; } const r = plHistory().find(x => x.id === id); return r && r.data; }
async function openImportPicker() {
  $('#impModal').style.display = 'flex';
  $('#impList').innerHTML = '<div class="text-center text-[13px] text-[var(--ink-soft)] py-8">加载中…</div>';
  const arr = await listHistory();
  const cur = Draft.load();
  const curHasContent = cur && (cur.body || cur.best || cur.title);
  const rows = [];
  if (curHasContent) {
    const ci = (cur.coverImages || []).length;
    rows.push(`<div class="imp-row"><div class="flex-1 min-w-0"><div class="text-[13.5px] font-medium truncate">${mark(cur.topic || cur.best || cur.title || '当前草稿')}</div><div class="text-[11px] text-[var(--ink-soft)] mt-1">📝 当前草稿（本机最新一篇）${ci ? ` · 🖼️${ci}图` : ''}</div></div><button class="imp-go" data-src="draft">导入</button></div>`);
  }
  arr.forEach(r => {
    rows.push(`<div class="imp-row"><div class="flex-1 min-w-0"><div class="text-[13.5px] font-medium truncate">${mark(r.topic || '（未命名）')}</div><div class="text-[11px] text-[var(--ink-soft)] mt-1">${fmtTime(r.ts)}${r.track ? ` · ${r.track}` : ''}${r.doneKeys && r.doneKeys.length ? ` · ${r.doneKeys.join(' ')}` : ''}${r.imgs ? ` · 🖼️${r.imgs}图` : ''}</div></div><button class="imp-go" data-id="${r.id}">导入</button></div>`);
  });
  $('#impList').innerHTML = rows.length ? rows.join('') : '<div class="text-center text-[13px] text-[var(--ink-soft)] py-10">还没有成稿。先去 S2–S7 跑一篇。</div>';
  $('#impList').querySelectorAll('.imp-go').forEach(b => b.addEventListener('click', async () => {
    let d;
    if (b.dataset.src === 'draft') d = Draft.load();
    else d = await getHistoryData(b.dataset.id);
    importDraftData(d); $('#impModal').style.display = 'none';
  }));
}
$('#importBtn').addEventListener('click', openImportPicker);
$('#impClose').addEventListener('click', () => $('#impModal').style.display = 'none');
$('#impModal').addEventListener('click', e => { if (e.target === $('#impModal')) $('#impModal').style.display = 'none'; });
document.addEventListener('keydown', e => { if (e.key === 'Escape') $('#impModal').style.display = 'none'; });
// 进入页面自动导入「当前草稿」（= 流水线刚生成/正在编辑的这篇），无需手动筛选；换别篇再点「从流水线导入」。
(function () { try { const d = Draft.load(); if (d && (d.body || d.best || d.title)) importDraftData(d); } catch {} })();

// 上传图片
$('#imgUp').addEventListener('click', () => $('#cImgFile').click());
$('#cImgFile').addEventListener('change', async e => {
  const files = [...e.target.files]; if (!files.length) { e.target.value = ''; return; }
  for (const f of files) { const d = await downscaleImage(f); if (d) cImages.push({ url: d }); }
  renderImgs(); e.target.value = '';
});

// 图片合规初查（GLM-4V 看图找：二维码/联系方式、绝对化或承诺类文字、违规元素）
$('#imgCheck').addEventListener('click', async () => {
  if (!cImages.length) { $('#imgCheckStatus').textContent = '先导入或上传图片'; $('#imgCheckStatus').style.color = 'var(--cinnabar-deep)'; return; }
  const btn = $('#imgCheck'), st = $('#imgCheckStatus'); btn.disabled = true; const o = btn.textContent; btn.textContent = '查图中…';
  st.style.color = 'var(--ink-soft)';
  const prompt = '你是内容合规审核员。看这张小红书配图，只回一句：若画面里出现【二维码/微信号/电话等联系方式、绝对化或承诺类文字(最/第一/100%/包过等)、违规导流或敏感元素】就指出具体问题；都没有就回「未见明显问题」。20字内。';
  let bad = 0, checked = 0;
  for (let i = 0; i < cImages.length; i++) {
    const u = cImages[i].url || '';
    // 长图笔记 / 模板卡是纯文字 CSS（无图可识别），其文字已随正文「开始自检」检查 → 跳过图像初查
    if (u.startsWith('note://') || u.startsWith('tpl://')) { cImages[i].verdict = '📝 文字卡·免识别'; cImages[i].bad = false; renderImgs(); continue; }
    checked++;
    st.textContent = '查第 ' + (i + 1) + '/' + cImages.length + ' 张…';
    try {
      const j = await (await fetch('/api/vision', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ imageUrl: u, prompt }) })).json();
      const desc = (j.desc || '').trim();
      const isBad = j.ok && desc && !/未见明显问题|没有|无明显|未发现/.test(desc);
      cImages[i].verdict = j.ok ? (isBad ? '⚠ ' + desc.slice(0, 14) : '✓ 无问题') : '解析失败';
      cImages[i].bad = isBad; if (isBad) bad++;
    } catch { cImages[i].verdict = '失败'; }
    renderImgs();
  }
  st.textContent = bad ? ('⚠ ' + bad + ' 张图疑似有问题，请人工复核') : (checked ? '✓ 图片初查未见明显问题（仍需人工终审）' : '✓ 都是文字卡，文字已随正文自检（仍需人工终审）');
  st.style.color = bad ? 'var(--cinnabar-deep)' : '#00a152';
  btn.disabled = false; btn.textContent = o;
});

function setStatus(m, k) { const el = $('#status'); el.textContent = m || ''; el.style.color = k === 'err' ? 'var(--cinnabar-deep)' : 'var(--ink-soft)'; }
function busy(on) { $('#checkBtn').disabled = on; $('#ci').className = on ? 'spin' : ''; $('#ci').textContent = on ? '◠' : '🛡'; $('#ct').textContent = on ? '自检中' : '开始自检'; }

const LV = { high:{t:'高危',c:'#c0301d',bg:'rgba(210,59,39,.12)'}, mid:{t:'中风险',c:'#b8860b',bg:'rgba(184,134,11,.14)'}, low:{t:'提示',c:'#3a5a8c',bg:'rgba(58,90,140,.12)'} };

function renderReport(r) {
  const risks = r.risks || [];
  const clean = risks.length === 0;
  let html = `<div class="card p-5">
    <div class="flex items-center gap-3 mb-1">
      <span class="stamp text-[12px] px-2.5 py-1.5 leading-none" style="${clean?'background:#3fa34d;box-shadow:none':''}">${clean?'通过':'有风险'}</span>
      <div class="font-song font-bold text-[16px]">${clean?'未发现明显风险':'发现 '+risks.length+' 处风险点'}</div>
    </div>
    <p class="text-[12px] text-[var(--ink-soft)]">${mark(r.verdict || '')}</p>
  </div>`;

  if (risks.length) {
    html += '<div class="space-y-2.5 mt-4">' + risks.map(x => {
      const lv = LV[x.level] || LV.low;
      return `<div class="out p-4">
        <div class="flex items-center gap-2 mb-1.5">
          <span class="text-[11px] font-bold px-2 py-0.5 rounded" style="color:${lv.c};background:${lv.bg}">${lv.t}</span>
          <span class="text-[12px] text-[var(--ink-soft)]">${mark(x.category||'')}${x.where?' · '+mark(x.where):''}</span>
        </div>
        <div class="text-[13.5px] mb-1.5">${mark(x.issue||'')}</div>
        <div class="text-[13px] text-[var(--cinnabar-deep)]">→ 改：${mark(x.fix||'')}</div>
      </div>`;
    }).join('') + '</div>';
  }

  const rw = r.rewrite;
  if (rw) {
    // 改后版本是「可直接发布的终稿」：清掉残留的「需核实」等提示字眼
    const rwTitle = stripVerify(rw.title || '');
    const rwBody = (Array.isArray(rw.body) ? rw.body : [rw.body]).filter(Boolean).map(stripVerify);
    const rwCover = (rw.cover_lines || []).map(stripVerify);
    const imgsRow = cImages.length ? `
      <div><span class="chip mr-1.5">图片</span><span class="text-[11px] text-[var(--ink-soft)]">${cImages.length} 张（随终稿一起带去预览/打包）</span>
        <div class="flex flex-wrap gap-2 mt-2" id="fixImgRow">${cImages.map(c=>imgCellHTML(c.url, 54)).join('')}</div>
      </div>` : '';
    html += `<div class="card p-5 mt-4">
      <div class="flex items-center justify-between mb-3">
        <div class="font-song font-bold text-[15px]">改后版本 <span class="text-[11px] text-[var(--ink-soft)] font-normal">· 可直接发布的终稿</span></div>
        <button id="copyFix" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">复制改后</button>
      </div>
      <div class="space-y-2.5 text-[13.5px]">
        ${rwTitle?`<div><span class="chip mr-1.5">标题</span>${mark(rwTitle)}</div>`:''}
        ${rwCover.length?`<div><span class="chip mr-1.5">封面</span>${rwCover.map(mark).join(' / ')}</div>`:''}
        ${imgsRow}
        ${rwBody.length?`<div class="out p-4 leading-[1.8] space-y-2">${rwBody.map(p=>`<p>${mark(p)}</p>`).join('')}</div>`:''}
        ${rw.tags?`<div class="flex flex-wrap gap-2">${(rw.tags||[]).map(t=>`<span class="chip" style="color:var(--xhs-tag);background:rgba(58,90,140,.08);border-color:rgba(58,90,140,.2)">${t.startsWith('#')?t:'#'+t}</span>`).join('')}</div>`:''}
      </div>
      <div class="flex flex-wrap gap-2.5 mt-4 pt-3 border-t hairline">
        <button id="regenImgBtn" class="btn-go rounded-lg px-4 py-2 text-[12.5px] font-medium">🔄 按改后内容重新出图</button>
        <button id="toPreviewBtn" class="btn-ghost rounded-lg px-4 py-2 text-[12.5px]">去成稿预览 →</button>
        <button id="dlPackBtn" class="btn-ghost rounded-lg px-4 py-2 text-[12.5px]">⬇ 下载图文包</button>
        <span class="text-[11px] text-[var(--ink-soft)] self-center w-full">重新出图＝按改后正文 + 你在「智能体」设的配图视觉风格生成</span>
      </div>
    </div>`;
    // 暂存终稿，供按钮使用
    window.__revised = { title: rwTitle, cover_lines: rwCover, body: rwBody, tags: rw.tags || [] };
  }

  $('#report').outerHTML = `<section id="report">${html}</section>`;
  fitAllNotes(document.querySelector('#fixImgRow') || document); bindNoteZoom(document.querySelector('#fixImgRow')); // 长图笔记缩略自适配 + 点击放大

  const cf = document.querySelector('#copyFix');
  if (cf && rw) cf.addEventListener('click', async () => {
    const v = window.__revised;
    const text = [v.title, (v.cover_lines||[]).join(' / '), v.body.join('\n'), (v.tags||[]).join(' ')].filter(Boolean).join('\n\n');
    try { await navigator.clipboard.writeText(text); cf.textContent = '已复制 ✓'; } catch {}
  });
  // 把终稿 + 图片写回草稿，跳成稿预览（exp=true 时自动触发打包下载）
  function pushRevisedToDraft() {
    const cur = Draft.load();
    Draft.save({
      title: window.__revised.title, best: window.__revised.title,
      cover_lines: window.__revised.cover_lines.length ? window.__revised.cover_lines : cur.cover_lines,
      body: window.__revised.body, tags: window.__revised.tags.length ? window.__revised.tags : cur.tags,
      coverImages: cImages.map(c => c.url), coverImage: cImages[0] ? cImages[0].url : '',
      coverCaptions: cImages.some(c => c.cap) ? cImages.map(c => c.cap || null) : cur.coverCaptions,
      notePages: (window.__notePages && window.__notePages.length) ? window.__notePages : cur.notePages, // 长图笔记页随终稿带去预览
    });
  }
  const tp = document.querySelector('#toPreviewBtn');
  if (tp) tp.addEventListener('click', () => { pushRevisedToDraft(); location.href = '/成稿预览.html'; });
  const dp = document.querySelector('#dlPackBtn');
  if (dp) dp.addEventListener('click', () => { pushRevisedToDraft(); location.href = '/成稿预览.html?export=1'; });
  const rb = document.querySelector('#regenImgBtn');
  if (rb) rb.addEventListener('click', () => regenS8Images(rb));
}
// 去掉「需核实 / 需要核实 / 待核实」及其包裹符号，得到发布级干净文本
function stripVerify(s) {
  return String(s || '')
    .replace(/[（(【\[「]?\s*(需要核实|需核实|待核实)\s*[）)】\]」]?/g, '')
    .replace(/\s{2,}/g, ' ').trim();
}

$('#checkBtn').addEventListener('click', async () => {
  const title = $('#cTitle').value.trim(), cover = $('#cCover').value.trim(), body = $('#cBody').value.trim(), tags = $('#cTags').value.trim();
  if (!body && !title) { setStatus('至少填标题或正文', 'err'); return; }
  const tk = getTrack();
  const isGzhChk = cPlatform === 'gzh';
  const dims = isGzhChk
    ? `检查维度（==微信公众号 / 微信公众平台运营规范 + 广告法==）：①违禁/绝对化用词（广告法：最/第一/唯一/国家级/100%/根治等）②虚假宣传 / 夸大功效 / 效果或结果保证（${tk.compliance}）③**诱导分享/诱导关注/诱导点赞在看**（如"分享到朋友圈才看得到""点在看再走""集赞"——微信明令禁止的诱导行为）④**诱导加私人微信 / 私信发资料 / 导流到个人号或外部**（"加我微信""评论区扣XX我私发"风险高）⑤医疗/金融/教育培训等资质与承诺（升学/收益保证）⑥政治敏感 / 低俗 / 标题党 ⑦${tk.hardInfo}等未核实硬信息（应改写为稳妥表述）⑧他人隐私 / 侵权 / 洗稿。注意：公众号正文可含「阅读原文」等微信生态内链接，不算站外导流；重点查诱导互动与导流到个人号。`
    : `检查维度（==小红书平台规则==）：①违禁词/绝对化用词（最/第一/唯一/100%/永久/根治等）②效果或结果保证（${tk.compliance}）③站外导流痕迹（微信/电话/二维码/加V/私信发资料/留联系方式）④${tk.hardInfo}等未核实硬信息（应标「需核实」）⑤他人个人信息 ⑥软广/硬广未报备、第三方平台引流。`;
  const platName = isGzhChk ? '微信公众号文章' : '小红书笔记';
  const prompt = `对下面这篇${tk.domain}「${platName}」做发布前合规自检，==严格按该平台的规则==逐项找风险并给修改建议；无风险则 risks 为空数组。
【本赛道合规红线】${tk.compliance}
【标题】${title}
【封面/首图文案】${cover}
【正文】${body}
${isGzhChk ? '' : '【标签】' + tags + '\n'}${dims}
★ rewrite 是「可直接发布的终稿」：自然通顺、合规，且**不得出现「需核实 / 需要核实 / 待核实」等任何提示字眼**——把不确定的硬信息改写成稳妥通用的表述或去掉，让读者读到干净成品。
只输出 JSON：{"verdict":"一句话总体结论","risks":[{"level":"high|mid|low","category":"风险类别","where":"出现在标题/正文/标签的哪处","issue":"问题描述","fix":"具体改法"}],"rewrite":{"title":"改后标题","cover_lines":["改后封面行1","行2"],"body":["改后正文段1","段2"],"tags":${isGzhChk ? '[]' : '["#改后标签"]'}}}
即使整体无风险也要给出 rewrite（与原文一致即可），方便一键去成稿预览。`;
  busy(true); setStatus('正在自检…');
  try {
    const txt = await callClaude({ prompt, model: $('#model').value, max_tokens: 2600, json: true, action: 'compliance' });
    renderReport(extractJSON(txt));
    setStatus('✓ 自检完成 · 发布前仍需运营终审改定（第八步）');
  } catch (e) { setStatus('自检失败：' + (e.message || e), 'err'); }
  finally { busy(false); }
});
</script>
