<!-- 旧 header 已移除：导航由全局外壳（左边栏+顶栏）统一承载 -->
<main class="ag-page">

  <a href="/流水线.html" class="btn-ghost rounded-lg px-3.5 py-2 text-[13px] inline-flex items-center gap-1.5 mb-5">← 返回上一步 · 创作流水线</a>
  <div class="mb-8">
    <div class="text-[var(--cinnabar)] text-[12px] tracking-[.3em] font-medium mb-2">第八步 · 发布前最后一道闸</div>
    <h1 class="font-display font-light leading-[.9] text-[clamp(36px,6vw,70px)] tracking-tight">合规<span class="italic" style="color:var(--cinnabar)">自检</span></h1>
    <p class="mt-3 text-[14px] text-[var(--ink-soft)] max-w-xl">违禁词 / 绝对化用词 / 升学保证 / 站外导流 / 未核实硬信息 / 他人隐私，逐项查并给改后版本。<span class="text-[var(--cinnabar-deep)]">⛔ 通过后仍需运营终审改定才发。</span></p>
  </div>

  <div class="grid lg:grid-cols-[1fr_1fr] gap-7 items-start">

    <!-- 输入 -->
    <section class="card p-5 space-y-3.5">
      <div class="flex items-center justify-between">
        <h2 class="font-song font-bold text-[15px]">待检内容</h2>
        <button id="importBtn" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">从流水线导入</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[11px] text-[var(--ink-soft)]">按平台规则检</span>
        <div id="cpfTabs" class="inline-flex rounded-lg overflow-hidden" style="border:1px solid var(--line)">
          <button class="cpf-tab" data-pf="xhs" style="padding:5px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer">📕 小红书</button>
          <button class="cpf-tab" data-pf="gzh" style="padding:5px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer;border-left:1px solid var(--line)">📰 公众号</button>
        </div>
      </div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">标题</label>
        <input id="cTitle" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="标题" /></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">封面文案</label>
        <input id="cCover" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="封面文案（两行用 / 或换行分隔）" /></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">正文</label>
        <textarea id="cBody" rows="9" class="field w-full rounded-lg px-3 py-2.5 text-[13.5px] leading-relaxed" placeholder="正文全文"></textarea></div>
      <div><label class="block text-[12px] text-[var(--ink-soft)] mb-1">标签</label>
        <input id="cTags" class="field w-full rounded-lg px-3 py-2 text-[13.5px]" placeholder="#美术考研 #考研 …" /></div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="text-[12px] text-[var(--ink-soft)]">笔记图片（封面 / 配图）</label>
          <div class="flex gap-2">
            <button id="imgCheck" class="btn-ghost rounded-md px-2.5 py-1 text-[11px]">🔍 图片合规初查</button>
            <button id="imgUp" class="btn-ghost rounded-md px-2.5 py-1 text-[11px]">📎 上传</button>
          </div>
        </div>
        <input id="cImgFile" type="file" class="hidden" multiple accept="image/*" />
        <div id="imgList" class="flex flex-wrap gap-2"></div>
        <div id="imgCheckStatus" class="text-[11px] text-[var(--ink-soft)] mt-1"></div>
      </div>
      <div class="flex items-center gap-2.5 pt-1">
        <button id="checkBtn" class="btn-go flex-1 rounded-xl py-3 text-[14px] font-medium flex items-center justify-center gap-2"><span id="ci">🛡</span><span id="ct">开始自检</span></button>
        <button id="viralBtn" class="rounded-xl py-3 px-4 text-[13px] font-medium" style="background:linear-gradient(180deg,#e6cf8e,#cca552);color:#fff;text-shadow:0 1px 2px rgba(120,88,20,.5)">🔥 爆款潜力</button>
        <select id="model" class="field rounded-xl px-3 py-3 text-[12px] hidden">
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
      </div>
      <div id="status" class="text-[12px] text-[var(--ink-soft)] min-h-[18px]"></div>
      <div id="viralBox"></div>
    </section>

    <!-- 报告 -->
    <section>
      <div id="trackPlaybook" class="space-y-4 mb-4"></div>
      <div id="report" class="card p-8 text-center text-[13px] text-[var(--ink-soft)]">左侧填好待检内容（或「从流水线导入」），点「开始自检」，这里出风险清单与改后版本。</div>
    </section>
  </div>

  <footer class="mt-14 pt-6 border-t hairline flex flex-wrap items-center justify-between gap-3 text-[11px] text-[var(--ink-soft)]">
    <span>第八步 · 挂载 KB4 违禁词与平台规则</span>
    <span class="font-song">这是法律与限流的护栏 · 有风险必须改后再发</span>
  </footer>
</main>

<!-- 从流水线导入：历史记录选择弹窗 -->
<div id="impModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px">
  <div class="card" style="width:min(640px,94vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)">
      <div class="font-song" style="font-weight:700;font-size:16px">📋 选择要自检的成稿（历史记录）</div>
      <button id="impClose" class="btn-ghost rounded-lg" style="padding:6px 14px;font-size:12px">关闭</button>

</div>

<script>
// 项目风格自定义确认弹框（替换原生 confirm，统一好看）。返回 Promise<boolean>
function uiConfirm(opt) {
  opt = opt || {};
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(20,18,22,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:uic-fade .15s ease';
    ov.innerHTML = `<div style="width:min(420px,92vw);background:var(--paper,#fff);border-radius:18px;box-shadow:0 24px 70px -12px rgba(0,0,0,.4);overflow:hidden;animation:uic-pop .18s cubic-bezier(.2,.9,.3,1.2)">
      <div style="padding:22px 22px 6px;display:flex;gap:13px;align-items:flex-start">
        <div style="width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;background:${opt.danger ? 'rgba(165,129,58,.1)' : 'rgba(58,90,140,.1)'}">${opt.icon || '❓'}</div>
        <div style="flex:1;min-width:0;padding-top:2px">
          <div style="font-size:16px;font-weight:700;color:var(--ink,#1c1c1e);line-height:1.3">${opt.title || '确认操作'}</div>
          <div style="font-size:13px;color:var(--ink-soft,#6b7178);line-height:1.6;margin-top:7px">${opt.body || ''}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;padding:16px 22px 20px;justify-content:flex-end">
        <button data-uic="0" style="border:1px solid var(--line,#e5e5ea);background:var(--paper,#fff);color:var(--ink,#1c1c1e);border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer">${opt.cancelText || '取消'}</button>
        <button data-uic="1" style="border:none;background:${opt.danger ? 'linear-gradient(180deg,#caa85e,#a5813a)' : 'linear-gradient(180deg,#3a7afe,#2f6ae0)'};color:#fff;border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px -6px ${opt.danger ? 'rgba(165,129,58,.5)' : 'rgba(58,122,254,.5)'}">${opt.okText || '确定'}</button>
      </div></div>`;
    if (!document.getElementById('uic-style')) { const s = document.createElement('style'); s.id = 'uic-style'; s.textContent = '@keyframes uic-fade{from{opacity:0}to{opacity:1}}@keyframes uic-pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}'; document.head.appendChild(s); }
    const done = v => { ov.remove(); resolve(v); };
    ov.addEventListener('click', e => { if (e.target === ov) done(false); const b = e.target.closest('[data-uic]'); if (b) done(b.getAttribute('data-uic') === '1'); });
    document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { document.removeEventListener('keydown', esc); done(false); } });
    document.body.appendChild(ov);
  });
}

$('#model').addEventListener('change', e => localStorage.setItem('ag_model', e.target.value));

  if (/^(就这么|就是这么|没别的|说白了就|答案是)\S{0,6}[。！]?$/.test(t)) reasons.push('爽文短句');

  if (/此外|然而|与[^，。]{0,8}保持一致|至关重要|深入探讨|持久的|赋能|培养出|相互交织|不断演变的格局|奠定[了]?坚实?基础|彰显|凸显[了]?其|焦点所在|令人叹为观止|充满活力的|坐落于|致力于/.test(t)) reasons.push('AI词汇');
