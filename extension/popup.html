<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><style>
  body{ width:280px; margin:0; font-family:-apple-system,"PingFang SC",sans-serif; color:#16181d; }
  .h{ background:linear-gradient(180deg,#ff4259,#ff2442); color:#fff; padding:14px 16px; }
  .h b{ font-size:15px; } .h div{ font-size:11px; opacity:.9; margin-top:2px; }
  .b{ padding:14px 16px; font-size:12.5px; line-height:1.7; color:#444; }
  .b ol{ margin:6px 0 0; padding-left:18px; } .b li{ margin-bottom:5px; }
  .ok{ color:#00a152; font-weight:600; }
</style></head>
<body>
  <div class="h"><b>朱砂 · 小红书发布助手</b><div>本机浏览器发布，零风控</div></div>
  <div class="b">
    <div class="ok">✓ 插件已安装</div>
    <ol>
      <li>在 <b>Chrome 里登录小红书</b>（creator.xiaohongshu.com）</li>
      <li>打开 <b>yonglin.chat → 一键发布</b></li>
      <li>选成稿 → 点「🧩 用插件发布」</li>
      <li>会自动打开创作页填好内容 → 你确认「存草稿」</li>
    </ol>
    <div style="margin-top:8px;color:#999;font-size:11px">用你已登录的小红书操作，和手动发一样，不触发风控。</div>
    <hr style="border:none;border-top:1px solid #eee;margin:12px 0" />
    <div style="font-weight:700;font-size:13px;margin-bottom:4px">🌱 养号</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">在你登录的小红书里慢刷+停留+进笔记看，保守拟真、有上限、出验证即停。</div>
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;font-size:12px">
      浏览 <input id="nzNotes" type="number" value="6" min="2" max="15" style="width:46px;padding:3px 6px;border:1px solid #ddd;border-radius:6px" /> 篇 ·
      <input id="nzMin" type="number" value="8" min="3" max="30" style="width:46px;padding:3px 6px;border:1px solid #ddd;border-radius:6px" /> 分钟
    </div>
    <button id="nzBtn" style="width:100%;background:linear-gradient(180deg,#ffb02e,#ff8a00);color:#fff;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;cursor:pointer">🌱 开始今日养号</button>
    <div id="nzMsg" style="font-size:11px;color:#00a152;margin-top:6px"></div>
    <hr style="border:none;border-top:1px solid #eee;margin:12px 0" />
    <div style="font-weight:700;font-size:13px;margin-bottom:4px">💌 待发私信草稿（人工确认）</div>
    <div style="font-size:11px;color:#888;margin-bottom:6px">私信不自动发，AI 仅生成话术草稿；你确认要发再手动去对方主页发，规避高风险灰色操作。</div>
    <div id="dmList" style="max-height:220px;overflow-y:auto"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
