name: Keep Render service awake

on:
  schedule:
    # 每 10 分钟 ping 一次，防止 Render 免费版因无访问而休眠
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 20 https://yonglin.chat/api/health || curl -fsS --max-time 20 https://zhusha.onrender.com/api/health
