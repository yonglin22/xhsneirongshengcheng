<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>请用电脑打开 · 朱砂操盘台</title>
<link rel="stylesheet" href="/assets/atelier.css?v=100" />
<style>
  *{ box-sizing:border-box; -webkit-font-smoothing:antialiased; margin:0; }
  body{ background:linear-gradient(170deg,#ffe6ea,#fff4f5 46%,#fff); color:var(--ink); font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif; min-height:100vh; padding:28px 22px 50px; }
  .wrap{ max-width:480px; margin:0 auto; }
  .lo{ display:flex; align-items:center; gap:10px; }
  .lo img{ width:36px; height:36px; border-radius:9px; }
  .lo .nm{ font-weight:800; font-size:15px; }
  .ok{ margin-top:26px; background:#fff; border:1px solid #ffe0e5; border-radius:16px; padding:18px; text-align:center; box-shadow:0 14px 34px -18px rgba(255,36,66,.3); }
  .ok .em{ font-size:40px; }
  .ok .t{ font-size:18px; font-weight:800; margin-top:6px; }
  .ok .s{ font-size:13.5px; color:var(--ink-soft); margin-top:6px; line-height:1.7; }
  .ok .s b{ color:var(--cinnabar); }
  .h{ font-size:26px; font-weight:300; line-height:1.3; margin-top:30px; }
  .h b{ font-weight:900; color:var(--cinnabar); }
  .urlbox{ margin-top:16px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; }
  .urlbox .lab{ font-size:12px; color:var(--ink-soft); }
  .urlbox .u{ font-size:15px; font-weight:700; word-break:break-all; margin-top:6px; color:var(--ink); }
  .copy{ width:100%; height:48px; margin-top:12px; border:none; border-radius:999px; background:linear-gradient(180deg,#ff4259,#ff2442 60%,#f81537); color:#fff; font-size:16px; font-weight:800; box-shadow:0 12px 28px -10px rgba(255,36,66,.55); cursor:pointer; }
  .why{ margin-top:26px; }
  .why .wt{ font-size:13px; font-weight:700; color:var(--cinnabar); letter-spacing:.1em; }
  .why ul{ list-style:none; padding:0; margin:12px 0 0; display:flex; flex-direction:column; gap:10px; }
  .why li{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:13.5px; line-height:1.6; }
  .why li b{ color:var(--ink); }
  .tip{ margin-top:22px; font-size:12.5px; color:var(--ink-soft); line-height:1.8; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lo"><img src="/assets/logo-mark.svg" alt="朱砂" /><span class="nm">赛道智能体 · 操盘台</span></div>

  <div class="ok">
    <div class="em">🎉</div>
    <div class="t">注册成功，已到账积分</div>
    <div class="s">你的账号已创建，<b>赠送积分已入账</b>。接下来请在<b>电脑</b>上登录使用。</div>
  </div>

  <div class="h">这是<b>电脑端</b>创作工具<br>请用电脑打开 👇</div>

  <div class="urlbox">
    <div class="lab">电脑浏览器访问（复制后粘贴到地址栏）</div>
    <div class="u" id="pcUrl">—</div>
    <button class="copy" id="copyBtn">📋 复制电脑端网址</button>
  </div>

  <div class="why">
    <div class="wt">为什么要用电脑</div>
    <ul>
      <li>🖥 <b>创作流水线</b>是多步骤大屏操作：选题→对标拆解→框架→正文→封面，手机放不下、容易误触。</li>
      <li>🎨 <b>封面/配图、长图笔记</b>需要大画布预览与排版编辑，手机看不清也改不动。</li>
      <li>📦 <b>一键导出图文包</b>等功能依赖电脑浏览器，手机无法下载完整素材。</li>
    </ul>
  </div>

  <div class="tip">📱 用同一手机号在电脑登录即可——<b>你的积分和作品都在账号里，不会丢</b>。<br>遇到问题可 <a href="/帮助.html" style="color:var(--cinnabar-deep)">联系客服</a>。</div>
</div>

<script>
(function () {
  const base = (location.origin && location.origin.startsWith('http')) ? location.origin : 'https://zhusha.onrender.com';
  document.getElementById('pcUrl').textContent = base.replace(/^https?:\/\//, '');
  document.getElementById('copyBtn').addEventListener('click', async () => {
    const btn = document.getElementById('copyBtn');
    try { await navigator.clipboard.writeText(base); btn.textContent = '✓ 已复制，去电脑粘贴打开'; }
    catch { const r = document.createRange(); r.selectNode(document.getElementById('pcUrl')); getSelection().removeAllRanges(); getSelection().addRange(r); btn.textContent = '已选中，长按复制'; }
    setTimeout(() => btn.textContent = '📋 复制电脑端网址', 2500);
  });
})();
</script>
</body>
</html>
