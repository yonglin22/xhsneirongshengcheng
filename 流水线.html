        <div style="width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;background:${opt.danger ? 'rgba(255,36,66,.1)' : 'rgba(58,90,140,.1)'}">${opt.icon || '❓'}</div>
        <div style="flex:1;min-width:0;padding-top:2px">
          <div style="font-size:16px;font-weight:700;color:var(--ink,#1c1c1e);line-height:1.3">${opt.title || '确认操作'}</div>
          <div style="font-size:13px;color:var(--ink-soft,#6b7178);line-height:1.6;margin-top:7px">${opt.body || ''}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;padding:16px 22px 20px;justify-content:flex-end">
        <button data-uic="0" style="border:1px solid var(--line,#e5e5ea);background:var(--paper,#fff);color:var(--ink,#1c1c1e);border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer">${opt.cancelText || '取消'}</button>
        <button data-uic="1" style="border:none;background:${opt.danger ? 'linear-gradient(180deg,#ff4259,#ff2442)' : 'linear-gradient(180deg,#3a7afe,#2f6ae0)'};color:#fff;border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px -6px ${opt.danger ? 'rgba(255,36,66,.5)' : 'rgba(58,122,254,.5)'}">${opt.okText || '确定'}</button>
      </div></div>`;
    if (!document.getElementById('uic-style')) { const s = document.createElement('style'); s.id = 'uic-style'; s.textContent = '@keyframes uic-fade{from{opacity:0}to{opacity:1}}@keyframes uic-pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}'; document.head.appendChild(s); }

    document.body.appendChild(ov);
  });

const HUMANIZE = `
【真人感铁律 · 务必逐条照做，否则被检测器(GPTZero等)判 AI、平台严重限流】
关键认知：检测器判"AI"的，恰恰是精心设计的文采。要反着来——写得越朴素、越具体、越像随手发的，越像真人。
一、坚决不要（实测最容易被判 AI 的写法）：
1. 不要比喻/打比方（如"像往漏水的桶里灌水""脑子一团浆糊""啃硬骨头"）——检测器对此最敏感，一处都别用。
2. 不要爽文短句与对仗反转（如"不玄乎，但确实管用。""就这么三步。""问题不在我笨，而在方法。"）。
3. 不要"提问+短答"的节奏（如"那怎么办？把书读薄。"）。
4. 不要金句升华、不要每段都拔高、不要工整排比对称。
二、务必这样写（实测会被判人类）：
1. 堆具体到颗粒度的实操细节：确切数字/页数/时间/书名/步骤（如"每天先花20分钟通读20页，再花10分钟画一遍朝代框架"）。细节越琐碎具体越像真人。
2. 朴素口语、直说、甚至略啰嗦：像随手打字发的，可带"其实吧""反正""说起来""我自己是"这种自然的废话，不追求文采。
3. 句子长短顺其自然，别刻意设计节奏；想到哪写到哪，偶尔补一句、跑题再拉回都行。
4. 多陈述事实和你自己的具体做法，少抒情少煽动。
5. 第一人称但平实（"我自己当时是""我一般让学生先…"），不要戏剧化。
6. emoji 克制。
目标：GPTZero 判"高度确信出自人类之手"（人类率≥97%）。一句话原则：宁可平淡朴素，也不要漂亮有文采——漂亮就是 AI。`;

const HUMANIZER_ZH = `【Humanizer-zh · 去 AI 写作痕迹（24 模式·适用所有赛道）】
核心5条：①删填充词与开场铺垫 ②打破公式结构（二元对比/三段式/戏剧分段/修辞设置） ③变化节奏：句子长短交错，列举宁可两项或四项、别凑三项 ④信任读者：直接陈述事实，别软化、别辩解、别手把手 ⑤删金句：像可引用的句子就重写。

// 判定对标这张是否「文字密集类」（→ 出长文笔记页）还是「实拍场景类」（→ AI 照片）
// 注意：解析出 [文字]/[版式] 两段再判，不能直接搜"文字"二字（每条描述都带【文字】标签会误判）
function isTextHeavyRef(refVis) {
  const v = refVis || '';
  const textPart = (v.match(/【文字】([\s\S]*?)(?:【|$)/) || [])[1] || '';
  const layoutPart = (v.match(/【版式】([\s\S]*?)(?:【|$)/) || [])[1] || '';
  const scenePart = (v.match(/【画面】([\s\S]*?)(?:【|$)/) || [])[1] || '';
  const cleanLen = textPart.replace(/[\s\/无文字。，、]/g, '').length;
  if (/无文字/.test(textPart) || cleanLen < 6) return false;                 // 几乎没字 → 实拍照片
  // 实拍场景线索：画面像真实拍摄（哪怕配了一句英文/中文文案）→ 当实拍，走 i2i 复刻，不当文字笔记图
  const realScene = /实拍|实物|拍摄|摆拍|拍照|场景|桌面|书桌|台面|背景|光线|逆光|自然光|阳光|窗|特写|俯拍|平铺|手持|手部|穿搭|人物|模特|绿植|花|咖啡|静物|布艺|针织|盘|首饰|饰品|手链|项链|戒指|耳环|产品|实景|生活照|室内|户外|质感照/.test(scenePart);
  // 文字排版/截图线索：白底纯色的干货排版、聊天/笔记截图、信息图
  const textCanvas = /白底|纯色背景|截图|聊天|对话|备忘录|信息图|海报排版|文字排版|清单图|纯文字|表格图/.test(scenePart + layoutPart);
  const enumCount = (textPart.match(/[①②③④⑤⑥⑦⑧⑨⑩]/g) || []).length;
  if (enumCount >= 3) return true;                                            // 3 条以上编号 → 文字清单图
  if (textCanvas && /清单|编号|列表|数据|导图|思维导图|要点|表格|步骤/.test(layoutPart)) return true; // 白底干货排版
  if (realScene) return false;                                               // 真实拍摄场景 → 实拍（即使带文案）
  if (/清单|编号|列表|数据|导图|思维导图|要点|表格|步骤/.test(layoutPart)) return true; // 没场景线索时，纯排版版式 → 文字图
  return cleanLen >= 16;                                                       // 字很多 → 文字密集
}

// replica 模式下，给第 i 张复刻图配「我们的内容」叠字（真字，绝不靠 AI 画字）。

function replicaCaption(i, plan, coverTitle) {

// 照「对标第 i 张」的版式，排成我这篇的一页长图笔记（结构照搬、内容换成我的）
// 从 S3 框架文本里切出"第 N 张"那一段：先定位所有"第X张"标记（忽略 **/#/* 等前缀），
// 取第 n 个标记到下一个标记之间的全部内容（含 文字/版式/内容要点/作用）。
function frameSliceForImage(n) {
  const f = state.frame || '';
  if (!f) return '';
  const hdr = /第\s*(\d{1,2})\s*张/g;
  const marks = []; let m;
  while (m = hdr.exec(f)) marks.push({ num: +m[1], idx: m.index });
  if (!marks.length) return '';
  const cur = marks.find(x => x.num === n);
  if (!cur) return '';
  const next = marks.filter(x => x.idx > cur.idx).sort((a, b) => a.idx - b.idx)[0];
  return f.slice(cur.idx, next ? next.idx : cur.idx + 900).trim().slice(0, 900);
}

function frameImageCount() {

  while (m = hdr.exec(f)) set.add(+m[1]);
  return set.size ? Math.max(...set) : 0;
}

// 上传图片（压缩后存，避免 localStorage 撑爆）
function downscaleImage(file, max = 1100) {
  return new Promise(res => {
    const rd = new FileReader();
    rd.onload = () => { const img = new Image(); img.onload = () => { let w = img.width, h = img.height; const s = Math.min(1, max / Math.max(w, h)); const c = document.createElement('canvas'); c.width = Math.round(w * s); c.height = Math.round(h * s); c.getContext('2d').drawImage(img, 0, 0, c.width, c.height); res(c.toDataURL('image/jpeg', 0.85)); }; img.onerror = () => res(rd.result); img.src = rd.result; };
    rd.onerror = () => res(''); rd.readAsDataURL(file);
  });
}
// 远程出图链接（ark 签名图，跨域且约 24h 过期）→ 经同源代理拉成 data: URL 持久化。
// 否则隔天/跨域时预览变 broken、导出图文包也截不到首图。失败则退回原链接兜底。
async function remoteToDataURL(u) {
  if (!u || u.startsWith('data:')) return u;
  try {
    const r = await fetch('/api/img-proxy?u=' + encodeURIComponent(u));
    if (!r.ok) throw 0;
    const b = await r.blob();
    return await new Promise(res => { const rd = new FileReader(); rd.onload = () => res(rd.result); rd.onerror = () => res(u); rd.readAsDataURL(b); });
  } catch { return u; }
}
// 把图（data:/远程）落到服务器 /gen 换同源短链：体积小→localStorage 存得下→预览/自检/返回都不丢。
// （根因：data: 大图占满 localStorage，Draft.save 的配额保护会剔除 coverImages 里的 data: 图→首图持久化失败）
async function persistImgUrl(u) {
  if (!u) return u;
  try {
    let dataUrl = u.startsWith('data:') ? u : await remoteToDataURL(u);
    if (!dataUrl.startsWith('data:')) return u; // 取不到 data → 退回原链（远程链至少能临时显示）
    const r = await fetch('/api/media-put', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ png: dataUrl }) });
    const j = await r.json().catch(() => null);
    return (j && j.ok && j.url) ? j.url : dataUrl;
  } catch { return u; }
}
// S2 上传对标图：下采样 → 存进 refImages → 立即逐张自动解析（不依赖小红书抓取）
async function onRefUpload(e) {
  const files = [...e.target.files]; if (!files.length) { e.target.value = ''; return; }

  state.refImages = state.refImages || [];

  state.refVision = ''; state.refVisions = null; // 新对标图，重新解析全部
  persist(); renderRefImages(); // 同步云端，避免返回后丢失对标图
  const added = state.refImages.length - before;
  await runRefAnalysis((m) => { if (fs) fs.textContent = m; }, false);
  if (fs) fs.textContent = '✓ 已上传 ' + added + ' 张 · 已解析 ' + (state.refVisions || []).filter(Boolean).length + ' 张对标图';

// 统一解析后端/上游错误（ark 错误是 {error:{message}} 对象，避免显示成 [object Object]）
function errMsg(tx) {
  try { const j = JSON.parse(tx); const e = j.error || j; return String((e && e.message) || (typeof e === 'string' ? e : '') || j.error || '出图失败').slice(0, 120); }
  catch { return (tx || '出图失败').slice(0, 120); }
}
// 公众号横版首图：预览（2.35:1）
function renderGzhCover() {

  if (typeof u === 'string' && (/^https?:\/\//.test(u) || u.startsWith('data:'))) {

async function genGzhCover() {
  const stx = $('#imgStatus'); const btn = $('#genGzhCover'); const o = btn ? btn.textContent : '';
  const visual = (state.cover && state.cover.visual) || state.topic || '';
  const aStyle = (typeof agentImgStyle === 'function' ? agentImgStyle() : '');
  const prompt = `${aStyle ? aStyle + '，' : ''}${visual}。微信公众号横版首图（2.35:1 宽幅），干净有设计感、主体居中、左右适当留白，真实质感、高级感、电影级柔光、4K 超清；画面不要出现任何文字。${IMG_NEG}`;
  if (btn) { btn.disabled = true; btn.textContent = '生成中…'; }

  // 出图：失败自动重试 1 次（偶发网络 fetch failed / 限流）
  async function once() {
    const r = await fetch('/api/image', { method: 'POST', signal: AbortSignal.timeout(170000), headers: { 'content-type': 'application/json' }, body: JSON.stringify({ provider: 'gptimage', prompt, size: '1536x1024' }) });
    const tx = await r.text(); if (!r.ok) throw new Error(errMsg(tx));
    let u = ''; try { const d = JSON.parse(tx).data; u = d && d[0] && d[0].url; } catch {} if (!u) throw new Error('上游无图'); return u;
  }
  try {
    let u; try { u = await once(); } catch (e1) { if (stx) stx.textContent = '出图失败，重试中…'; await new Promise(r => setTimeout(r, 1200)); u = await once(); }
    u = await persistImgUrl(u); // 落服务器换同源短链：小体积可持久化（data: 大图会被配额保护剔除→首图丢失）
    state.coverImages = [u]; state.coverImage = u; state.coverCaptions = [{ theme: 'photo', raw: true }]; persist(); renderGzhCover();
    if (stx) { stx.textContent = '✓ 首图已生成'; stx.style.color = '#00a152'; }

  finally { if (btn) { btn.disabled = false; btn.textContent = o; } }
}

// 小红书笔记硬约束：标题≤20字；正文+标签合计≤1000字。AI 偶有超长，这里兜底裁剪
function enforceCopyLimits(st) {
  st.titles = (st.titles || []).map(t => String(t || '').slice(0, 20));
  st.best = String(st.best || '').slice(0, 20);
  const tagsLen = () => (st.tags || []).join('').length;
  const bodyLen = () => (st.body || []).join('').length;
  while (bodyLen() + tagsLen() > 1000 && (st.tags || []).length > 5) st.tags.pop();
  while (bodyLen() + tagsLen() > 1000 && st.body && st.body.length) {
    const last = st.body[st.body.length - 1];
    const over = bodyLen() + tagsLen() - 1000;
    if (last.length > over) { st.body[st.body.length - 1] = last.slice(0, last.length - over); }
    else { st.body.pop(); }
  }
}

// 隐形「降AI味」二次改写：正文生成后自动跑一遍，把最容易被检测判 AI 的写法压掉（用户无感）。
// 实测证据：编号清单/分点排比/比喻/金句/对仗/提问+短答 最像 AI；连续口语+第一人称经历+琐碎具体细节 最像人。
// ===== 降 AI 味 · 闭环「人写化」=====
// 可选外部服务（在浏览器控制台执行 localStorage.setItem 写入即生效，VPS 那台机能访问的域名才行）：
//  ① 专用降AI改写API：localStorage.ag_humanizer = '{"url":"https://你的降AI服务/api","key":"xxx","field":"text","respPath":"data.output"}'
//  ② AI检测打分API ：localStorage.ag_aidetect  = '{"url":"https://检测服务/api","key":"xxx","field":"text","humanPath":"human_score"}'  // 返回 0~100 或 0~1 的人类率
// 两个都没配也能跑（走自建二次扰动改写）；配了检测API就会自动闭环改到 ≥97% 再放行。
function _humCfg(k) { try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : null; } catch { return null; } }
function _humDig(o, path) { try { return path.split('.').reduce((a, c) => (a == null ? a : a[c]), o); } catch { return undefined; } }
async function humanizeViaApi(text) {
  const c = _humCfg('ag_humanizer'); if (!c || !c.url) return '';
  try {
    const body = Object.assign({}, c.extra || {}); body[c.field || 'text'] = text;
    const r = await fetch(c.url, { method: 'POST', signal: AbortSignal.timeout(120000), headers: Object.assign({ 'content-type': 'application/json' }, c.key ? { authorization: 'Bearer ' + c.key } : {}), body: JSON.stringify(body) });
    if (!r.ok) return ''; const j = await r.json();
    const out = c.respPath ? _humDig(j, c.respPath) : (j.output || j.text || j.result || j.data || '');
    return (typeof out === 'string' && out.trim().length > text.length * 0.4) ? out.trim() : '';
  } catch { return ''; }
}
async function aiHumanScore(text) {
  const c = _humCfg('ag_aidetect'); if (!c || !c.url) return null;
  try {
    const body = Object.assign({}, c.extra || {}); body[c.field || 'text'] = text;
    const r = await fetch(c.url, { method: 'POST', signal: AbortSignal.timeout(60000), headers: Object.assign({ 'content-type': 'application/json' }, c.key ? { authorization: 'Bearer ' + c.key } : {}), body: JSON.stringify(body) });
    if (!r.ok) return null; const j = await r.json();
    let s = c.humanPath ? _humDig(j, c.humanPath) : (j.human_score ?? j.human ?? j.humanProbability);
    if (s == null) return null; s = +s; if (s <= 1) s *= 100; return s;
  } catch { return null; }
}
// 一轮"人写化扰动"：路线A(专用降AI服务)优先；否则路线B(二次扰动改写：极端突发性+去AI铁征+真人跑题)
async function humanizeOnce(text, gzh) {
  const api = await humanizeViaApi(text); if (api) return api;
  const p = `下面这段是${gzh ? '公众号' : '小红书'}正文，已经改写过但 GPTZero 仍判 AI。请严格按下面的「Humanizer-zh」规则再做一轮人写化改写，目标让检测器判人类(人类率≥97%)：
${HUMANIZER_ZH}
另外加强突发性：句子长短极端化(一两句拖很长很啰嗦带口头语，紧接一句四五个字短句，绝不均匀)；加 1~2 处真人小跑题/自我更正(如"欸不对""我想想")再自然拉回。
保留全部事实信息与大意，字数相近，不加任何联系方式，硬信息保留「需核实」。
只输出改写后的纯文本(段落用空行分隔)，不要解释、不要JSON、不要任何列表/编号/小标题符号。
原文：
${text}`;
  try { const out = await callClaude({ prompt: p, model: $('#model').value, max_tokens: gzh ? 3400 : 1800, action: 'deai' }); const s = String(out || '').replace(/^```[\s\S]*?\n|```$/g, '').trim(); if (s.length > text.length * 0.4) return perturbZh(s); } catch {}
  return perturbZh(text);
}
// 确定性中文扰动层（不调AI、瞬时）：换掉书面连接词、打散句子长短、稀疏插入口语起头 → 进一步压低 GPTZero 指纹。
// 刻意保守，保证可读性；硬信息/数字/书名一律不动。
function perturbZh(text) {
  if (!text || text.length < 30) return text;
  // 1) 书面连接词/副词 → 口语（整体替换，安全、显著提升真人感）
  const repl = [[/因此/g, '所以'], [/然而/g, '不过'], [/并且/g, '而且'], [/此外/g, '另外'], [/总而言之/g, '反正'], [/综上所述/g, '说到底'], [/与此同时/g, '同时'], [/换句话说/g, '说白了不过这词也别用，意思就是'], [/总的来说/g, '反正'], [/值得注意的是/g, '有一点'], [/不难发现/g, '你会发现'], [/显而易见/g, '明摆着'], [/毋庸置疑/g, '肯定'], [/在我看来/g, '我觉得'], [/通过/g, '靠']];
  // 上面"说白了"那条是反面占位，去掉它，避免引入 AI 口头禅
  let s = text.replace(/说白了不过这词也别用，意思就是/g, '其实就是');
  repl.forEach(([a, b]) => { if (!/说白了/.test(b)) s = s.replace(a, b); });
  // 2) 逐段处理：句子长短打散 + 稀疏口语起头
  const leads = ['其实吧，', '说真的，', '怎么说呢，', '我自己是', '反正', '讲真，', '对了，', '我记得', '嗯，'];
  let li = 0, used = -9; let gi = 0;
  return s.split(/\n{2,}/).map((para, pIdx) => {
    if (!para.trim()) return para;
    // 按句末标点切句（保留标点）
    const parts = para.match(/[^。！？]*[。！？]|[^。！？]+$/g) || [para];
    const out = [];
    parts.forEach((sent) => {
      let cur = sent;
      // 2a) 超长句(>45字且含逗号) → 在中间一个逗号处断成两句
      if (cur.replace(/\s/g, '').length > 45) {
        const commas = []; let m; const re = /[，,]/g; while (m = re.exec(cur)) commas.push(m.index);
        if (commas.length) { const ci = commas[Math.floor(commas.length / 2)]; const a = cur.slice(0, ci).trim(); const b = cur.slice(ci + 1).trim(); if (a.length > 6 && b.length > 6) cur = a + '。' + b; }
      }
      // 2b) 稀疏口语起头：约每 6 句一次，不连续、不在段首第一句、原句没口语起头时才加
      gi++;
      if (gi - used >= 6 && pIdx > 0 && out.length > 0 && !/^(其实|说真|我|反正|对了|嗯|讲真|怎么|你)/.test(cur)) {
        cur = leads[li++ % leads.length] + cur.replace(/^[，。、\s]+/, ''); used = gi;
      }
      out.push(cur);
    });
    return out.join('');
  }).join('\n\n');
}
// 闭环：反复人写化直到检测达标(配了检测API)；没配检测API就多扰动一轮即止
async function humanizeLoop(text, gzh, setMsg) {
  let body = text, score = await aiHumanScore(body), tries = 0;
  while ((score == null && tries < 1) || (score != null && score < 97 && tries < 3)) {
    if (setMsg) setMsg('正在深度人写化' + (score != null ? '（当前人类率 ' + Math.round(score) + '%，目标≥97%）' : '') + '…');
    const h = await humanizeOnce(body, gzh);
    if (h && h.length > body.length * 0.4) body = h;
    tries++;
    score = await aiHumanScore(body);
  }
  return { body, score };
}
async function deAiRewrite(state) {

  if (!bodyText || bodyText.length < 40) return;
  const titles = (state.titles || []).filter(Boolean);
  const prompt = `这是一篇要发${gzh ? '公众号' : '小红书'}的稿子，现在 AI 味很重、被平台限流。请把【正文】彻底重写成"一个真人随手打字发出来"的样子，让 AI 检测器(GPTZero)判为人类；同时【标题候选】也各自改口语些。信息/事实/大意不变、字数大体相当。
正文死规矩（违反任一条都算失败）：
1. 成品里【绝对不许出现】任何列表结构：不许有 1. 2. 3.、①②③、一/二/三、"第一步/第二步/第三步"、"基础期/强化期/冲刺期"这种阶段标签、行首"-"或"·"、（4-6月）这种括号小标题、**加粗**、"正文：""叮嘱："这类冒号标签。全部融进连续的大白话段落。
2. 不许比喻、不许金句、不许工整对仗句、不许"提问+短答"。
2.5 不许文案腔套话/AI 味语气词：如"讲人话就是、说白了、划重点、敲黑板、不夸张地说、真心建议、记住，X不是Y而是Z"——这些是明显 AI 痕迹，一律删掉，直接平铺直叙。
3. 必须第一人称讲自己怎么做的："我自己当时…""我一般是…""我记得好像…"，把知识点和时间安排自然地"说"出来，而不是"列"出来。
4. 句子忽长忽短：有的句子拖很长很啰嗦，有的就四五个字；别每句一样长。
5. 保留所有具体信息（朝代/画家/时间段/书名/数字），只是改成说出来；硬信息保留「需核实」；不加任何联系方式或引流。${gzh ? '可保留极少量 ## 小标题，但小标题要像随口一说、不工整。' : ''}
范例——原(AI)：「第三步：全年背诵规划。基础期（4-6月）：建框架+背核心名词，每天5个。」改(人)：「时间上我自己是这么分的，四到六月那会儿我没急着背，主要在搭框架，顺手每天记五个核心名词。」
标题：改得像随口一说，别工整对仗、别标题党、别加**或符号；${gzh ? '≤30字' : '≤20字'}、不绝对化、不做效果保证；个数与原来一致。
只输出 JSON，不要解释或代码块：{"body":${gzh ? '"整篇正文字符串，段落用\\\\n\\\\n分隔"' : '["段落1","段落2","..."]'},"titles":["改写后的标题",...]}
【原正文】
${bodyText}
【原标题候选】
${JSON.stringify(titles)}`;
  try {
    setAuto && setAuto('正在打磨正文（降 AI 味）…');
    const out = await callClaude({ prompt, model: $('#model').value, max_tokens: gzh ? 3200 : 1700, json: true, action: 'deai' });
    const j = extractJSON(out);
    if (j && j.body) {
      const nb = gzh ? String(j.body).split(/\n{2,}/).map(s => s.trim()).filter(Boolean) : (Array.isArray(j.body) ? j.body.map(s => String(s).trim()).filter(Boolean) : String(j.body).split(/\n{2,}/).map(s => s.trim()).filter(Boolean));
      if (nb.join('\n\n').length > bodyText.length * 0.4) state.body = nb;
    }
    if (j && Array.isArray(j.titles) && j.titles.filter(Boolean).length) {
      state.titles = j.titles.filter(Boolean);
      if (!state.titles.includes(state.best)) state.best = state.titles[0];
    }
    // 第二阶段：闭环「人写化」——在结构化重写之上再做突发性扰动，配了检测API则改到人类率≥97%再放行
    try {
      const joined = (state.body || []).join('\n\n').trim();
      if (joined.length >= 40) {
        const { body: hb, score } = await humanizeLoop(joined, gzh, m => setAuto && setAuto(m));
        if (hb && hb.length > joined.length * 0.4) {
          state.body = hb.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);
        }
        if (score != null) setAuto && setAuto(score >= 97 ? ('✓ 已降到人类率 ' + Math.round(score) + '%') : ('人类率 ' + Math.round(score) + '%（已尽力扰动，建议手动微调几句最像AI的）'));
      }
    } catch (e) {}
    if (!gzh) enforceCopyLimits(state);
  } catch (e) {}
}
// 内页笔记卡/配图文字降AI味：保留卡片结构（标题/小标题/要点），只把每条措辞改成大白话（去金句/比喻/对仗）
async function deAiNotePages(state) {
  const pages = state.notePages || [];
  const texts = []; const map = [];
  pages.forEach((p, pi) => (p && p.blocks || []).forEach((b, bi) => {
    if (b && typeof b.text === 'string' && b.text.trim().length > 6 && b.t !== 'meta') { map.push([pi, bi, 'text']); texts.push(b.text); }
    if (b && Array.isArray(b.items)) b.items.forEach((it, ii) => { const s = (typeof it === 'string') ? it : (it && (it.text || it.content) || ''); if (s && s.trim().length > 6) { map.push([pi, bi, 'item', ii]); texts.push(s); } });
  }));
  if (!texts.length) return;
  const prompt = `这是一组小红书长图笔记卡上的文字条目（每条是卡片上的一行/一点）。请逐条改写措辞，标准和正文降AI味一致：
1. 去掉一切比喻、金句、工整对仗句、"提问+短答"、排比。
2. 去掉条目里残留的序号/①②③/第X步/行首破折号/（时间段）括号小标题/**加粗** 等结构标记，只留纯措辞。
3. 改成大白话口语，能用第一人称口吻就用（"我一般…""我记得…"）；具体信息（朝代/画家/书名/数字）照留。
4. 每条保持简短、意思不变、字数相近（卡片放得下），不合并不增删，按原顺序一一对应。
只输出 JSON 数组，长度与输入完全一致，不要解释或代码块：["改写后第1条","改写后第2条",...]
【原条目】
${JSON.stringify(texts)}`;
  try {
    setAuto && setAuto('正在打磨配图文字（降 AI 味）…');
    const out = await callClaude({ prompt, model: $('#model').value, max_tokens: 2600, json: true, action: 'deai' });
    const arr = extractJSON(out);
    if (!Array.isArray(arr) || arr.length !== texts.length) return;
    map.forEach(([pi, bi, kind, ii], k) => {
      const nv = String(arr[k] || '').trim(); if (!nv) return;
      const b = state.notePages[pi].blocks[bi];
      if (kind === 'text') b.text = nv;
      else if (kind === 'item') { if (typeof b.items[ii] === 'string') b.items[ii] = nv; else if (b.items[ii]) b.items[ii].text = nv; }
    });
    persist();
  } catch (e) {}
}
async function runStep(st) {
  // S2/S3 生成前：逐张视觉解析对标图组（不只封面，每张都解析）
  if ((st.key === 'skeleton' || st.key === 'frame') && (state.refImages || []).length && !(state.refVisions && state.refVisions.length)) {
    setAuto && setAuto('正在逐张视觉解析对标图组…');
    await analyzeRefImageSet(typeof setAuto === 'function' ? setAuto : null);
    renderRefImages(); // 解析完把逐张描述显示在图片下方
  }
  let prompt = st.prompt(state);
  // S2 拆解纳入「逐张」视觉描述。按对标图原始张数逐张列出（个别识别失败也保留占位+正确序号），
  // 不再 filter(Boolean)——否则某张视觉解析失败/超时时会被悄悄丢掉并把后面的序号串位，导致"只分析了第一张"。
  if (st.key === 'skeleton') {
    const visArr = state.refVisions || [];
    const anyVis = visArr.some(d => d && d.trim());
    if (anyVis) {
      const lines = visArr.map((d, i) => `第${i + 1}张：${(d && d.trim()) ? d.trim() : '（这张未能自动识别文字，请结合对标正文推断它在第' + (i + 1) + '位的内容与版式）'}`).join('\n');
      prompt += `\n\n【对标图组 · 共 ${visArr.length} 张 · 逐张视觉解析（每张的文字内容、版式形式、画面与作用——封面的钩子策略、每页干货的呈现方式）】\n` + lines
        + `\n→ ==⑤「逐张图片拆解」与最后的「结构骨架」都必须把第1张到第${visArr.length}张逐一单独列出（每张一条），禁止把多张合并成「图2-4」这类区间，禁止省略任何一张==。`;
    }
    else if (state.refVision) prompt += '\n\n【对标封面 视觉描述】\n' + state.refVision;
  }
  // S3 框架：对每张图逐张拆解并规划"每张图该放什么内容"，张数严格对齐对标原始张数
  if (st.key === 'frame') {
    const visArr = state.refVisions || [];
    const n = visArr.length || (state.refImages || []).length;
    if (visArr.some(d => d && d.trim())) {
      const lines = visArr.map((d, i) => `第${i + 1}张：${(d && d.trim()) ? d.trim() : '（未识别，按正文推断）'}`).join('\n');
      prompt += '\n\n【对标图组 · 逐张拆解（请据此规划本篇每张图的内容与版式：第 i 张放什么干货、用什么版式，跟对标第 i 张对位）】\n' + lines;
    }
    if (n) prompt += `\n→ ==配图规划必须正好 ${n} 张：第1张…一直到第${n}张，与对标图组一一对应，不多不少==。每张写清「第N张：文字内容/干货 + 版式」，缺一张或多一张都不行；不要把多张并成一段，也不要凭空加图。`;
  }
  // S3/正文合并步 带上对标参考（含图片视觉描述）；封面步不带——它只对齐 S3 框架封面规划，避免被对标正文带偏
  if (['frame', 'copy'].includes(st.key)) prompt += refBlock();
  // S2 输出 token 随对标图张数放大：1400 打底，每多 1 张 +320，封顶 3200。否则 6 张图挤在 1400 token 里，模型只能把多张压成「图2-4」
  const refN = (state.refImages || []).length;
  const skTok = Math.min(3200, 1400 + Math.max(0, refN - 2) * 320);
  const maxTok = st.key === 'copy' ? 2600 : st.key === 'frame' ? 3200 : st.key === 'skeleton' ? skTok : 1400;
  const txt = await callClaude({ prompt, model: $('#model').value, max_tokens: maxTok, json: st.type === 'json', action: st.key });
  if (st.type === 'json') {
    const j = extractJSON(txt);
    if (st.key === 'copy') {
      state.body = Array.isArray(j.body) ? j.body : String(j.body || '').split(/\n{2,}/).map(x => x.trim()).filter(Boolean);
      state.titles = j.titles || []; state.best = j.best || (j.titles || [])[0] || ''; state.tags = j.tags || [];
      if (j.summary !== undefined) state.summary = j.summary;
      if (!isGzh()) { enforceCopyLimits(state); }
      await deAiRewrite(state); // 隐形降AI味二次改写
    }
    else if (st.key === 'cover') state.cover = { cover_lines: j.cover_lines || [], visual: j.visual || '' };
  } else { state[st.key] = txt; }
  persist();
}

// 手动：生成当前步骤
async function genStep(st) {
  if (!state.topic) { $('#stStatus').textContent = '请先在上方填写选题'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  if (st.input === 'ref' && !state.ref) { $('#stStatus').textContent = '请先粘贴对标笔记'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  const b = $('#genStep'); b.disabled = true; $('#gi').className = 'spin'; $('#gi').textContent = '◠'; $('#gt').textContent = '生成中'; $('#stStatus').textContent = ''; $('#stStatus').style.color = 'var(--ink-soft)';
  try { await runStep(st); renderPanel(); $('#stStatus').textContent = '✓ 已生成并保存'; }
  catch (e) { $('#stStatus').textContent = '失败：' + (e.message || e); $('#stStatus').style.color = 'var(--cinnabar-deep)'; }
  finally { const bb = $('#genStep'); if (bb) bb.disabled = false; }
}

// 自动：依次跑完 S2–S7（未贴对标则自动跳过 S2）
let autoRunning = false, autoPaused = false;
function setAuto(msg, err) { const el = $('#autoStatus'); if (el) { el.textContent = msg || ''; el.style.color = err ? 'var(--cinnabar-deep)' : 'var(--ink-soft)'; } }
// 暂停闸：autoRun 每步前/后调用，暂停时在此停住，点「继续」才往下走
async function autoGate() { if (!autoPaused) return; setAuto('⏸ 已暂停，点右下角「继续」恢复…'); while (autoPaused && autoRunning) { await new Promise(r => setTimeout(r, 200)); } if (autoRunning) setAuto('▶ 已继续…'); }
function setAutoUI(on) {
  document.body.classList.toggle('auto-running', on);
  const pb = $('#autoPauseBtn');
  if (pb) { pb.style.display = on ? 'block' : 'none'; if (on) { autoPaused = false; pb.textContent = '⏸ 暂停'; } }
}
$('#autoPauseBtn')?.addEventListener('click', () => {
  if (!autoRunning) return;
  autoPaused = !autoPaused;
  const pb = $('#autoPauseBtn'); if (pb) pb.textContent = autoPaused ? '▶ 继续' : '⏸ 暂停';
  // 暂停 → 解除置灰，页面可正常点击操作；继续 → 恢复置灰防误触。暂停按钮始终在，方便恢复。
  document.body.classList.toggle('auto-running', !autoPaused);
  setAuto(autoPaused ? '⏸ 已暂停（当前步跑完即停，页面可操作；点「继续」接着跑）' : '▶ 已继续…');
});
async function autoRun() {
  if (autoRunning) return;
  if (!state.topic) { setAuto('请先在上方填写选题', true); return; }
  // 笔记已生成完成 → 二次确认是否重新生成；确认后从 S2（对标拆解）重新开跑（选题 S1 与已有对标素材保留）
  const notesDone = (state.notePages || []).length > 0 || (state.coverImages || []).some(u => (u || '').startsWith('note://'));
  if (notesDone) {
    const ok = await uiConfirm({
      title: '笔记已生成，是否重新生成？',
      body: '检测到本篇已生成图文笔记。重新生成将从「对标拆解（S2）」开始重跑后续步骤并覆盖现有图文与封面（选题与已粘贴的对标素材会保留）。确定要重新生成吗？',
      okText: '重新生成', cancelText: '保留现有', danger: true, icon: '🔄'
    });
    if (!ok) return;
    // 清掉旧产出，定位回 S2 重新开跑
    state.coverImages = []; state.coverImage = ''; state.coverCaptions = []; state.notePages = []; persist();
    const s2i = STEPS.findIndex(st => st.no === 'S2'); cur = s2i < 0 ? 0 : s2i;
    renderRail(); renderPanel();
  }
  autoRunning = true; setAutoUI(true); const ab = $('#autoBtn'); if (ab) { ab.disabled = true; ab.textContent = '⏳ 自动生成中…'; }
  // 提速：AI 封面只需「主题」（开局已知），不必等后续步骤 → 现在就后台开跑，让 40s 出图与整条文字流水线并行，最后再取结果（几乎不额外耗时）
  const aiCoverPromise = (autoAiCoverOn() && !isGzh()) ? genAiCoverUrl(null).catch(() => '') : null;
  // 提速：对标视觉解析（5 张 vision）也开局并行预取并写进缓存，到 S6 直接命中、不再等
  if ((state.refImages || []).length) analyzeRefImageSet(null).catch(() => {});
  const startIdx = Math.min(Math.max(cur | 0, 0), STEPS.length - 1); // 从「当前所在步」开始，不回到第二步从头跑
  try {
    for (let i = startIdx; i < STEPS.length; i++) {
      await autoGate(); if (!autoRunning) break; // 暂停闸：暂停时停在这里
      const st = STEPS[i];
      if (st.input === 'ref' && !state.ref) continue; // 没贴对标就跳过 S2
      cur = i; renderRail(); renderPanel();
      setAuto('正在生成 ' + dispNo(st.no) + ' · ' + stepDispName(st) + ' …');
      await runStep(st);
      // S6 完成后自动生成多张配图（张数对齐对标，图失败不中断整体）。公众号=长文，只需 1 张横版首图，自己传/单出，不自动批量出竖版笔记卡
      if (st.key === 'cover' && !isGzh()) {
        const cn = coverCount();
        setAuto('正在生成 S6 配图（' + cn + ' 张，对齐对标）…');
        try { await generateCoverImagesCore(cn); } catch (e) { setAuto('配图生成失败（不影响其它）：' + (e.message || e)); }
        try { await deAiNotePages(state); } catch (e) {} // 内页文字降AI味
        // 取开局就并行出好的 AI 封面，放封面位(第一张)，原配图/备忘录卡顺移第二张（replica 与 memo 都要 AI 封面）
        if (aiCoverPromise) try {
          setAuto('正在取并行生成的 AI 封面…');
          const aiUrl = await aiCoverPromise;
          if (aiUrl) {
            state.coverImages = state.coverImages || []; state.coverCaptions = state.coverCaptions || [];
            state.coverImages.unshift(aiUrl); state.coverCaptions.unshift(aiCoverCaption());
            state.coverImage = state.coverImages[0]; persist();
          }
        } catch (e) { setAuto('AI 封面没出来（不影响其它）：' + (e.message || e)); }
      }
      // 公众号：封面步骤后自动生成 1 张横版首图（修「首图不自动生成→图文包缺首图→自检抓不到」三连）
      if (st.key === 'cover' && isGzh()) {
        const hasCov = (state.coverImages || []).some(u => typeof u === 'string' && (/^https?:\/\//.test(u) || u.startsWith('data:')));
        if (!hasCov) {
          setAuto('正在生成公众号横版首图（2.35:1）…');
          try { await genGzhCover(); } catch (e) { setAuto('首图生成失败（不影响正文，可手动重出）：' + (e.message || e)); }
        }
      }
      renderRail(); renderPanel();
    }
    const _completed = autoRunning; // 仍在跑=正常跑完；被「停止」打断则为 false，不自动跳转
    if (_completed) {
      setAuto('✓ 已自动跑完（含封面图）。正在进入「合规自检 · 发布前体检」…');
      try { Draft.save(state); } catch {}
      setTimeout(() => { location.href = '/合规自检.html?auto=1'; }, 1600); // 流程自动衔接到合规自检并自动开跑体检
    } else {
      setAuto('已停止。可去成稿预览 → 或点「去合规自检」做发布前体检');
    }
  } catch (e) { setAuto('中断于 ' + (STEPS[cur] ? STEPS[cur].no : '') + '：' + (e.message || e), true); }
  finally { autoRunning = false; autoPaused = false; setAutoUI(false); const ab2 = $('#autoBtn'); if (ab2) { ab2.disabled = false; ab2.textContent = '▶ 一键按对标生成全套（图文+封面图）'; } }
}
$('#autoBtn')?.addEventListener('click', autoRun);

renderRail(); renderPanel();
</script>
</body>
