<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>创作流水线 · 选题→正文→封面 · 赛道智能体操盘台</title>
<link rel="stylesheet" href="/assets/tw.css?v=1" />
<link rel="stylesheet" href="/assets/atelier.css?v=69" />
</head>
<body class="stage grain min-h-screen" data-page="pipeline">

<!-- 旧 header 已移除：导航由全局外壳（左边栏+顶栏）统一承载 -->
<main class="ag-page">

  <a href="/" class="btn-ghost rounded-lg px-3.5 py-2 text-[13px] inline-flex items-center gap-1.5 mb-4">← 返回工作台</a>
  <div class="mb-5">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">第一步 → 第七步 · 一条流水线</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02;letter-spacing:-.02em">创作<span class="italic" style="color:var(--cinnabar)">流水线</span></h1>
  </div>

  <!-- 当前选题（没选题可手写，或一键生成选题方向）-->
  <div class="card p-4 mb-6">
    <!-- 平台切换：小红书笔记 / 公众号文章（影响对标拆解→大纲→正文→首图 的产出形态）-->
    <div class="flex items-center gap-2 mb-3">
      <span class="text-[11px] text-[var(--ink-soft)] shrink-0">内容平台</span>
      <div id="platformTabs" class="inline-flex rounded-lg overflow-hidden" style="border:1px solid var(--line)">
        <button class="pf-tab" data-pf="xhs" style="padding:6px 14px;font-size:12.5px;font-weight:600;border:none;cursor:pointer">📕 小红书笔记</button>
        <button class="pf-tab" data-pf="gzh" style="padding:6px 14px;font-size:12.5px;font-weight:600;border:none;cursor:pointer;border-left:1px solid var(--line)">📰 公众号文章</button>
      </div>
      <span id="pfHint" class="text-[11px] text-[var(--ink-soft)]"></span>
    </div>
    <div class="flex flex-wrap items-center gap-3">
      <span class="stamp text-[11px] px-2 py-1 leading-none shrink-0">选题</span>
      <input id="topic" class="field flex-1 min-w-[240px] rounded-lg px-3.5 py-2 text-[14px]" placeholder="没有选题？直接在此手写本篇选题，或点右侧「✶ 生成选题」" />
      <select id="model" class="field rounded-lg px-3 py-2 text-[12px] hidden">
        <option value="claude-opus-4-8">Opus 4.8</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button id="genTopicBtn" class="btn-go rounded-lg px-3.5 py-2 text-[12px]">✶ 生成选题方向</button>
      <button id="histBtn" class="btn-ghost rounded-lg px-3 py-2 text-[12px]">📋 历史记录</button>
      <button id="resetBtn" class="btn-ghost rounded-lg px-3 py-2 text-[12px]">清空本篇</button>
    </div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-2">没有选题？直接手写，或点「✶ 生成选题方向」用选题智能体（三层漏斗 / 热点）生成，选完自动带回这里。</div>
  </div>
  <div id="autoStatus" class="text-[12px] text-[var(--ink-soft)] -mt-4 mb-5 min-h-[16px]"></div>

  <div class="grid lg:grid-cols-[230px_1fr] gap-7 items-start">

    <!-- 步骤轨（吸顶跟随滚动）-->
    <aside class="card p-2.5" style="position:sticky;top:74px">
      <div id="rail" class="space-y-1"></div>
      <div class="border-t hairline mt-2.5 pt-2.5 px-1.5 pb-1 space-y-1.5">
        <a id="toPreview" href="/成稿预览.html" class="btn-go rounded-lg w-full block text-center py-2.5 text-[13px] font-medium">去成稿预览 →</a>
        <a id="toCompliance" href="/合规自检.html" class="btn-ghost rounded-lg w-full block text-center py-2.5 text-[13px]">去合规自检 →</a>
        <a id="toPublish" href="/一键发布.html" class="rounded-lg w-full block text-center py-2.5 text-[13px] font-medium" style="background:linear-gradient(180deg,#ffb02e,#ff8a00);color:#fff">🚀 一键发布 →</a>
      </div>
    </aside>

    <!-- 当前步骤 -->
    <section id="panel" class="space-y-4"></section>
  </div>

  <footer class="mt-12 pt-6 border-t hairline flex flex-wrap items-center justify-between gap-3 text-[11px] text-[var(--ink-soft)]">
    <span>S2 对标拆解只看你提供的参考 · 正文原创化、不洗稿 · 不确定标 <span class="needverify">需核实</span></span>
    <span class="font-song">⛔ 成稿后仍需 S8 合规自检 + 运营终审</span>
  </footer>
</main>

<!-- 悬浮：一键按对标生成全套 -->
<button id="autoBtn" class="btn-go font-medium" style="position:fixed;right:26px;bottom:90px;z-index:40;border-radius:999px;padding:14px 24px;font-size:14px;box-shadow:0 10px 30px -6px rgba(255,36,66,.55);white-space:nowrap">▶ 一键按对标生成全套</button>

<!-- 生成选题方向弹窗（嵌入原版选题智能体，三层漏斗/热点）-->
<div id="topicModal" style="display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px">
  <div style="width:min(1080px,96vw);height:88vh;background:var(--paper);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px -16px rgba(0,0,0,.4)">
    <div class="flex items-center justify-between px-4 py-2.5" style="border-bottom:1px solid var(--line)">
      <div class="font-song font-bold text-[14px]">✶ 生成选题方向 · 选题智能体（三层漏斗 / 热点）</div>
      <button id="topicModalClose" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">关闭</button>
    </div>
    <iframe id="topicFrame" title="选题" style="flex:1;border:none;width:100%"></iframe>
  </div>
</div>

<!-- 历史记录弹窗 -->
<div id="histModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px">
  <div class="card" style="width:min(680px,94vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden">
    <div class="flex items-center justify-between px-5 py-4 border-b hairline">
      <div class="font-song font-bold text-[16px]">📋 创作流水线 · 历史记录</div>
      <button id="histClose" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">关闭</button>
    </div>
    <div id="histList" class="p-4 space-y-2.5 overflow-y-auto"></div>
  </div>
</div>

<script src="/assets/tracks.js?v=16"></script>
<script src="/assets/app.js?v=52"></script>
<script>
// 步骤显示名（会议共识：S1/S2…→第一步/第二步…，更直观；内部 key/no 不变）。选题=第一步，故流水线从第二步起。
const STEP_DISP = { S1:'第一步', S2:'第二步', S3:'第三步', S4:'第四步', S5:'第五步', S6:'第六步', S7:'第七步', S8:'第八步' };
const dispNo = no => STEP_DISP[no] || no;
// 内容平台：xhs=小红书笔记 / gzh=公众号文章。影响各步 prompt 与产出形态。
const isGzh = () => (state && state.platform) === 'gzh';
// 步骤显示名按平台变（key 不变）
function stepDispName(st) {
  if (!isGzh()) return st.name;
  return { skeleton:'对标拆解', frame:'文章大纲', copy:'正文·标题·摘要', cover:'首图·摘要' }[st.key] || st.name;
}
const STEPS = [
  { no:'S2', key:'skeleton', name:'对标拆解', type:'text', input:'ref',
    uses: s => '本篇选题 + 你粘贴的对标',
    prompt: s => isGzh()
      ? `仅基于用户提供的这篇对标【公众号文章】拆解（不臆测数据，不照抄原文）：
【本篇选题】${s.topic}
【对标文章】${s.ref}
请逐项给：①选题角度切的痛点/情绪 ②标题钩子（公众号标题套路）③开头怎么抓人（前两段如何留人）④正文结构：分几个小标题段落、每段讲什么、论证节奏（故事/观点/案例/金句怎么排）⑤升华与结尾引导（点赞/在看/转发/关注怎么收）⑥一句话总结「可能为什么爆」+ 哪些可借鉴。最后产出一份可复用的「长文结构骨架」（开头→各小标题段→结尾，分点列出）。直接输出中文文本，不要代码块。`
      : `仅基于用户提供的这篇对标笔记拆解（不臆测平台数据，不照抄原文）：
【本篇选题】${s.topic}
【对标笔记】${s.ref}
请逐项给：①选题角度切的痛点 ②标题钩子 ③开头前3行怎么抓人 ④正文结构分块与节奏 ⑤【逐张图片拆解】不只看封面——对标的每一张图都拆：这张图上的实际文字内容（标题/要点/数字照实列）、版式形式（封面大字/编号清单/前后对比/数据）、可复用的呈现方式 ⑥一句话总结「可能为什么有效」+ 哪些是可借鉴的方法。最后产出一份可复用的「结构骨架」（分点列出，并标明每张图该放什么内容），供本篇借鉴。直接输出中文文本，不要代码块。` },
  { no:'S3', key:'frame', name:'框架', type:'text',
    uses: s => '选题 + S2 结构骨架',
    prompt: s => isGzh() ? `为下面这个选题设计一篇【微信公众号文章】的大纲。==严格围绕【选题】和【S2 拆解】的真实主题，绝不套用其它领域==：
【选题】${s.topic}
【可借鉴结构骨架(S2)】${s.skeleton || '（无，按常见好结构搭）'}
给出：
1) 标题方向（2 个，公众号风格、≤30字、有钩子不标题党）
2) 开头（2 段以内：用故事/痛点/反常识/数据中的一种快速留人，不铺垫）
3) 正文主体：拆成 4～6 个【## 小标题】段落，逐个写清"这段讲什么 + 关键论点/案例/金句"（结合本领域真实信息点，不确定标「需核实」）
4) 结尾：升华 + 合规互动引导（点赞/在看/转发/关注，不导流站外、不留联系方式）
5) 首图建议：一句话描述首图画面（横版 2.35:1，绝不出现文字）
只输出文本，不写完整正文，不要代码块。`
      : (() => { const refN = (s.refImages || []).length; return `为下面这个选题设计本篇结构骨架。==严格围绕【选题】和【S2 拆解】的真实主题来写，topic/对标是什么领域就写什么领域，绝不套用其它行业的话术或案例==：
【选题】${s.topic}
【可借鉴的结构骨架(S2)】${s.skeleton || '（无，按常见好结构搭）'}
给以下四部分：
1) 开头钩子（2个方向）
2) 主体分几段、每段讲什么（结合本选题所属领域的真实信息点，不确定标「需核实」）
3) 结尾合规互动引导（不导流站外）
4) 【配图规划】${refN ? `对标有 ${refN} 张图，就规划 ${refN} 张` : '规划 3～5 张'}（第1张=封面），基于 S2 的「逐张图片拆解」，为每张图按下面格式**逐张**输出（这部分会直接驱动生图，务必写具体）：
第1张（封面）：
· 作用：（这张图在本篇起什么作用）
· 生图提示词：（一句话描述这张图该画的【画面内容】，换成本篇主题——具体的主体/场景/动作/构图/配色；==绝不出现任何文字/字母/数字==；这句会被直接拿去生图）
· 文字要点：（叠在图上的标题或要点，≤3条、每条≤10字；纯实拍展示图可留空）
第2张：……（同样三行格式）
……依次写到第${refN || 'N'}张
只输出文本，不写完整正文，不要代码块。`; })() },
  { no:'S4', key:'copy', name:'正文·标题·标签', type:'json',
    uses: s => '选题 + S3 框架',
    prompt: s => isGzh()
      ? `按下面大纲，产出一篇完整的【微信公众号文章】（真人口吻、有观点有信息量、避免 AI 腔）：
【选题】${s.topic}
【大纲(S3)】${s.frame || '（无，自行合理组织）'}
要求：
· 正文：1500～2500字；开头两段内快速留人；正文用【## 小标题】分 4～6 段（每个小标题单独成段，紧跟该段正文）；多用具体案例/数字/金句，少空话；涉及${getTrack().hardInfo}等硬信息一律写「需核实」；原创、不与对标实质相似；结尾升华 + 合规互动引导（点赞/在看/转发/关注），不留任何联系方式。
· body：==整篇正文放在一个字符串里==，段落之间用一个空行（\\n\\n）分隔，小标题段落以"## "开头（如"## 一、xxx"）。正文里若要用引号请用中文引号""，不要用英文双引号（避免破坏 JSON）。
· 标题：给 3 个公众号标题，≤30字、有钩子不标题党、不绝对化、不做承诺，并选最推荐一个。
· 摘要：一句话 ≤120字（公众号"摘要"栏用，能勾人点开）。
只输出 JSON：{"body":"第一段\\n\\n## 一、小标题\\n\\n这段正文…\\n\\n## 二、小标题\\n\\n…","titles":["标题1","标题2","标题3"],"best":"最推荐标题","summary":"一句话摘要"}`
      : `按下面框架，一次性产出本篇的【正文 + 标题候选 + 标签】（用过来人第一人称，真人感，避免明显 AI 腔）：
【选题】${s.topic}
【框架(S3)】${s.frame || '（无，自行合理组织）'}
要求：
· 正文：开头前3行必须是钩子不铺垫；分点/分段、口语、emoji 适度；信息真实，涉及${getTrack().hardInfo}等硬信息一律写「需核实」；原创不与对标实质相似；结尾一句合规互动引导，不留任何联系方式。==正文 + 标签合计字数(含标签里的"#")不能超过1000字，请控制在800字以内留余量==。
· 标题：给 3–5 个，==每个严格≤20字（含标点，超出算不合格，请数清楚字数再输出）==，带钩子(痛点/数字/身份/悬念)，不标题党/不绝对化/不做上岸保证，并选出最推荐的一个。
· 标签：5–8 个，3 个大流量(如 ${getTrack().bigTags.join(' ')}) + 若干精准(细分/地域/痛点)，剔除凑数。
只输出 JSON：{"body":["段落1","段落2","..."],"titles":["标题1","..."],"best":"最推荐标题","tags":["#标签1","..."]}` },
  { no:'S5', key:'cover', name:'封面·配图', type:'json',
    uses: s => 'S3 框架·封面规划',
    prompt: s => isGzh()
      ? `给这篇【公众号文章】做首图方案：
【选题】${s.topic}
【大纲(S3)】${(s.frame||'').slice(0,800)}
输出：cover_lines = 首图主标题 1～2 行(每行≤14字，抓眼球)；visual = 首图视觉建议（==横版 2.35:1==、画面内容、配色、构图，绝不含文字）。
只输出 JSON：{"cover_lines":["第一行","第二行"],"visual":"横版2.35:1 视觉与构图建议"}`
      : (() => { const fc = (typeof frameSliceForImage === 'function' && frameSliceForImage(1)) || ''; return `给这篇做封面方案，==必须与下面 S3 框架里"第1张(封面)"的规划保持一致==：文案用它「文字/主标题」的意思，视觉建议照搬它「版式/画面/配色」的描述（背景色、高亮色、关键词、构图都要对上），不要另起炉灶、不要编造。
${fc ? '【S3 框架·封面(第1张)规划】\n' + fc : '【提示】S3 框架里没找到第1张(封面)规划，请先去跑 S3 并写清"配图规划：第1张(封面)…"'}
【选题】${s.topic}
输出：cover_lines = 封面文案2行(每行≤12字，取自上面规划的主标题/副标题)；visual = 视觉与构图建议(背景色/高亮关键词/构图，与上面规划一致)。
只输出 JSON：{"cover_lines":["第一行","第二行"],"visual":"视觉与构图建议"}`; })() },
];

const newRunId = () => 'r' + Date.now() + Math.random().toString(36).slice(2, 7);
// 入口意图：?new=1（侧栏「开始创作笔记」/ Hero「开始创作」/「创作流水线」卡 / 新手引导）→ 开新篇、清掉上一篇草稿；
// 其它入口（我的作品续写、流水线内跳转、模板带选题）沿用当前草稿。
(function () { try { if (new URLSearchParams(location.search).get('new') === '1') { Draft.clear(); ['ag_topic', 'ag_persona', 'ag_direction'].forEach(k => { try { localStorage.removeItem(k); } catch {} }); history.replaceState(null, '', location.pathname); } } catch {} })();
let state = Object.assign({ topic:'', ref:'' }, Draft.load());
// 「带入流水线」：从智能体页「自定义 Skill 运行结果」带入的素材 → 作为本篇选题 + 对标素材(ref)，落地后可直接从 S2 开始
let _seededSkill = '';
try {
  const seedRaw = localStorage.getItem('ag_pipeline_seed');
  if (seedRaw) {
    const seed = JSON.parse(seedRaw);
    localStorage.removeItem('ag_pipeline_seed');
    if (seed && seed.material && (Date.now() - (seed.ts || 0) < 10 * 60 * 1000)) {
      state = { topic: (seed.topic || '').slice(0, 80), ref: String(seed.material || '').slice(0, 6000) };
      _seededSkill = seed.skill || '技能';
      Draft.save(state);
    }
  }
} catch {}
// 打开已有进度时，定位到「第一个未完成步骤」作为创作落点（从首页作品点进来直接到当前步）
function landingStep() {
  try {
    // 已完成（有封面/配图）→ 直接定位到第五步「封面·配图」（最后一步），方便复看/重出图
    const hasImgs = (state.coverImages && state.coverImages.length) || state.coverImage;
    const coverIdx = STEPS.findIndex(st => st.no === 'S5');
    if (hasImgs && coverIdx >= 0) return coverIdx;
    const fi = STEPS.findIndex(st => !doneOf(state, st));
    return fi < 0 ? Math.max(0, STEPS.length - 1) : fi;
  } catch { return 0; }
}
if (!state._runId) state._runId = newRunId();
let cur = landingStep();
$('#topic').value = state.topic || '';
$('#model').value = localStorage.getItem('ag_model') || 'claude-opus-4-8';
$('#topic').addEventListener('input', e => { state.topic = e.target.value; persistSoft(); });
// —— 内容平台切换（小红书笔记 / 公众号文章）——
if (!state.platform) state.platform = 'xhs';
function renderPlatformTabs() {
  document.querySelectorAll('#platformTabs .pf-tab').forEach(b => {
    const on = b.dataset.pf === state.platform;
    b.style.background = on ? 'var(--cinnabar)' : '#fff';
    b.style.color = on ? '#fff' : 'var(--ink-soft)';
  });
  const h = $('#pfHint'); if (h) h.textContent = isGzh() ? '长文 · 无标签 · 首图横版 2.35:1' : '短笔记 · 带话题标签 · 封面竖版 3:4';

// ===== 达标/互动/粉丝 的全局判定（renderBenchNotes / fillBenchFans / paintFans 共用一套，口径一致）=====
function benchCutNum() { const cut = new Date(Date.now() - benchWindow * 30.4 * 86400000); return cut.getFullYear() * 10000 + (cut.getMonth() + 1) * 100 + cut.getDate(); }

    else { el.textContent = '· 粉丝 加载中…'; el.style.color = '#b6bbc2'; }
  });
  // 进度：已抓 / 总唯一博主数
  const prog = document.getElementById('benchFansProg');
  if (prog) {
    const uids = new Set(), done = new Set();
    for (const n of benchNotes) { if (n && n.userId) { uids.add(n.userId); if (n.fans != null) done.add(n.userId); } }
    if (!uids.size || noExt) prog.textContent = '';
    else if (done.size >= uids.size) prog.textContent = ' · 粉丝已加载 ' + uids.size + '/' + uids.size;
    else prog.textContent = ' · 粉丝加载中 ' + done.size + '/' + uids.size + '…';
  }
}
// 解析"1.2万/3000+"等为数字，用于排序
function parseCount(v) {
  if (typeof v === 'number') return v;
  const s = String(v || '').replace(/\+/g, '').trim(); if (!s) return 0;
  const m = s.match(/([\d.]+)\s*(万|w|k|千)?/i); if (!m) return 0;
  let n = parseFloat(m[1]) || 0; const u = (m[2] || '').toLowerCase();
  if (u === '万' || u === 'w') n *= 10000; else if (u === 'k' || u === '千') n *= 1000;
  return n;
}
// 按对标建议的关键词，走 xhs(agent-reach) 聚合抓取约 20 篇真实笔记（去重）。存入 benchNotes，由 renderBenchNotes 按当前排序渲染。

  const seen = new Set(), all = [];

        j = await window.xhsExt.search(kws[i], benchFetchSort, benchFetchType);
        if (j && j.needLogin) { if (st) st.textContent = '⚠ 请先在浏览器里登录小红书，再回来抓（插件用你自己的账号，不限次）'; if (btn) { btn.disabled = false; btn.textContent = o; } return; }

// 对标参考块：标题+正文+标签（来自 state.ref）+ 图片视觉描述（GLM-4V）。带进 S3–S7 一起解析。
function refBlock() {
  let b = '';
  if (state.ref && state.ref.trim()) b += '【对标笔记（标题+正文+话题标签）】\n' + state.ref.trim().slice(0, 2500) + '\n';

  else if (state.refVision && state.refVision.trim()) b += '【对标图片/封面 视觉描述】\n' + state.refVision.trim() + '\n';
  return b ? ('\n\n参考下面这篇对标（仅借鉴其方法/结构/视觉策略，绝不照抄、不洗稿）：\n' + b) : '';
}

// 小红书笔记硬约束：标题≤20字；正文+标签合计≤1000字。AI 偶有超长，这里兜底裁剪
function enforceCopyLimits(st) {
  st.titles = (st.titles || []).map(t => String(t || '').slice(0, 20));
  st.best = String(st.best || '').slice(0, 20);
  const tagsLen = () => (st.tags || []).join('').length;
  const bodyLen = () => (st.body || []).join('').length;
  while (bodyLen() + tagsLen() > 1000 && (st.tags || []).length > 5) st.tags.pop();
  while (bodyLen() + tagsLen() > 1000 && st.body && st.body.length) {
    const last = st.body[st.body.length - 1];
    const over = bodyLen() + tagsLen() - 1000;
    if (last.length > over) { st.body[st.body.length - 1] = last.slice(0, last.length - over); }
    else { st.body.pop(); }
  }
}

async function runStep(st) {
  // S2/S3 生成前：逐张视觉解析对标图组（不只封面，每张都解析）
  if ((st.key === 'skeleton' || st.key === 'frame') && (state.refImages || []).length && !(state.refVisions && state.refVisions.length)) {
    setAuto && setAuto('正在逐张视觉解析对标图组…');
    await analyzeRefImageSet(typeof setAuto === 'function' ? setAuto : null);
    renderRefImages(); // 解析完把逐张描述显示在图片下方
  }
  let prompt = st.prompt(state);
  // S2 拆解纳入「逐张」视觉描述。按对标图原始张数逐张列出（个别识别失败也保留占位+正确序号），
  // 不再 filter(Boolean)——否则某张视觉解析失败/超时时会被悄悄丢掉并把后面的序号串位，导致"只分析了第一张"。
  if (st.key === 'skeleton') {
    const visArr = state.refVisions || [];
    const anyVis = visArr.some(d => d && d.trim());
    if (anyVis) {
      const lines = visArr.map((d, i) => `第${i + 1}张：${(d && d.trim()) ? d.trim() : '（这张未能自动识别文字，请结合对标正文推断它在第' + (i + 1) + '位的内容与版式）'}`).join('\n');
      prompt += `\n\n【对标图组 · 共 ${visArr.length} 张 · 逐张视觉解析（每张的文字内容、版式形式、画面与作用——封面的钩子策略、每页干货的呈现方式）】\n` + lines
        + `\n→ ==⑤「逐张图片拆解」与最后的「结构骨架」都必须把第1张到第${visArr.length}张逐一单独列出（每张一条），禁止把多张合并成「图2-4」这类区间，禁止省略任何一张==。`;
    }
    else if (state.refVision) prompt += '\n\n【对标封面 视觉描述】\n' + state.refVision;
  }
  // S3 框架：对每张图逐张拆解并规划"每张图该放什么内容"，张数严格对齐对标原始张数
  if (st.key === 'frame') {
    const visArr = state.refVisions || [];
    const n = visArr.length || (state.refImages || []).length;
    if (visArr.some(d => d && d.trim())) {
      const lines = visArr.map((d, i) => `第${i + 1}张：${(d && d.trim()) ? d.trim() : '（未识别，按正文推断）'}`).join('\n');
      prompt += '\n\n【对标图组 · 逐张拆解（请据此规划本篇每张图的内容与版式：第 i 张放什么干货、用什么版式，跟对标第 i 张对位）】\n' + lines;
    }
    if (n) prompt += `\n→ ==配图规划必须正好 ${n} 张：第1张…一直到第${n}张，与对标图组一一对应，不多不少==。每张写清「第N张：文字内容/干货 + 版式」，缺一张或多一张都不行；不要把多张并成一段，也不要凭空加图。`;
  }
  // S3/正文合并步 带上对标参考（含图片视觉描述）；封面步不带——它只对齐 S3 框架封面规划，避免被对标正文带偏
  if (['frame', 'copy'].includes(st.key)) prompt += refBlock();
  // S2 输出 token 随对标图张数放大：1400 打底，每多 1 张 +320，封顶 3200。否则 6 张图挤在 1400 token 里，模型只能把多张压成「图2-4」
  const refN = (state.refImages || []).length;
  const skTok = Math.min(3200, 1400 + Math.max(0, refN - 2) * 320);
  const maxTok = st.key === 'copy' ? 2600 : st.key === 'frame' ? 3200 : st.key === 'skeleton' ? skTok : 1400;
  const txt = await callClaude({ prompt, model: $('#model').value, max_tokens: maxTok, json: st.type === 'json', action: st.key });
  if (st.type === 'json') {
    const j = extractJSON(txt);
    if (st.key === 'copy') {
      state.body = Array.isArray(j.body) ? j.body : String(j.body || '').split(/\n{2,}/).map(x => x.trim()).filter(Boolean);
      state.titles = j.titles || []; state.best = j.best || (j.titles || [])[0] || ''; state.tags = j.tags || [];
      if (j.summary !== undefined) state.summary = j.summary;
      if (!isGzh()) { enforceCopyLimits(state); }
    }
    else if (st.key === 'cover') state.cover = { cover_lines: j.cover_lines || [], visual: j.visual || '' };
  } else { state[st.key] = txt; }
  persist();
}

// 手动：生成当前步骤
async function genStep(st) {
  if (!state.topic) { $('#stStatus').textContent = '请先在上方填写选题'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  if (st.input === 'ref' && !state.ref) { $('#stStatus').textContent = '请先粘贴对标笔记'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  const b = $('#genStep'); b.disabled = true; $('#gi').className = 'spin'; $('#gi').textContent = '◠'; $('#gt').textContent = '生成中'; $('#stStatus').textContent = ''; $('#stStatus').style.color = 'var(--ink-soft)';
  try { await runStep(st); renderPanel(); $('#stStatus').textContent = '✓ 已生成并保存'; }
  catch (e) { $('#stStatus').textContent = '失败：' + (e.message || e); $('#stStatus').style.color = 'var(--cinnabar-deep)'; }
  finally { const bb = $('#genStep'); if (bb) bb.disabled = false; }
}

// 自动：依次跑完 S2–S7（未贴对标则自动跳过 S2）
let autoRunning = false;
function setAuto(msg, err) { const el = $('#autoStatus'); if (el) { el.textContent = msg || ''; el.style.color = err ? 'var(--cinnabar-deep)' : 'var(--ink-soft)'; } }
async function autoRun() {
  if (autoRunning) return;
  if (!state.topic) { setAuto('请先在上方填写选题', true); return; }
  autoRunning = true; const ab = $('#autoBtn'); if (ab) { ab.disabled = true; ab.textContent = '⏳ 自动生成中…'; }
  try {
    for (let i = 0; i < STEPS.length; i++) {
      const st = STEPS[i];
      if (st.input === 'ref' && !state.ref) continue; // 没贴对标就跳过 S2
      cur = i; renderRail(); renderPanel();
      setAuto('正在生成 ' + dispNo(st.no) + ' · ' + stepDispName(st) + ' …');
      await runStep(st);
      // S6 完成后自动生成多张配图（张数对齐对标，图失败不中断整体）。公众号=长文，只需 1 张横版首图，自己传/单出，不自动批量出竖版笔记卡
      if (st.key === 'cover' && !isGzh()) {
        const cn = coverCount();
        setAuto('正在生成 S6 配图（' + cn + ' 张，对齐对标）…');
        try { await generateCoverImagesCore(cn); } catch (e) { setAuto('配图生成失败（不影响其它）：' + (e.message || e)); }
      }
      renderRail(); renderPanel();
    }
    setAuto('✓ 已自动跑完（' + (state.ref ? 'S2–S7' : 'S3–S7，未贴对标已跳过 S2') + '，含封面图）。可去成稿预览 →');
  } catch (e) { setAuto('中断于 ' + (STEPS[cur] ? STEPS[cur].no : '') + '：' + (e.message || e), true); }
  finally { autoRunning = false; const ab2 = $('#autoBtn'); if (ab2) { ab2.disabled = false; ab2.textContent = '▶ 一键按对标生成全套（图文+封面图）'; } }
}
$('#autoBtn')?.addEventListener('click', autoRun);

renderRail(); renderPanel();
</script>
</body>
