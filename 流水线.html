<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>创作流水线 · 选题→正文→封面 · 赛道智能体操盘台</title>

</head>
<body class="stage grain min-h-screen" data-page="pipeline">

<!-- 旧 header 已移除：导航由全局外壳（左边栏+顶栏）统一承载 -->
<main class="ag-page">

  <a href="/" class="btn-ghost rounded-lg px-3.5 py-2 text-[13px] inline-flex items-center gap-1.5 mb-4">← 返回工作台</a>
  <div class="mb-5">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">第一步 → 第七步 · 一条流水线</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02;letter-spacing:-.02em">创作<span class="italic" style="color:var(--cinnabar)">流水线</span></h1>
  </div>

  <!-- 当前选题（没选题可手写，或一键生成选题方向）-->
  <div class="card p-4 mb-6">
    <div class="flex flex-wrap items-center gap-3">
      <span class="stamp text-[11px] px-2 py-1 leading-none shrink-0">选题</span>
      <input id="topic" class="field flex-1 min-w-[240px] rounded-lg px-3.5 py-2 text-[14px]" placeholder="没有选题？直接在此手写本篇选题，或点右侧「✶ 生成选题」" />
      <select id="model" class="field rounded-lg px-3 py-2 text-[12px] hidden">
        <option value="claude-opus-4-8">Opus 4.8</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button id="genTopicBtn" class="btn-go rounded-lg px-3.5 py-2 text-[12px]">✶ 生成选题方向</button>
      <button id="histBtn" class="btn-ghost rounded-lg px-3 py-2 text-[12px]">📋 历史记录</button>
      <button id="resetBtn" class="btn-ghost rounded-lg px-3 py-2 text-[12px]">清空本篇</button>
    </div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-2">没有选题？直接手写，或点「✶ 生成选题方向」用选题智能体（三层漏斗 / 热点）生成，选完自动带回这里。</div>
  </div>
  <div id="autoStatus" class="text-[12px] text-[var(--ink-soft)] -mt-4 mb-5 min-h-[16px]"></div>

  <div class="grid lg:grid-cols-[230px_1fr] gap-7 items-start">

    <!-- 步骤轨（吸顶跟随滚动）-->
    <aside class="card p-2.5" style="position:sticky;top:74px">
      <div id="rail" class="space-y-1"></div>
      <div class="border-t hairline mt-2.5 pt-2.5 px-1.5 pb-1 space-y-1.5">
        <a id="toPreview" href="/成稿预览.html" class="btn-go rounded-lg w-full block text-center py-2.5 text-[13px] font-medium">去成稿预览 →</a>
        <a id="toCompliance" href="/合规自检.html" class="btn-ghost rounded-lg w-full block text-center py-2.5 text-[13px]">去合规自检 →</a>
      </div>
    </aside>

    <!-- 当前步骤 -->
    <section id="panel" class="space-y-4"></section>
  </div>

  <footer class="mt-12 pt-6 border-t hairline flex flex-wrap items-center justify-between gap-3 text-[11px] text-[var(--ink-soft)]">
    <span>S2 对标拆解只看你提供的参考 · 正文原创化、不洗稿 · 不确定标 <span class="needverify">需核实</span></span>
    <span class="font-song">⛔ 成稿后仍需 S8 合规自检 + 运营终审</span>
  </footer>
</main>

<!-- 悬浮：一键按对标生成全套 -->
<button id="autoBtn" class="btn-go font-medium" style="position:fixed;right:26px;bottom:90px;z-index:40;border-radius:999px;padding:14px 24px;font-size:14px;box-shadow:0 10px 30px -6px rgba(255,36,66,.55);white-space:nowrap">▶ 一键按对标生成全套</button>

<!-- 生成选题方向弹窗（嵌入原版选题智能体，三层漏斗/热点）-->
<div id="topicModal" style="display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px">
  <div style="width:min(1080px,96vw);height:88vh;background:var(--paper);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px -16px rgba(0,0,0,.4)">
    <div class="flex items-center justify-between px-4 py-2.5" style="border-bottom:1px solid var(--line)">
      <div class="font-song font-bold text-[14px]">✶ 生成选题方向 · 选题智能体（三层漏斗 / 热点）</div>
      <button id="topicModalClose" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">关闭</button>
    </div>
    <iframe id="topicFrame" title="选题" style="flex:1;border:none;width:100%"></iframe>
  </div>
</div>

<!-- 历史记录弹窗 -->
<div id="histModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px">
  <div class="card" style="width:min(680px,94vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden">
    <div class="flex items-center justify-between px-5 py-4 border-b hairline">
      <div class="font-song font-bold text-[16px]">📋 创作流水线 · 历史记录</div>
      <button id="histClose" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]">关闭</button>
    </div>
    <div id="histList" class="p-4 space-y-2.5 overflow-y-auto"></div>
  </div>
</div>

<script src="/assets/tracks.js?v=16"></script>
<script src="/assets/app.js?v=35"></script>
<script>
// 步骤显示名（会议共识：S1/S2…→第一步/第二步…，更直观；内部 key/no 不变）。选题=第一步，故流水线从第二步起。
const STEP_DISP = { S1:'第一步', S2:'第二步', S3:'第三步', S4:'第四步', S5:'第五步', S6:'第六步', S7:'第七步', S8:'第八步' };
const dispNo = no => STEP_DISP[no] || no;
const STEPS = [
  { no:'S2', key:'skeleton', name:'对标拆解', type:'text', input:'ref',
    uses: s => '本篇选题 + 你粘贴的对标笔记',
    prompt: s => `仅基于用户提供的这篇对标笔记拆解（不臆测平台数据，不照抄原文）：
【本篇选题】${s.topic}
【对标笔记】${s.ref}
请逐项给：①选题角度切的痛点 ②标题钩子 ③开头前3行怎么抓人 ④正文结构分块与节奏 ⑤【逐张图片拆解】不只看封面——对标的每一张图都拆：这张图上的实际文字内容（标题/要点/数字照实列）、版式形式（封面大字/编号清单/前后对比/数据）、可复用的呈现方式 ⑥一句话总结「可能为什么有效」+ 哪些是可借鉴的方法。最后产出一份可复用的「结构骨架」（分点列出，并标明每张图该放什么内容），供本篇借鉴。直接输出中文文本，不要代码块。` },
  { no:'S3', key:'frame', name:'框架', type:'text',
    uses: s => '选题 + S2 结构骨架',
    prompt: s => { const refN = (s.refImages || []).length; return `为下面这个选题设计本篇结构骨架。==严格围绕【选题】和【S2 拆解】的真实主题来写，topic/对标是什么领域就写什么领域，绝不套用其它行业的话术或案例==：
【选题】${s.topic}
【可借鉴的结构骨架(S2)】${s.skeleton || '（无，按常见好结构搭）'}
给以下四部分：
1) 开头钩子（2个方向）
2) 主体分几段、每段讲什么（结合本选题所属领域的真实信息点，不确定标「需核实」）
3) 结尾合规互动引导（不导流站外）
4) 【配图规划】${refN ? `对标有 ${refN} 张图，就规划 ${refN} 张` : '规划 3～5 张'}（第1张=封面），基于 S2 的「逐张图片拆解」，为每张图按下面格式**逐张**输出（这部分会直接驱动生图，务必写具体）：
第1张（封面）：
· 作用：（这张图在本篇起什么作用）
· 生图提示词：（一句话描述这张图该画的【画面内容】，换成本篇主题——具体的主体/场景/动作/构图/配色；==绝不出现任何文字/字母/数字==；这句会被直接拿去生图）
· 文字要点：（叠在图上的标题或要点，≤3条、每条≤10字；纯实拍展示图可留空）
第2张：……（同样三行格式）
……依次写到第${refN || 'N'}张
只输出文本，不写完整正文，不要代码块。`; } },
  { no:'S4', key:'copy', name:'正文·标题·标签', type:'json',
    uses: s => '选题 + S3 框架',
    prompt: s => `按下面框架，一次性产出本篇的【正文 + 标题候选 + 标签】（用过来人第一人称，真人感，避免明显 AI 腔）：
【选题】${s.topic}
【框架(S3)】${s.frame || '（无，自行合理组织）'}
要求：
· 正文：开头前3行必须是钩子不铺垫；分点/分段、口语、emoji 适度；信息真实，涉及${getTrack().hardInfo}等硬信息一律写「需核实」；原创不与对标实质相似；结尾一句合规互动引导，不留任何联系方式。
· 标题：给 3–5 个，≤20字、带钩子(痛点/数字/身份/悬念)，不标题党/不绝对化/不做上岸保证，并选出最推荐的一个。
· 标签：5–8 个，3 个大流量(如 ${getTrack().bigTags.join(' ')}) + 若干精准(细分/地域/痛点)，剔除凑数。
只输出 JSON：{"body":["段落1","段落2","..."],"titles":["标题1","..."],"best":"最推荐标题","tags":["#标签1","..."]}` },
  { no:'S5', key:'cover', name:'封面·配图', type:'json',
    uses: s => 'S3 框架·封面规划',
    prompt: s => { const fc = (typeof frameSliceForImage === 'function' && frameSliceForImage(1)) || ''; return `给这篇做封面方案，==必须与下面 S3 框架里"第1张(封面)"的规划保持一致==：文案用它「文字/主标题」的意思，视觉建议照搬它「版式/画面/配色」的描述（背景色、高亮色、关键词、构图都要对上），不要另起炉灶、不要编造。
${fc ? '【S3 框架·封面(第1张)规划】\n' + fc : '【提示】S3 框架里没找到第1张(封面)规划，请先去跑 S3 并写清"配图规划：第1张(封面)…"'}
【选题】${s.topic}
输出：cover_lines = 封面文案2行(每行≤12字，取自上面规划的主标题/副标题)；visual = 视觉与构图建议(背景色/高亮关键词/构图，与上面规划一致)。
只输出 JSON：{"cover_lines":["第一行","第二行"],"visual":"视觉与构图建议"}`; } },
];

const newRunId = () => 'r' + Date.now() + Math.random().toString(36).slice(2, 7);
// 入口意图：?new=1（侧栏「开始创作笔记」/ Hero「开始创作」/「创作流水线」卡 / 新手引导）→ 开新篇、清掉上一篇草稿；
// 其它入口（我的作品续写、流水线内跳转、模板带选题）沿用当前草稿。
(function () { try { if (new URLSearchParams(location.search).get('new') === '1') { Draft.clear(); ['ag_topic', 'ag_persona', 'ag_direction'].forEach(k => { try { localStorage.removeItem(k); } catch {} }); history.replaceState(null, '', location.pathname); } } catch {} })();
let state = Object.assign({ topic:'', ref:'' }, Draft.load());
// 打开已有进度时，定位到「第一个未完成步骤」作为创作落点（从首页作品点进来直接到当前步）
function landingStep() {
  try {
    // 已完成（有封面/配图）→ 直接定位到第五步「封面·配图」（最后一步），方便复看/重出图
    const hasImgs = (state.coverImages && state.coverImages.length) || state.coverImage;
    const coverIdx = STEPS.findIndex(st => st.no === 'S5');
    if (hasImgs && coverIdx >= 0) return coverIdx;
    const fi = STEPS.findIndex(st => !doneOf(state, st));
    return fi < 0 ? Math.max(0, STEPS.length - 1) : fi;
  } catch { return 0; }
}
if (!state._runId) state._runId = newRunId();
let cur = landingStep();
$('#topic').value = state.topic || '';
$('#model').value = localStorage.getItem('ag_model') || 'claude-opus-4-8';
$('#topic').addEventListener('input', e => { state.topic = e.target.value; persistSoft(); });

// 选题已并入流水线：「✶ 生成选题方向」弹框内用原版选题智能体（三层漏斗/热点·逻辑不变，iframe 嵌入），
// 选中后回传到本页填入选题、关弹框，不跳页。
const tModal = $('#topicModal'), tFrame = $('#topicFrame');
$('#genTopicBtn')?.addEventListener('click', () => {
  if (tFrame && !tFrame.getAttribute('src')) tFrame.setAttribute('src', '/选题.html?embed=1&track=' + encodeURIComponent((typeof getTrack === 'function' && getTrack() && getTrack().id) || ''));
  if (tModal) tModal.style.display = 'flex';
});
$('#topicModalClose')?.addEventListener('click', () => { if (tModal) tModal.style.display = 'none'; });
tModal?.addEventListener('click', e => { if (e.target === tModal) tModal.style.display = 'none'; });
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'pickTopic' && e.data.topic) {
    $('#topic').value = e.data.topic; state.topic = e.data.topic; persist();
    if (tModal) tModal.style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    const st = $('#autoStatus'); if (st) { st.textContent = '✓ 已选定选题，下面从第二步「对标拆解」开始'; st.style.color = '#00a052'; }
  }
});
$('#model').addEventListener('change', e => localStorage.setItem('ag_model', e.target.value));
$('#resetBtn').addEventListener('click', () => { if (confirm('清空本篇？当前进度已自动存入「历史记录」，可随时找回。')) { state = { topic:'', ref:'', _runId: newRunId() }; Draft.clear(); Draft.save(state); $('#topic').value=''; cur=0; renderRail(); renderPanel(); } });
// 跳成稿预览 / 合规自检前，把当前篇存进草稿 → 目标页自动导入这篇（无需手动筛选）
$('#toPreview')?.addEventListener('click', () => Draft.save(state));
$('#toCompliance')?.addEventListener('click', () => Draft.save(state));

// ===== 创作流水线 · 历史记录（每篇自动存档，可重开/删除）=====
function doneOf(st, step) {
  if (step.key === 'copy') return !!(st.body && st.body.length); // 合并步：有正文即算完成
  const v = st[step.key]; return step.type === 'json' ? !!(v && (v.length || Object.keys(v).length)) : !!(v && String(v).trim());
}
let _cloudTimer = null, _cloudPending = null;
function cloudSaveDebounced(rec) {
  _cloudPending = rec; clearTimeout(_cloudTimer);
  _cloudTimer = setTimeout(async () => { if (await Cloud.loggedIn()) { Cloud.save(_cloudPending); _cloudPending = null; } }, 1500);
}
// 离开/切后台时立即落库，避免「编辑没完成就返回」丢失（beacon 跨导航也能发出）
function flushCloud() {
  if (!_cloudPending || Cloud._logged === false) return;
  clearTimeout(_cloudTimer);
  try {
    const body = JSON.stringify(_cloudPending);
    if (navigator.sendBeacon) navigator.sendBeacon('/api/history', new Blob([body], { type: 'application/json' }));
    else fetch('/api/history', { method: 'POST', headers: { 'content-type': 'application/json' }, body, keepalive: true });
  } catch {}
  _cloudPending = null;
}
window.addEventListener('pagehide', flushCloud);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushCloud(); });
const PLHistory = {
  KEY: 'ag_pl_history',
  list() { try { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); } catch { return []; } },
  _save(arr) { try { localStorage.setItem(this.KEY, JSON.stringify(arr.slice(0, 50))); } catch {} },
  buildRec(st) {
    const doneKeys = STEPS.filter(s => doneOf(st, s)).map(s => s.no);
    const imgs = (st.coverImages || []).length;
    const hasTopic = !!(st.topic && st.topic.trim());
    if (!doneKeys.length && !imgs && !hasTopic) return null; // 完全空白（连选题都没填）才不存；有选题即存为「已选题」草稿
    // 已到达的最远步骤号（卡片用）：已完成步骤的最大号；对标素材(图/正文)已就绪但还没出骨架 → 至少算到第2步「拆解中」
    let stepNo = doneKeys.length ? Math.max(...doneKeys.map(k => parseInt(String(k).replace(/\D/g, '')) || 0)) : (hasTopic ? 1 : 0);
    if (stepNo < 2 && ((st.refImages || []).length || (st.ref || '').trim())) stepNo = 2;
    return { id: st._runId, ts: Date.now(), topic: (st.topic || '').trim() || (st.best || '') || '（未命名）', track: (typeof getTrack === 'function' && getTrack()) ? getTrack().name : '', doneKeys, stepNo, imgs, data: JSON.parse(JSON.stringify(st)) };
  },
  upsert(st) {
    if (!st || !st._runId) return;
    const rec = this.buildRec(st); if (!rec) return;
    const arr = this.list(); const i = arr.findIndex(x => x.id === st._runId);
    if (i >= 0) arr[i] = rec; else arr.unshift(rec);
    arr.sort((a, b) => b.ts - a.ts); this._save(arr);
    cloudSaveDebounced(rec); // 同步云端（登录才真正发）
  },
  remove(id) { this._save(this.list().filter(x => x.id !== id)); Cloud.loggedIn().then(ok => { if (ok) Cloud.del(id); }); },
};
// 历史列表：登录→云端（跨设备）；未登录→本地
async function listHistory() { return (await Cloud.loggedIn()) ? await Cloud.list() : PLHistory.list(); }
async function getHistoryData(id) { if (await Cloud.loggedIn()) { const d = await Cloud.get(id); if (d) return d; } const r = PLHistory.list().find(x => x.id === id); return r ? r.data : null; }
function fmtTime(ts) { const d = new Date(ts); const p = n => String(n).padStart(2, '0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
async function renderHistory() {
  const box = $('#histList'); box.innerHTML = '<div class="text-center text-[13px] text-[var(--ink-soft)] py-8">加载中…</div>';
  const arr = await listHistory();
  if (!arr.length) { box.innerHTML = '<div class="text-center text-[13px] text-[var(--ink-soft)] py-10">还没有历史记录。生成任意步骤后会自动存档到这里。</div>'; return; }
  box.innerHTML = arr.map(r => `
    <div class="out p-3.5 flex items-center gap-3" data-id="${r.id}">
      <div class="flex-1 min-w-0">
        <div class="text-[13.5px] font-medium truncate">${mark(r.topic)}</div>
        <div class="text-[11px] text-[var(--ink-soft)] mt-1 flex flex-wrap items-center gap-1.5">
          <span>${fmtTime(r.ts)}</span>${r.track ? `<span>· ${r.track}</span>` : ''}
          ${r.doneKeys.length ? `<span>· ${r.doneKeys.join(' ')}</span>` : ''}${r.imgs ? `<span>· 🖼️${r.imgs}图</span>` : ''}
          ${r.id === state._runId ? '<span style="color:var(--cinnabar-deep)">· 当前篇</span>' : ''}
        </div>
      </div>
      <button class="hist-open btn-go rounded-lg px-3.5 py-1.5 text-[12px]" data-id="${r.id}">打开</button>
      <button class="hist-del btn-ghost rounded-lg px-2.5 py-1.5 text-[12px]" data-id="${r.id}">删除</button>
    </div>`).join('');
  box.querySelectorAll('.hist-open').forEach(b => b.addEventListener('click', () => openHistory(b.dataset.id)));
  box.querySelectorAll('.hist-del').forEach(b => b.addEventListener('click', () => { if (confirm('删除这条历史记录？')) { PLHistory.remove(b.dataset.id); renderHistory(); } }));
}
async function openHistory(id) {
  PLHistory.upsert(state); // 先存好当前篇再切走
  const data = await getHistoryData(id); if (!data) return;
  state = Object.assign({ topic:'', ref:'' }, data); if (!state._runId) state._runId = id;
  Draft.clear(); Draft.save(state); $('#topic').value = state.topic || ''; cur = landingStep();
  renderRail(); renderPanel(); closeHist();
}
function openHist() { PLHistory.upsert(state); renderHistory(); $('#histModal').style.display = 'flex'; }
function closeHist() { $('#histModal').style.display = 'none'; }

function imgSrc(u) { return (u || '').startsWith('data:') ? u : '/api/img-proxy?u=' + encodeURIComponent(u); }

// 把一张图的叠字（标题+内容）渲染成干净的信息卡覆盖层，版式跟随 layout
function asStr(x) { return typeof x === 'string' ? x : (x == null ? '' : (x.text || x.title || x.content || (Array.isArray(x) ? x.join(' ') : String(x)))); }
function normalizeCap(cap, coverFallback) {
  if (!cap) return { title: coverFallback || '', lines: [], layout: '封面', theme: 'photo' };
  if (typeof cap === 'string') return { title: cap, lines: [], layout: '要点', theme: 'photo' };
  return { title: asStr(cap.title), lines: (Array.isArray(cap.lines) ? cap.lines : []).map(asStr).filter(Boolean), layout: cap.layout || '要点', theme: cap.theme === 'poster' ? 'poster' : 'photo' };
}
function capCardHTML(cap, isCover, coverFallback) {
  const c = normalizeCap(cap, coverFallback);
  if (!c.title && !c.lines.length) return '';
  const lay = c.layout || (isCover ? '封面' : '要点');
  const lines = c.lines.filter(Boolean);
  let body = '';
  if (lines.length) {
    body = '<div class="cv-card-b">' + lines.map((s, k) => {
      let s2 = s, cls = '';
      if (lay === '对比') { if (/^[✅✓对]/.test(s) || /正解|正确/.test(s)) cls = 'ok'; else if (/^[❌✗错]/.test(s) || /误区|错误|别/.test(s)) cls = 'no'; }
      if (lay === '编号') { s2 = s.replace(/^[①-⑩\d\.\、\s]+/, ''); return `<div class="cv-li num"><b>${k + 1}</b><span>${mark(s2)}</span></div>`; }
      return `<div class="cv-li ${cls}">${mark(s2)}</div>`;
    }).join('') + '</div>';
  }
  return `<div class="cv-card theme-${c.theme} ${isCover ? 'is-cover' : ''} lay-${lay}">${c.title ? `<div class="cv-card-t">${mark(c.title)}</div>` : ''}${body}</div>`;
}
function capTheme(cap) { return (cap && cap.theme === 'poster') ? 'poster' : 'photo'; }

      <span class="ci-del" data-i="${i}" style="position:absolute;top:-7px;right:-7px;width:21px;height:21px;border-radius:999px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;font-size:11px;box-shadow:0 1px 5px rgba(0,0,0,.18)">✕</span>

async function regenOneCover(i) {

  // 如果这张是长文笔记页 → 重排该页

  }
  const refOne = (state.refVisions && state.refVisions[i]) ? `\n★ 叠字要照搬对标第${i + 1}张的版式/条目数/形式：「${state.refVisions[i]}」，内容换成我的。` : '';

  let scene = '', title = '', lines = [], layout = '要点', theme = 'photo';
  try {
    const j = extractJSON(await callClaude({
      system: '你是视觉指导，只输出 JSON。', json: true, max_tokens: 340, action: 'imgplan',
      prompt: `为这篇${t ? t.domain : ''}小红书笔记生成 1 张【${role}】。文字事后叠图，不画进图。\ntheme=photo(实拍/实物/场景)或poster(白底文字排版/干货海报)；scene=纯背景(${IMG_NEG})，poster 则为极简浅色留白背景；title=大字标题≤12字；lines=2~5条干货短句(每条≤16字)；layout∈[封面|清单|对比|编号|要点]。\n选题：${state.topic}。${refOne}\n正文要点：${bodyTxt || '（无）'}${refBlock()}\n只输出 JSON：{"theme":"","scene":"","title":"","lines":[],"layout":""}`
    }));
    scene = (j.scene || '').trim(); title = (j.title || '').trim(); lines = Array.isArray(j.lines) ? j.lines.filter(Boolean).slice(0, 5) : []; layout = j.layout || '要点'; theme = j.theme === 'poster' ? 'poster' : 'photo';
  } catch {}
  if (!scene) scene = theme === 'poster' ? '柔和米白纸张质感，大面积留白' : `${state.topic} 相关的干净实物背景`;
  let u;
  if (theme === 'poster') { u = 'tpl://poster'; } // 模板卡，不调 AI
  else {
    const r = await fetch('/api/image', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ prompt: buildImgPrompt('', scene, theme), provider: i === 0 ? 'ark' : 'kling' }) });
    const tx = await r.text(); if (!r.ok) throw new Error('出图失败');
    u = JSON.parse(tx).data && JSON.parse(tx).data[0] && JSON.parse(tx).data[0].url; if (!u) throw new Error('无图');
  }
  state.coverImages = state.coverImages || (state.coverImage ? [state.coverImage] : []);
  state.coverImages[i] = u; state.coverImage = state.coverImages[0];
  state.coverCaptions = state.coverCaptions || []; state.coverCaptions[i] = { title, lines, layout, theme };
  persist();
}
// 真·图生图：按用户上传的参考图（init_image）走 SeedEdit 重出第 i 张（provider 强制 ark）
async function regenWithRef(i, refDataUrl) {
  const t = getTrack();
  const cap = (state.coverCaptions || [])[i] || {};
  const aStyle = (typeof agentImgStyle === 'function' ? agentImgStyle() : '');
  const desc = (cap.title || state.topic || '') + (aStyle ? ('，画风：' + aStyle) : '');
  const prompt = `参考所给图片的构图、配色与风格，为「${t ? t.domain : ''}」小红书笔记重出一张同风格竖版配图：${desc}。干净背景、不要出现任何文字、3:4 竖版、真实质感。`;
  const r = await fetch('/api/image', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ prompt, provider: 'ark', init_image: refDataUrl, action: 'cover' }) });
  const tx = await r.text();
  if (!r.ok) { let m = '出图失败'; try { m = JSON.parse(tx).error || m; } catch {} throw new Error(typeof m === 'string' ? m.slice(0, 80) : '出图失败'); }
  let u = ''; try { const d = JSON.parse(tx).data; u = d && d[0] && d[0].url; } catch {}
  if (!u) throw new Error('上游无图');
  state.coverImages = state.coverImages || (state.coverImage ? [state.coverImage] : []);
  state.coverImages[i] = u; state.coverImage = state.coverImages[0]; persist();
}

      const idx = +fr.getAttribute('data-note'); const note = fr.querySelector('.cv-note'); if (!note || isNaN(idx)) return;
      const s = parseFloat(note.dataset.fitScale || '1'); const page = (state.notePages || [])[idx];
      if (s < 0.8 && page && !isCoverPage(page) && (page.blocks || []).length >= 3) toSplit.add(idx);
    });
    if (!toSplit.size) return;
    const np = []; (state.notePages || []).forEach((p, i) => { if (toSplit.has(i)) splitPageInTwo(p).forEach(x => np.push(x)); else np.push(p); });
    state.notePages = np; state.coverImages = np.map((_, i) => 'note://' + i); state.coverImage = state.coverImages[0];
    persist(); renderCoverImages();
    if (st) { st.textContent = '✓ 已排成 ' + np.length + ' 页长图笔记（部分因内容多自动拆分）'; st.style.color = '#00a152'; }
  }
}
// 强制把一页从中间拆成两页（不看 weight 阈值；封面不拆）。用于"被缩太小"的页。
function splitPageInTwo(page) {
  const blocks = (page && page.blocks) || [];
  if (isCoverPage(page) || blocks.length < 3) return [page];
  const head = blocks[0], rest = blocks.slice(1);
  const half = noteWeight(blocks) / 2; let acc = noteWeight([head]), cut = 1;
  for (let i = 0; i < rest.length; i++) { acc += noteWeight([rest[i]]); cut = i + 1; if (acc >= half) break; }
  cut = Math.max(1, Math.min(cut, rest.length - 1));
  const ht = String(head.text || '').replace(/==(.+?)==/g, '$1');
  const contHead = { t: head.t === 'title' ? 'sec' : (head.t || 'sec'), text: ht + '（续）' };
  return [Object.assign({}, page, { blocks: [head].concat(rest.slice(0, cut)) }),
          Object.assign({}, page, { blocks: [contHead].concat(rest.slice(cut)) })];
}

// 上传图片（压缩后存，避免 localStorage 撑爆）
function downscaleImage(file, max = 1100) {
  return new Promise(res => {
    const rd = new FileReader();
    rd.onload = () => { const img = new Image(); img.onload = () => { let w = img.width, h = img.height; const s = Math.min(1, max / Math.max(w, h)); const c = document.createElement('canvas'); c.width = Math.round(w * s); c.height = Math.round(h * s); c.getContext('2d').drawImage(img, 0, 0, c.width, c.height); res(c.toDataURL('image/jpeg', 0.85)); }; img.onerror = () => res(rd.result); img.src = rd.result; };
    rd.onerror = () => res(''); rd.readAsDataURL(file);
  });
}
// S2 上传对标图：下采样 → 存进 refImages → 立即逐张自动解析（不依赖小红书抓取）

// 按当前排序渲染对标笔记列表（点赞/最新切换，仅重排已抓到的，不再请求）
function renderBenchNotes() {
  const box = $('#benchList'), st = $('#benchStatus'); if (!box) return;
  const dateNum = s => { const m = String(s || '').match(/(\d{4})-(\d{1,2})-(\d{1,2})/); return m ? (+m[1] * 10000 + +m[2] * 100 + +m[3]) : 0; };
  // 时间窗 benchWindow（月，0=全部）；保留无日期的（无法确认，不臆断），只剔除明确早于该窗口的
  const winLabel = benchWindow === 0 ? '全部' : (benchWindow === 12 ? '近1年' : benchWindow === 6 ? '近半年' : '近' + benchWindow + '月');
  const cut = new Date(Date.now() - benchWindow * 30.4 * 86400000); const cutNum = cut.getFullYear() * 10000 + (cut.getMonth() + 1) * 100 + cut.getDate();
  let list = benchNotes.slice();
  const total = list.length, hidden = benchWindow ? list.filter(n => { const dn = dateNum(n.date); return dn && dn < cutNum; }).length : 0;
  if (benchWindow) list = list.filter(n => { const dn = dateNum(n.date); return !dn || dn >= cutNum; });
  list.sort((a, b) => benchSort === 'date' ? (dateNum(b.date) - dateNum(a.date)) : benchSort === 'comments' ? (parseCount(b.comments) - parseCount(a.comments)) : (parseCount(b.likes) - parseCount(a.likes)));
  const sortLabel = benchSort === 'date' ? '最新' : benchSort === 'comments' ? '评论' : '点赞';
  if (st) st.textContent = `✓ ${list.length} 篇 · ${winLabel} · 按${sortLabel}` + (hidden ? `（隐藏 ${hidden} 篇更早的）` : '') + '，挑 1 篇点「用这篇拆解」';

// 解析"1.2万/3000+"等为数字，用于排序
function parseCount(v) {
  if (typeof v === 'number') return v;
  const s = String(v || '').replace(/\+/g, '').trim(); if (!s) return 0;
  const m = s.match(/([\d.]+)\s*(万|w|k|千)?/i); if (!m) return 0;
  let n = parseFloat(m[1]) || 0; const u = (m[2] || '').toLowerCase();
  if (u === '万' || u === 'w') n *= 10000; else if (u === 'k' || u === '千') n *= 1000;
  return n;
}
// 按对标建议的关键词，走 xhs(agent-reach) 聚合抓取约 20 篇真实笔记（去重）。存入 benchNotes，由 renderBenchNotes 按当前排序渲染。
async function grabBenchmarkNotes(searches) {
  const st = $('#benchStatus'); const kws = (searches || []).map(s => s.keyword).filter(Boolean).slice(0, 3);
  if (!kws.length) { if (st) st.textContent = '没有可用关键词'; return; }
  const btn = $('#grabBench'); const o = btn ? btn.textContent : ''; if (btn) { btn.disabled = true; btn.textContent = '抓取中…'; }
  const seen = new Set(), all = [];
  for (let i = 0; i < kws.length && all.length < 20; i++) {
    if (st) st.textContent = `正在抓「${kws[i]}」…（已得 ${all.length} 篇，约需 10~30 秒/词，请稍候）`;
    try {
      let j = await (await fetch('/api/xhs-search', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ keyword: kws[i], sort: benchFetchSort, type: benchFetchType }) })).json();
      // 命中每日抓取上限 → 停止并友好提示
      if (j.limited) { if (st) st.textContent = '⚠ ' + j.error; if (btn) { btn.disabled = false; btn.textContent = o; } return; }
      // 线上没有 xhs CLI（ENOENT/未找到 xhs 命令）→ 回退到直连搜索 /api/search（需配 XHS_COOKIE 才有结果）
      if ((!j.ok || !(j.notes && j.notes.length)) && j.error && /未找到 xhs|ENOENT|xhs 搜索失败/.test(j.error)) {
        try { j = await (await fetch('/api/search', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ keyword: kws[i] }) })).json(); } catch {}
      }
      if (j.ok && j.notes) for (const n of j.notes) { if (n.id && !seen.has(n.id)) { seen.add(n.id); all.push(n); if (all.length >= 20) break; } }
      // 抓完这个词立刻刷新累计数 + 边抓边显示已抓到的（不再一直停在 0）
      if (all.length) { benchNotes = all.slice(); try { renderBenchNotes(); } catch {} }
      if (st) st.textContent = all.length >= 20 ? `✓ 已抓满 20 篇真实对标` : `已抓 ${all.length} 篇…（继续抓下一个词）`;
      else if (j.error && /未登录|xhs login/.test(j.error)) { if (st) st.textContent = '⚠ ' + j.error; if (btn) { btn.disabled = false; btn.textContent = o; } return; }
    } catch {}
    if (i < kws.length - 1 && all.length < 20) await new Promise(r => setTimeout(r, 2500)); // 间隔，避免触发验证码
  }
  if (btn) { btn.disabled = false; btn.textContent = o; }
  benchNotes = all;
  if (!all.length) { if (st) st.textContent = '没抓到（可能触发了验证码/未登录）。可点左侧「去搜」手动找，或用下方「📎 上传对标图」。'; const box = $('#benchList'); if (box) box.innerHTML = ''; return; }
  renderBenchNotes();
}

// ① 找对标：按选题+目标，给筛选维度 + 一份可点的真实搜索清单
async function genFinder() {

只输出 JSON：
{"dimension":"按我的目标该找什么样的对标及原因（电商起号/快速出单→低粉爆款；自媒体涨粉→头部高互动），一句话",

"pick":"从搜索结果里怎么挑出最适合的那 1 篇来拆解（与上面 filter 一致：近 N 月、互动量高、可复刻、与选题强相关）"}
searches 给 6–8 个，覆盖核心词、长尾词、痛点词、人群词。filter 要和 dimension/pick 的逻辑自洽。`;
    const d = extractJSON(await callClaude({ prompt, model: $('#model').value, max_tokens: 1400, json: true }));

  const imgs = state.refImages || [], tg = state.refTags || [], vis = state.refVisions || [];
  box.innerHTML =
    imgs.map((u, i) => `<div class="shrink-0" style="width:${vis[i] ? '168px' : '66px'}">
        <a href="${u}" target="_blank" rel="noopener" title="点击看原图"><img src="/api/img-proxy?u=${encodeURIComponent(u)}" loading="lazy" style="width:66px;height:66px;object-fit:cover;border-radius:8px;display:block;border:1px solid var(--line)" /></a>
        ${vis[i] ? `<div class="text-[10.5px] text-[var(--ink-soft)] leading-snug mt-1"><b style="color:var(--cinnabar-deep)">第${i + 1}张</b> <button class="reanalyze-one" data-i="${i}" ${refAnalyzing ? 'disabled' : ''} title="只重新解析这张" style="cursor:pointer;border:none;background:none;color:var(--cinnabar);font-size:10.5px;padding:0;opacity:${refAnalyzing ? '.5' : '1'}">🔄重析</button><br>${mark(vis[i])}</div>` : ''}
      </div>`).join('')
    + (imgs.length ? `<button id="analyzeRefBtn" ${refAnalyzing ? 'disabled' : ''} class="btn-go rounded-lg px-4 py-2 text-[12px] font-medium self-start whitespace-nowrap" style="opacity:${refAnalyzing ? '.6' : '1'}">${refAnalyzing ? '⏳ 解析中…' : ('🔍 ' + (vis.length ? '重新逐张解析' : '逐张解析每张对标图'))}</button>` : '')
    + (tg.length ? `<div class="basis-full flex flex-wrap gap-1.5 mt-1">${tg.map(t => `<span class="chip">#${t}</span>`).join('')}</div>` : '');
  const ab = $('#analyzeRefBtn');
  if (ab && !refAnalyzing) ab.addEventListener('click', () => runRefAnalysis(null, true));
  box.querySelectorAll('.reanalyze-one').forEach(b => b.addEventListener('click', async () => {
    if (refAnalyzing) return;
    const i = +b.dataset.i; b.textContent = '解析中…'; b.disabled = true; refAnalyzing = true;
    try { await reanalyzeOne(i); } catch {} finally { refAnalyzing = false; renderRefImages(); }
  }));
}

// 核心：执行一步（仅调用 + 存储，手动/自动共用）
// 对标参考块：标题+正文+标签（来自 state.ref）+ 图片视觉描述（GLM-4V）。带进 S3–S7 一起解析。
function refBlock() {
  let b = '';
  if (state.ref && state.ref.trim()) b += '【对标笔记（标题+正文+话题标签）】\n' + state.ref.trim().slice(0, 2500) + '\n';
  const vis = (state.refVisions || []).filter(Boolean);
  if (vis.length) b += '【对标图组 · 逐张视觉描述（第 i 张的文字/版式/画面）】\n' + vis.map((d, i) => `第${i + 1}张：${d}`).join('\n') + '\n';
  else if (state.refVision && state.refVision.trim()) b += '【对标图片/封面 视觉描述】\n' + state.refVision.trim() + '\n';
  return b ? ('\n\n参考下面这篇对标（仅借鉴其方法/结构/视觉策略，绝不照抄、不洗稿）：\n' + b) : '';
}

// 视觉解析对标封面（GLM-4V），结果存 state.refVision
async function analyzeRefImages() {
  const imgs = state.refImages || [];
  if (!imgs.length) return;
  try {
    const r = await fetch('/api/vision', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ imageUrl: imgs[0] }) });
    const j = await r.json();
    if (j.ok && j.desc) { state.refVision = j.desc; Draft.save(state); }
  } catch {}
}

async function runStep(st) {
  // S2/S3 生成前：逐张视觉解析对标图组（不只封面，每张都解析）
  if ((st.key === 'skeleton' || st.key === 'frame') && (state.refImages || []).length && !(state.refVisions && state.refVisions.length)) {
    setAuto && setAuto('正在逐张视觉解析对标图组…');
    await analyzeRefImageSet(typeof setAuto === 'function' ? setAuto : null);
    renderRefImages(); // 解析完把逐张描述显示在图片下方
  }
  let prompt = st.prompt(state);
  // S2 拆解纳入「逐张」视觉描述（每张的文字/版式/画面/作用）
  if (st.key === 'skeleton') {
    const vis = (state.refVisions || []).filter(Boolean);
    if (vis.length) prompt += '\n\n【对标图组 · 逐张视觉解析（请逐张拆解：每张的文字内容、版式形式、画面与作用——封面的钩子策略、每页干货的呈现方式）】\n' + vis.map((d, i) => `第${i + 1}张：${d}`).join('\n');
    else if (state.refVision) prompt += '\n\n【对标封面 视觉描述】\n' + state.refVision;
  }
  // S3 框架：也对每张笔记图片做拆解，并据此规划"每张图该放什么内容"
  if (st.key === 'frame') {
    const vis = (state.refVisions || []).filter(Boolean);
    if (vis.length) prompt += '\n\n【对标图组 · 逐张拆解（请据此规划本篇每张图的内容与版式：第 i 张放什么干货、用什么版式，跟对标第 i 张对位）】\n' + vis.map((d, i) => `第${i + 1}张：${d}`).join('\n')
      + `\n→ ==配图规划必须正好 ${vis.length} 张：第1张…一直到第${vis.length}张，与对标图组一一对应，不多不少==。每张写清「第N张：文字内容/干货 + 版式」，缺一张或多一张都不行；不要把多张并成一段，也不要凭空加图。`;
  }
  // S3/正文合并步 带上对标参考（含图片视觉描述）；封面步不带——它只对齐 S3 框架封面规划，避免被对标正文带偏
  if (['frame', 'copy'].includes(st.key)) prompt += refBlock();
  const txt = await callClaude({ prompt, model: $('#model').value, max_tokens: st.key === 'copy' ? 2600 : st.key === 'frame' ? 3200 : 1400, json: st.type === 'json', action: st.key });
  if (st.type === 'json') {
    const j = extractJSON(txt);
    if (st.key === 'copy') { state.body = j.body || []; state.titles = j.titles || []; state.best = j.best || (j.titles || [])[0] || ''; state.tags = j.tags || []; }
    else if (st.key === 'cover') state.cover = { cover_lines: j.cover_lines || [], visual: j.visual || '' };
  } else { state[st.key] = txt; }
  persist();
}

// 手动：生成当前步骤
async function genStep(st) {
  if (!state.topic) { $('#stStatus').textContent = '请先在上方填写选题'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  if (st.input === 'ref' && !state.ref) { $('#stStatus').textContent = '请先粘贴对标笔记'; $('#stStatus').style.color = 'var(--cinnabar-deep)'; return; }
  const b = $('#genStep'); b.disabled = true; $('#gi').className = 'spin'; $('#gi').textContent = '◠'; $('#gt').textContent = '生成中'; $('#stStatus').textContent = ''; $('#stStatus').style.color = 'var(--ink-soft)';
  try { await runStep(st); renderPanel(); $('#stStatus').textContent = '✓ 已生成并保存'; }
  catch (e) { $('#stStatus').textContent = '失败：' + (e.message || e); $('#stStatus').style.color = 'var(--cinnabar-deep)'; }
  finally { const bb = $('#genStep'); if (bb) bb.disabled = false; }
}

// 自动：依次跑完 S2–S7（未贴对标则自动跳过 S2）
let autoRunning = false;
function setAuto(msg, err) { const el = $('#autoStatus'); if (el) { el.textContent = msg || ''; el.style.color = err ? 'var(--cinnabar-deep)' : 'var(--ink-soft)'; } }
async function autoRun() {
  if (autoRunning) return;
  if (!state.topic) { setAuto('请先在上方填写选题', true); return; }
  autoRunning = true; const ab = $('#autoBtn'); if (ab) { ab.disabled = true; ab.textContent = '⏳ 自动生成中…'; }
  try {
    for (let i = 0; i < STEPS.length; i++) {
      const st = STEPS[i];
      if (st.input === 'ref' && !state.ref) continue; // 没贴对标就跳过 S2
      cur = i; renderRail(); renderPanel();
      setAuto('正在生成 ' + dispNo(st.no) + ' · ' + st.name + ' …');
      await runStep(st);
      // S6 完成后自动生成多张配图（张数对齐对标，图失败不中断整体）
      if (st.key === 'cover') {
        const cn = coverCount();
        setAuto('正在生成 S6 配图（' + cn + ' 张，对齐对标）…');
        try { await generateCoverImagesCore(cn); } catch (e) { setAuto('配图生成失败（不影响其它）：' + (e.message || e)); }
      }
      renderRail(); renderPanel();
    }
    setAuto('✓ 已自动跑完（' + (state.ref ? 'S2–S7' : 'S3–S7，未贴对标已跳过 S2') + '，含封面图）。可去成稿预览 →');
  } catch (e) { setAuto('中断于 ' + (STEPS[cur] ? STEPS[cur].no : '') + '：' + (e.message || e), true); }
  finally { autoRunning = false; const ab2 = $('#autoBtn'); if (ab2) { ab2.disabled = false; ab2.textContent = '▶ 一键按对标生成全套（图文+封面图）'; } }
}
$('#autoBtn')?.addEventListener('click', autoRun);

renderRail(); renderPanel();
</script>
</body>
</html>
