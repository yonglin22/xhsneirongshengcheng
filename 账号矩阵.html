<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
<title>账号矩阵 · 获客 Agent · 朱砂操盘台</title>
<link rel="stylesheet" href="/assets/tw.css?v=1" />
<link rel="stylesheet" href="/assets/atelier.css?v=105" />
</head>
<body class="stage grain min-h-screen" data-page="matrix">
<main class="ag-page">
  <div class="mb-5">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">获客 AGENT · M1</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02;letter-spacing:-.02em">账号<span class="italic" style="color:var(--cinnabar)">矩阵</span></h1>
    <p class="mt-2 text-[13.5px] text-[var(--ink-soft)] max-w-2xl">统一管理你的多个小红书 / 公众号账号：分组、登录态、健康状态。内容生产好后可一键分发到所选账号<b>草稿箱</b>（发布到草稿箱 / 养号能力陆续上线）。</p>
  </div>

  <div class="card p-4 mb-5">
    <div class="flex items-center justify-between mb-3">
      <div class="font-song font-bold text-[15px]">＋ 添加账号</div>
      <span class="text-[11px] text-[var(--ink-soft)]" id="cnt"></span>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-2.5">
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">平台</div>
        <select id="fPlatform" class="field w-full rounded-lg px-3 py-2 text-[13px]"><option value="xhs">📕 小红书</option><option value="gzh">📰 公众号</option></select>
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">账号昵称</div>
        <input id="fNick" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="如：朱砂育儿号" />
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">分组（可选）</div>
        <input id="fGroup" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="如：母婴矩阵 / A组" />
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">备注（可选）</div>
        <input id="fNote" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="人设 / 用途" />
      </div>
    </div>
    <div class="mt-3 flex items-center gap-2.5">
      <button id="addBtn" class="btn-go rounded-xl px-5 py-2.5 text-[13px] font-medium">＋ 添加到矩阵</button>
      <span id="addStatus" class="text-[12px] text-[var(--ink-soft)]"></span>
    </div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-2.5 leading-relaxed" style="background:var(--paper-2);border-radius:var(--r-sm);padding:8px 11px">
      ℹ️ 新账号默认「待接入」。<b>登录态接入（扫码登录）+ 发布到草稿箱 + 养号</b>需 VPS 浏览器自动化，正在建设中；接入后这里会显示「已登录 / 健康」。
    </div>
  </div>

  <div id="list" class="space-y-4"></div>
</main>

<script src="/assets/tracks.js?v=19"></script>
<script src="/assets/app.js?v=59"></script>
<script src="/assets/ui-dialog.js?v=1"></script>
<script>
const PLAT = { xhs: '📕 小红书', gzh: '📰 公众号' };
const STAT = { pending: ['待接入', '#b6bbc2'], active: ['已登录', '#00a152'], expired: ['登录失效', '#e8a400'], banned: ['受限/封禁', 'var(--cinnabar-deep)'] };
async function api(path, method, body, timeoutMs) {
  const ctl = new AbortController(); const to = setTimeout(() => ctl.abort(), timeoutMs || 15000);
  try {
    const r = await fetch('/api/accounts' + path, { method: method || 'GET', headers: { 'content-type': 'application/json' }, body: body ? JSON.stringify(body) : undefined, signal: ctl.signal });
    return await r.json();
  } catch (e) { return { ok: false, error: (e && e.name === 'AbortError') ? '出码超时（服务端打开小红书较慢，请重试一次）' : '网络较慢或不稳定，请重试' }; }
  finally { clearTimeout(to); }
}
function statChip(s) { const [t, c] = STAT[s] || STAT.pending; return `<span style="font-size:11px;font-weight:600;color:${c};background:rgba(0,0,0,.04);border-radius:999px;padding:2px 9px">${t}</span>`; }
function row(a) {
  const d = new Date(a.created_at || Date.now());
  return `<div class="flex items-center gap-3 flex-wrap" style="border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:var(--paper-2)" data-id="${a.id}">
    <span style="font-size:13px;font-weight:700;min-width:80px">${PLAT[a.platform] || a.platform}</span>
    <span style="font-size:14px;font-weight:700;flex:1;min-width:120px">${a.nickname || '(未命名)'}</span>
    ${a.grp ? `<span style="font-size:11px;color:var(--ink-soft);background:rgba(255,36,66,.07);border-radius:6px;padding:2px 8px">${a.grp}</span>` : ''}
    ${statChip(a.status)}
    <span style="font-size:11px;color:var(--ink-soft)">${a.health || a.note || ''}</span>
    ${a.has_auth ? `<button class="acc-verify btn-ghost rounded-md px-2.5 py-1 text-[11px]" style="margin-left:auto">🔍 检测登录态</button>` : ''}
    <button class="acc-auth btn-go rounded-md px-2.5 py-1 text-[11px]" ${a.has_auth ? '' : 'style="margin-left:auto"'}>🔗 ${a.has_auth ? '重新接入' : '接入登录态'}</button>
    <select class="acc-stat field rounded-md px-2 py-1 text-[11px]">
      ${Object.keys(STAT).map(k => `<option value="${k}" ${a.status === k ? 'selected' : ''}>${STAT[k][0]}</option>`).join('')}
    </select>
    <button class="acc-del btn-ghost rounded-md px-2.5 py-1 text-[11px]">删除</button>
  </div>`;
}
async function load() {
  const j = await api('');
  const list = (j && j.list) || [];
  $('#cnt').textContent = '共 ' + list.length + ' 个账号';
  if (!list.length) { $('#list').innerHTML = '<div class="card p-8 text-center text-[13px] text-[var(--ink-soft)]">还没有账号。上面添加你的第一个小红书 / 公众号账号。</div>'; return; }
  // 按分组聚合
  const groups = {};
  list.forEach(a => { const g = a.grp || '未分组'; (groups[g] = groups[g] || []).push(a); });
  $('#list').innerHTML = Object.keys(groups).map(g => `
    <div class="card p-4">
      <div class="font-song font-bold text-[14px] mb-3">${g} <span class="text-[11px] text-[var(--ink-soft)] font-normal">· ${groups[g].length} 个</span></div>
      <div class="space-y-2.5">${groups[g].map(row).join('')}</div>
    </div>`).join('');
  bind();
}
function bind() {
  $$('.acc-del').forEach(b => b.addEventListener('click', async e => {
    const id = +e.target.closest('[data-id]').dataset.id;
    if (!await zConfirm('删除这个账号？（仅从矩阵移除，不影响平台账号本身）', { okText: '删除' })) return;
    await api('/delete', 'POST', { id }); load();
  }));
  $$('.acc-stat').forEach(s => s.addEventListener('change', async e => {
    const id = +e.target.closest('[data-id]').dataset.id;
    await api('/update', 'POST', { id, patch: { status: e.target.value } }); load();
  }));
  $$('.acc-auth').forEach(b => b.addEventListener('click', e => openAuthModal(+e.target.closest('[data-id]').dataset.id)));
  $$('.acc-verify').forEach(b => b.addEventListener('click', async e => {
    const id = +e.target.closest('[data-id]').dataset.id; const btn = e.target; const o = btn.textContent;
    btn.disabled = true; btn.textContent = '检测中…（约 20 秒）';
    try { const r = await api('/verify', 'POST', { id }); if (r.ok) zToast('✓ 登录态有效' + (r.nickname ? '（' + r.nickname + '）' : ''), 'ok'); else zAlert('✗ ' + (r.reason || '检测失败'), { title: '登录态检测' }); }
    catch { zToast('检测请求失败', 'err'); }
    btn.disabled = false; btn.textContent = o; load();
  }));
}
let _qrTimer = null;
function openAuthModal(id) {
  const m = document.createElement('div'); m.id = '__authM';
  m.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `<div class="card" style="width:min(460px,94vw);padding:22px;text-align:center">
    <div class="font-song" style="font-weight:800;font-size:16px;margin-bottom:4px">📱 扫码登录小红书</div>
    <div style="font-size:12px;color:var(--ink-soft);margin-bottom:14px">用<b>手机小红书 App</b>扫码 → 登录态在服务器本地生成（同 IP，不会失效）。<br>cookie 粘贴在机房 IP 多半被判失效，推荐扫码。</div>
    <div id="amQrBox" style="min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px">
      <button id="amQrStart" class="btn-go rounded-xl px-6 py-3 text-[14px] font-medium">📷 生成登录二维码</button>
      <span style="font-size:11px;color:var(--ink-soft)">点击后约 10 秒出码</span>
    </div>
    <div id="amStatus" style="font-size:12px;min-height:16px;margin:8px 0"></div>
    <details style="font-size:11px;color:var(--ink-soft);margin-bottom:10px;text-align:left"><summary style="cursor:pointer">扫不出码？用 Cookie 粘贴（备选）</summary>
      <textarea id="amCookie" class="field w-full rounded-lg px-3 py-2 text-[12px]" rows="3" style="margin:6px 0" placeholder="粘贴 www.xiaohongshu.com 完整 Cookie（注意：机房 IP 多半会判失效）"></textarea>
      <button id="amCookieSave" class="btn-ghost rounded-lg px-4 py-1.5 text-[12px]">保存 Cookie</button></details>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="amCancel" class="btn-ghost rounded-lg px-4 py-2 text-[13px]">关闭</button>
    </div></div>`;
  document.body.appendChild(m);
  const close = () => { if (_qrTimer) { clearInterval(_qrTimer); _qrTimer = null; } m.remove(); };
  m.addEventListener('click', e => { if (e.target === m) close(); });
  m.querySelector('#amCancel').onclick = close;
  m.querySelector('#amQrStart').onclick = async () => {
    const box = m.querySelector('#amQrBox'); const st = m.querySelector('#amStatus');
    box.innerHTML = '<span style="font-size:13px;color:var(--ink-soft)">正在打开小红书登录…（首次较慢，最多约 50 秒，请耐心等）</span>';
    const r = await api('/qr-start', 'POST', {}, 55000);
    if (!r.ok) { box.innerHTML = `<button id="amQrStart2" class="btn-go rounded-xl px-6 py-3 text-[13px]">重试</button>`; st.textContent = '✗ ' + (r.reason || r.error || '出码失败'); st.style.color = 'var(--cinnabar-deep)'; m.querySelector('#amQrStart2').onclick = () => openAuthModal(id) && close(); return; }
    box.innerHTML = `<img src="${r.qr}" style="width:200px;height:200px;object-fit:contain;border:1px solid var(--line);border-radius:10px"/><span style="font-size:12px;color:var(--ink)">用小红书 App「我」→ 右上角扫一扫</span>`;
    st.textContent = '等待扫码确认…'; st.style.color = 'var(--ink-soft)';
    let n = 0;
    _qrTimer = setInterval(async () => {
      n++; if (n > 60) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '二维码超时，请重新生成'; st.style.color = 'var(--cinnabar-deep)'; return; }
      const p = await api('/qr-poll', 'POST', { token: r.token, id });
      if (p.ok) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '✓ 登录成功！'; st.style.color = '#00a152'; setTimeout(() => { close(); load(); }, 800); }
      else if (p.expired) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '二维码已过期，请重新生成'; st.style.color = 'var(--cinnabar-deep)'; }
      else if (p.needSms) { clearInterval(_qrTimer); _qrTimer = null; showSms(m, r.token, id, p.info || {}); }
    }, 2500);
  };
  m.querySelector('#amCookieSave').onclick = async () => {
    const cookie = m.querySelector('#amCookie').value.trim(); const st = m.querySelector('#amStatus');
    if (cookie.length < 20) { st.textContent = '请粘贴有效 Cookie'; st.style.color = 'var(--cinnabar-deep)'; return; }
    const r = await api('/update', 'POST', { id, patch: { auth_blob: JSON.stringify({ cookie, ts: Date.now() }), status: 'active' } });
    if (r && r.ok) { close(); load(); }
  };
}
// 扫码后小红书要求短信验证 → 出手机号+验证码输入
function showSms(m, token, id, info) {
  const box = m.querySelector('#amQrBox'); const st = m.querySelector('#amStatus');
  box.innerHTML = `<div style="width:100%;text-align:left">
    <div style="font-size:13px;font-weight:700;margin-bottom:6px">📲 需短信验证（小红书风控）</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-bottom:8px">扫码已确认，小红书要求手机验证码。${info.phoneInput ? '请填手机号并' : ''}点「发送验证码」，收到后填入。</div>
    ${info.phoneInput ? `<input id="amSmsPhone" class="field w-full rounded-lg px-3 py-2 text-[13px]" style="margin-bottom:8px" placeholder="手机号（小红书账号绑定的）" />` : ''}
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="amSmsCode" class="field rounded-lg px-3 py-2 text-[13px]" style="flex:1" placeholder="短信验证码" />
      <button id="amSmsSend" class="btn-ghost rounded-lg px-3 py-2 text-[12px] whitespace-nowrap">发送验证码</button>
    </div>
    <button id="amSmsOk" class="btn-go rounded-xl w-full py-2.5 text-[13px] font-medium">提交验证码登录</button>
    <details style="font-size:10px;color:var(--ink-soft);margin-top:8px"><summary style="cursor:pointer">调试信息（截图发我以校准）</summary>页面文字：${(info.snippet || '').replace(/</g, '&lt;')}<br>按钮：${(info.btns || []).join(' / ')}<br>有手机输入:${info.phoneInput} 有验证码输入:${info.codeInput}</details>`;
  st.textContent = ''; let sending = false;
  m.querySelector('#amSmsSend').onclick = async () => {
    if (sending) return; sending = true; const b = m.querySelector('#amSmsSend'); b.textContent = '发送中…';
    const phone = (m.querySelector('#amSmsPhone') || {}).value || '';
    const r = await api('/qr-sms-send', 'POST', { token, phone });
    if (r.ok) { st.textContent = '✓ 验证码已发送，查收短信'; st.style.color = '#00a152'; let c = 60; b.disabled = true; const t = setInterval(() => { b.textContent = (--c) + 's'; if (c <= 0) { clearInterval(t); b.disabled = false; b.textContent = '重新发送'; } }, 1000); }
    else { st.textContent = '✗ ' + (r.reason || '发送失败'); st.style.color = 'var(--cinnabar-deep)'; b.textContent = '发送验证码'; }
    sending = false;
  };
  m.querySelector('#amSmsOk').onclick = async () => {
    const code = m.querySelector('#amSmsCode').value.trim(); if (!code) { st.textContent = '请填验证码'; st.style.color = 'var(--cinnabar-deep)'; return; }
    const b = m.querySelector('#amSmsOk'); b.disabled = true; b.textContent = '验证中…'; st.textContent = '正在登录…';
    const r = await api('/qr-sms-submit', 'POST', { token, code, id });
    if (r.ok) { st.textContent = '✓ 登录成功！'; st.style.color = '#00a152'; setTimeout(() => { document.getElementById('__authM') && document.getElementById('__authM').remove(); load(); }, 800); }
    else { st.textContent = '✗ ' + (r.reason || '验证失败'); st.style.color = 'var(--cinnabar-deep)'; b.disabled = false; b.textContent = '提交验证码登录'; }
  };
}
$('#addBtn').addEventListener('click', async () => {
  const nickname = $('#fNick').value.trim();
  if (!nickname) { $('#addStatus').textContent = '请填账号昵称'; $('#addStatus').style.color = 'var(--cinnabar-deep)'; return; }
  $('#addBtn').disabled = true;
  await api('', 'POST', { platform: $('#fPlatform').value, nickname, grp: $('#fGroup').value.trim(), note: $('#fNote').value.trim() });
  $('#fNick').value = ''; $('#fNote').value = '';
  $('#addStatus').textContent = '✓ 已添加'; $('#addStatus').style.color = '#00a152';
  $('#addBtn').disabled = false; load();
});
load();
</script>
</body>
</html>
