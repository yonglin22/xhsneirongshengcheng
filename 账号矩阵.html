<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body class="stage grain min-h-screen" data-page="matrix">
<main class="ag-page">
  <div class="mb-5">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">获客 AGENT · M1</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02;letter-spacing:-.02em">账号<span class="italic" style="color:var(--cinnabar)">矩阵</span></h1>
    <p class="mt-2 text-[13.5px] text-[var(--ink-soft)] max-w-2xl">统一管理你的多个小红书 / 公众号账号：分组、登录态、健康状态。内容生产好后可一键分发到所选账号<b>草稿箱</b>（发布到草稿箱 / 养号能力陆续上线）。</p>
  </div>

  <div class="card p-4 mb-5">
    <div class="flex items-center justify-between mb-3">
      <div class="font-song font-bold text-[15px]">＋ 添加账号</div>
      <div class="flex items-center gap-2.5">
        <button id="resetQrBtn" class="btn-ghost rounded-lg px-2.5 py-1 text-[11px]" title="把扫码接入但其实没真正登录的号重置为待接入（不影响手动粘贴 cookie 的号）">🔄 重置误标登录态</button>
        <span class="text-[11px] text-[var(--ink-soft)]" id="cnt"></span>
      </div>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-2.5">
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">平台</div>
        <select id="fPlatform" class="field w-full rounded-lg px-3 py-2 text-[13px]"><option value="xhs">📕 小红书</option><option value="gzh">📰 公众号</option></select>
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">账号昵称</div>
        <input id="fNick" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="如：朱砂育儿号" />
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">分组（可选）</div>
        <input id="fGroup" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="如：母婴矩阵 / A组" />
      </div>
      <div>
        <div class="text-[11px] text-[var(--ink-soft)] mb-1">备注（可选）</div>
        <input id="fNote" class="field w-full rounded-lg px-3 py-2 text-[13px]" placeholder="人设 / 用途" />
      </div>
    </div>
    <div class="mt-3 flex items-center gap-2.5">
      <button id="addBtn" class="btn-go rounded-xl px-5 py-2.5 text-[13px] font-medium">＋ 添加到矩阵</button>
      <span id="addStatus" class="text-[12px] text-[var(--ink-soft)]"></span>
    </div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-2.5 leading-relaxed" style="background:var(--paper-2);border-radius:var(--r-sm);padding:8px 11px">
      ℹ️ 新账号默认「待接入」。<b>登录态接入（扫码登录）+ 发布到草稿箱 + 养号</b>需 VPS 浏览器自动化，正在建设中；接入后这里会显示「已登录 / 健康」。
    </div>
  </div>

  <!-- 赛道矩阵预设：一键铺设 3 个角色号（赛道写 matrix 才显示） -->
  <div id="matrixPreset" class="mb-5"></div>

  <div id="list" class="space-y-4"></div>
</main>

<script src="/assets/tracks.js?v=25"></script>
<script src="/assets/app.js?v=70"></script>
<script src="/assets/ui-dialog.js?v=3"></script>
<script src="/assets/onboard.js?v=3"></script>
<script>pageIntro({key:'matrix',emoji:'📇',title:'账号矩阵',intro:'集中管理你的多个小红书号。接入登录态后，才能做养号/截流、并让数据自动回流。',steps:[{t:'＋ 添加账号',d:'填昵称、分组，先建档。'},{t:'接入登录态',d:'推荐用「朱砂助手」插件回传——住宅 IP 更稳、每 75 分钟自动续期。'},{t:'（可选）一键铺设赛道矩阵',d:'主号 / 资料号 / 热点号 + 店铺，一键成型。'}],tips:['机房扫码接入的号，几小时后 cookie 可能被判失效；插件回传最稳。','账号越多，养号/截流/数据复盘越能规模化。']});</script>
<script>
const PLAT = { xhs: '📕 小红书', gzh: '📰 公众号' };
const STAT = { pending: ['待接入', '#b6bbc2'], active: ['已登录', '#00a152'], expired: ['登录失效', '#e8a400'], banned: ['受限/封禁', 'var(--cinnabar-deep)'] };
async function api(path, method, body, timeoutMs) {
  const ctl = new AbortController(); const to = setTimeout(() => ctl.abort(), timeoutMs || 15000);
  try {
    const r = await fetch('/api/accounts' + path, { method: method || 'GET', headers: { 'content-type': 'application/json' }, body: body ? JSON.stringify(body) : undefined, signal: ctl.signal });
    return await r.json();
  } catch (e) { return { ok: false, error: (e && e.name === 'AbortError') ? '出码超时（服务端打开小红书较慢，请重试一次）' : '网络较慢或不稳定，请重试' }; }
  finally { clearTimeout(to); }
}
function statChip(s) { const [t, c] = STAT[s] || STAT.pending; return `<span style="font-size:11px;font-weight:600;color:${c};background:rgba(0,0,0,.04);border-radius:999px;padding:2px 9px">${t}</span>`; }
function row(a) {
  const d = new Date(a.created_at || Date.now());
  return `<div class="flex items-center gap-3 flex-wrap" style="border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:var(--paper-2)" data-id="${a.id}">
    <span style="font-size:13px;font-weight:700;min-width:80px">${PLAT[a.platform] || a.platform}</span>
    <span style="font-size:14px;font-weight:700;flex:1;min-width:120px">${a.nickname || '(未命名)'}</span>
    ${a.grp ? `<span style="font-size:11px;color:var(--ink-soft);background:rgba(165,129,58,.07);border-radius:6px;padding:2px 8px">${a.grp}</span>` : ''}
    ${statChip(a.status)}
    <span style="font-size:11px;color:var(--ink-soft)">${a.health || a.note || ''}</span>
    ${a.has_auth ? `<button class="acc-verify btn-ghost rounded-md px-2.5 py-1 text-[11px]" style="margin-left:auto">🔍 检测登录态</button>` : ''}
    <button class="acc-auth btn-go rounded-md px-2.5 py-1 text-[11px]" ${a.has_auth ? '' : 'style="margin-left:auto"'}>🔗 ${a.has_auth ? '重新接入' : '接入登录态'}</button>
    <select class="acc-stat field rounded-md px-2 py-1 text-[11px]">
      ${Object.keys(STAT).map(k => `<option value="${k}" ${a.status === k ? 'selected' : ''}>${STAT[k][0]}</option>`).join('')}
    </select>
    <button class="acc-del btn-ghost rounded-md px-2.5 py-1 text-[11px]">删除</button>
  </div>`;
}
async function load() {
  const j = await api('');
  const list = (j && j.list) || [];
  $('#cnt').textContent = '共 ' + list.length + ' 个账号';
  if (!list.length) { $('#list').innerHTML = '<div class="card p-8 text-center text-[13px] text-[var(--ink-soft)]">还没有账号。上面添加你的第一个小红书 / 公众号账号。</div>'; return; }
  // 按分组聚合
  const groups = {};
  list.forEach(a => { const g = a.grp || '未分组'; (groups[g] = groups[g] || []).push(a); });
  $('#list').innerHTML = Object.keys(groups).map(g => `
    <div class="card p-4">
      <div class="font-song font-bold text-[14px] mb-3">${g} <span class="text-[11px] text-[var(--ink-soft)] font-normal">· ${groups[g].length} 个</span></div>
      <div class="space-y-2.5">${groups[g].map(row).join('')}</div>
    </div>`).join('');
  bind();
}
function bind() {
  $$('.acc-del').forEach(b => b.addEventListener('click', async e => {
    const id = +e.target.closest('[data-id]').dataset.id;
    if (!await zConfirm('删除这个账号？（仅从矩阵移除，不影响平台账号本身）', { okText: '删除' })) return;
    await api('/delete', 'POST', { id }); load();
  }));
  $$('.acc-stat').forEach(s => s.addEventListener('change', async e => {
    const id = +e.target.closest('[data-id]').dataset.id;
    await api('/update', 'POST', { id, patch: { status: e.target.value } }); load();
  }));
  $$('.acc-auth').forEach(b => b.addEventListener('click', e => openAuthModal(+e.target.closest('[data-id]').dataset.id)));
  $$('.acc-verify').forEach(b => b.addEventListener('click', async e => {
    const id = +e.target.closest('[data-id]').dataset.id; const btn = e.target; const o = btn.textContent;
    btn.disabled = true; btn.textContent = '检测中…（约 20 秒）';
    try { const r = await api('/verify', 'POST', { id }); if (r.ok) zToast('✓ 登录态有效' + (r.nickname ? '（' + r.nickname + '）' : ''), 'ok'); else zAlert('✗ ' + (r.reason || '检测失败'), { title: '登录态检测' }); }
    catch { zToast('检测请求失败', 'err'); }
    btn.disabled = false; btn.textContent = o; load();
  }));
}
let _qrTimer = null;
function openAuthModal(id) {
  const m = document.createElement('div'); m.id = '__authM';
  m.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `<div class="card" style="width:min(480px,94vw);padding:22px;text-align:left;max-height:90vh;overflow:auto">
    <div class="font-song" style="font-weight:800;font-size:16px;margin-bottom:10px;text-align:center">接入小红书登录态</div>
    <!-- 方式 A：Cookie 粘贴（最稳·推荐） -->
    <div style="border:1.5px solid var(--cinnabar);border-radius:12px;padding:13px;margin-bottom:14px">
      <div style="font-size:13.5px;font-weight:700;color:var(--cinnabar-deep);margin-bottom:6px">✅ 方式 A · 粘贴 Cookie（最稳，推荐）</div>
      <div style="font-size:11.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:8px">
        1. <b>自己电脑</b> Chrome 登录小红书（要接的那个号）<br>
        2. 装插件「Cookie-Editor」→ 在小红书页点它 → <b>Export</b>（复制）<br>
        3. 粘到下面 → 点「保存接入」
      </div>
      <textarea id="amCookie" class="field w-full rounded-lg px-3 py-2 text-[12px]" rows="3" style="margin-bottom:8px" placeholder="粘贴 www.xiaohongshu.com 的完整 Cookie（JSON 或 name=value; 都行）"></textarea>
      <button id="amCookieSave" class="btn-go rounded-lg w-full py-2 text-[13px] font-medium">保存接入（推荐）</button>
    </div>
    <!-- 方式 C：本机插件回传（住宅 IP，免机房风控） -->
    <div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">📲 方式 C · 本机插件一键回传（住宅 IP，免风控）</div>
      <div style="font-size:11.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:8px">
        本机 Chrome 已装「朱砂助手」插件、且已登录要接的这个小红书号 → 点下面按钮，插件直接把<b>本机住宅 IP</b> 的登录态回传，绕开机房 IP 风控（无需复制 Cookie）。
      </div>
      <button id="amExtPush" class="btn-ghost rounded-lg w-full py-2 text-[13px] font-medium">📲 用本机插件回传登录态</button>
    </div>
    <!-- 方式 B：扫码（机房 IP 风控大，备选） -->
    <details style="border:1px solid var(--line);border-radius:12px;padding:12px">
      <summary style="cursor:pointer;font-size:13px;font-weight:600">📱 方式 B · 扫码 + 短信（备选，机房 IP 易被风控）</summary>
      <div id="amQrBox" style="min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-top:10px">
        <button id="amQrStart" class="btn-ghost rounded-xl px-6 py-3 text-[14px] font-medium">📷 生成登录二维码</button>
        <span style="font-size:11px;color:var(--ink-soft)">点击后约 10 秒出码</span>
      </div>
    </details>
    <div id="amStatus" style="font-size:12px;min-height:16px;margin:8px 0;text-align:center"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="amCancel" class="btn-ghost rounded-lg px-4 py-2 text-[13px]">关闭</button>
    </div></div>`;
  document.body.appendChild(m);
  const close = () => { if (_qrTimer) { clearInterval(_qrTimer); _qrTimer = null; } m.remove(); };
  m.addEventListener('click', e => { if (e.target === m) close(); });
  m.querySelector('#amCancel').onclick = close;
  m.querySelector('#amExtPush').onclick = () => {
    const st = m.querySelector('#amStatus'); st.style.color = 'var(--ink-soft)'; st.textContent = '正在让本机插件回传登录态…';
    const btn = m.querySelector('#amExtPush'); btn.disabled = true;
    let done = false;
    const onAck = (e) => {
      if (e.source !== window || !e.data || e.data.type !== 'ZHUSHA_SUBMIT_COOKIE_ACK') return;
      done = true; window.removeEventListener('message', onAck); btn.disabled = false;
      if (e.data.ok) { st.style.color = '#00a152'; st.textContent = '✓ 已回传并接入登录态'; setTimeout(() => { close(); load(); }, 900); }
      else { st.style.color = 'var(--cinnabar-deep)'; st.textContent = '✗ ' + (e.data.error || '回传失败：确认已装插件且本机已登录小红书'); }
    };
    window.addEventListener('message', onAck);
    window.postMessage({ type: 'ZHUSHA_SUBMIT_COOKIE', accountId: id }, '*');
    setTimeout(() => { if (!done) { window.removeEventListener('message', onAck); btn.disabled = false; st.style.color = 'var(--cinnabar-deep)'; st.textContent = '✗ 没收到插件响应：请确认已装「朱砂助手」插件并刷新本页(0.9.2+，需重新加载插件)'; } }, 12000);
  };
  m.querySelector('#amQrStart').onclick = async () => {
    const box = m.querySelector('#amQrBox'); const st = m.querySelector('#amStatus');
    box.innerHTML = '<span style="font-size:13px;color:var(--ink-soft)">正在打开小红书登录…（首次较慢，最多约 50 秒，请耐心等）</span>';
    const r = await api('/qr-start', 'POST', {}, 55000);
    if (!r.ok) { box.innerHTML = `<button id="amQrStart2" class="btn-go rounded-xl px-6 py-3 text-[13px]">重试</button>`; st.textContent = '✗ ' + (r.reason || r.error || '出码失败'); st.style.color = 'var(--cinnabar-deep)'; m.querySelector('#amQrStart2').onclick = () => openAuthModal(id) && close(); return; }
    box.innerHTML = `<img src="${r.qr}" style="width:180px;height:180px;object-fit:contain;border:1px solid var(--line);border-radius:10px"/>
      <span style="font-size:12px;color:var(--ink)">① 用小红书 App「我」→ 右上角扫一扫</span>
      <div style="width:100%;border-top:1px dashed var(--line);margin:6px 0 2px;padding-top:10px;text-align:left">
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:6px">② 若需短信验证就填手机号取码（不需要可跳过），最后点③完成：</div>
        <input id="amSmsPhone" class="field w-full rounded-lg px-3 py-2 text-[13px]" style="margin-bottom:8px" placeholder="手机号（小红书账号绑定的）" />
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="amSmsCode" class="field rounded-lg px-3 py-2 text-[13px]" style="flex:1" placeholder="短信验证码（没要求可不填）" />
          <button id="amSmsSend" class="btn-ghost rounded-lg px-3 py-2 text-[12px] whitespace-nowrap">发送验证码</button>
        </div>
        <button id="amSmsOk" class="btn-go rounded-xl w-full py-2.5 text-[13px] font-medium">③ 扫码后点这 · 完成登录</button>
        <div id="amDbg"></div>
      </div>`;
    st.textContent = '等待扫码确认…（扫码后需短信验证就在上面填）'; st.style.color = 'var(--ink-soft)';
    // 手动短信：发送验证码
    let sending = false;
    m.querySelector('#amSmsSend').onclick = async () => {
      if (sending) return; sending = true; const b = m.querySelector('#amSmsSend'); const o = b.textContent; b.textContent = '发送中…';
      const phone = (m.querySelector('#amSmsPhone') || {}).value || '';
      const rr = await api('/qr-sms-send', 'POST', { token: r.token, phone });
      const inf = rr.info || {};
      const dbg = `<div style="font-size:10.5px;color:var(--ink-soft);margin-top:8px;text-align:left;border:1px dashed var(--line);border-radius:8px;padding:8px;background:var(--paper-2)">
        <b style="color:var(--cinnabar-deep)">📋 调试信息（收不到码就截这块发我）</b><br>
        点中按钮：${rr.clicked||'（没点到）'}<br>
        有手机输入框：${inf.phoneInput?'有':'无'} · 有验证码输入框：${inf.codeInput?'有':'无'}<br>
        页面按钮：${(inf.btns||[]).join(' / ')||'（无）'}<br>
        页面文字：${(inf.snippet||'').replace(/</g,'&lt;')}</div>`;
      const dbgBox = m.querySelector('#amDbg'); if (dbgBox) dbgBox.innerHTML = dbg;
      if (rr.ok) { st.textContent = '已点「' + (rr.clicked||'获取验证码') + '」，若没收到短信看下方调试信息'; st.style.color = '#00a152'; let c = 60; b.disabled = true; const t = setInterval(() => { b.textContent = (--c) + 's'; if (c <= 0) { clearInterval(t); b.disabled = false; b.textContent = '重新发送'; } }, 1000); }
      else { st.textContent = '✗ ' + (rr.reason || '发送失败（先扫码再发）'); st.style.color = 'var(--cinnabar-deep)'; b.textContent = o; }
      sending = false;
    };
    // 手动短信：提交验证码登录
    m.querySelector('#amSmsOk').onclick = async () => {
      const code = (m.querySelector('#amSmsCode') || {}).value.trim(); if (!code) { st.textContent = '请填短信验证码'; st.style.color = 'var(--cinnabar-deep)'; return; }
      const b = m.querySelector('#amSmsOk'); b.disabled = true; const o = b.textContent; b.textContent = '验证中…'; st.textContent = '正在登录…';
      const rr = await api('/qr-sms-submit', 'POST', { token: r.token, code, id });
      if (rr.ok) { if (_qrTimer) { clearInterval(_qrTimer); _qrTimer = null; } st.textContent = '✓ 登录成功！'; st.style.color = '#00a152'; setTimeout(() => { close(); load(); }, 800); }
      else { st.textContent = '✗ ' + (rr.reason || '验证失败'); st.style.color = 'var(--cinnabar-deep)'; b.disabled = false; b.textContent = o; }
    };
    let n = 0;
    _qrTimer = setInterval(async () => {
      n++; if (n > 80) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '二维码可能超时，没成功就重新生成'; return; }
      const p = await api('/qr-poll', 'POST', { token: r.token, id });
      if (p.ok) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '✓ 登录成功！'; st.style.color = '#00a152'; setTimeout(() => { close(); load(); }, 800); }
      else if (p.expired) { clearInterval(_qrTimer); _qrTimer = null; st.textContent = '二维码已过期，请重新生成'; st.style.color = 'var(--cinnabar-deep)'; }
      else if (p.scanned) { st.textContent = p.msg || '✓ 已扫码，请完成验证'; st.style.color = '#00a152'; }   // 扫码状态反馈
    }, 2500);
  };
  m.querySelector('#amCookieSave').onclick = async () => {
    const raw = m.querySelector('#amCookie').value.trim(); const st = m.querySelector('#amStatus');
    if (raw.length < 20) { st.textContent = '请粘贴有效 Cookie'; st.style.color = 'var(--cinnabar-deep)'; return; }
    // 兼容 Cookie-Editor 的 JSON 导出：[{name,value,...}] → 转成 name=value; …
    let cookie = raw;
    if (raw[0] === '[' || raw[0] === '{') {
      try { const arr = JSON.parse(raw); const list = Array.isArray(arr) ? arr : (arr.cookies || []); const pairs = list.filter(c => c && c.name).map(c => c.name + '=' + (c.value == null ? '' : c.value)); if (pairs.length) cookie = pairs.join('; '); } catch {}
    }
    const btn = m.querySelector('#amCookieSave'); const o = btn.textContent; btn.disabled = true; btn.textContent = '保存中…';
    // 直接存为已登录接入（机房 IP 上 creator 验证会误判，不拿它拦你；发布与 cookie 同 IP 才是真考验）
    const r = await api('/update', 'POST', { id, patch: { auth_blob: JSON.stringify({ cookie, ts: Date.now() }), status: 'active', health: '✓ Cookie 接入 ' + new Date().toLocaleString('zh-CN') } });
    if (r && r.ok) { st.textContent = '✓ 已接入'; st.style.color = '#00a152'; setTimeout(() => { close(); load(); }, 700); }
    else { st.textContent = '保存失败，请重试'; st.style.color = 'var(--cinnabar-deep)'; btn.disabled = false; btn.textContent = o; }
  };
}
// 扫码后小红书要求短信验证 → 出手机号+验证码输入
function showSms(m, token, id, info) {
  const box = m.querySelector('#amQrBox'); const st = m.querySelector('#amStatus');
  box.innerHTML = `<div style="width:100%;text-align:left">
    <div style="font-size:13px;font-weight:700;margin-bottom:6px">📲 需短信验证（小红书风控）</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-bottom:8px">扫码已确认，小红书要求手机验证。填手机号 → 点「发送验证码」→ 收到后填验证码 → 提交。</div>
    <input id="amSmsPhone" class="field w-full rounded-lg px-3 py-2 text-[13px]" style="margin-bottom:8px" value="${info.phoneVal || ''}" placeholder="手机号（小红书账号绑定的）" />
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="amSmsCode" class="field rounded-lg px-3 py-2 text-[13px]" style="flex:1" placeholder="短信验证码" />
      <button id="amSmsSend" class="btn-ghost rounded-lg px-3 py-2 text-[12px] whitespace-nowrap">发送验证码</button>
    </div>
    <button id="amSmsOk" class="btn-go rounded-xl w-full py-2.5 text-[13px] font-medium">提交验证码登录</button>
    <details style="font-size:10px;color:var(--ink-soft);margin-top:8px"><summary style="cursor:pointer">调试信息（截图发我以校准）</summary>页面文字：${(info.snippet || '').replace(/</g, '&lt;')}<br>按钮：${(info.btns || []).join(' / ')}<br>有手机输入:${info.phoneInput} 有验证码输入:${info.codeInput}</details>`;
  st.textContent = ''; let sending = false;
  m.querySelector('#amSmsSend').onclick = async () => {
    if (sending) return; sending = true; const b = m.querySelector('#amSmsSend'); b.textContent = '发送中…';
    const phone = (m.querySelector('#amSmsPhone') || {}).value || '';
    const r = await api('/qr-sms-send', 'POST', { token, phone });
    if (r.ok) { st.textContent = '✓ 验证码已发送，查收短信'; st.style.color = '#00a152'; let c = 60; b.disabled = true; const t = setInterval(() => { b.textContent = (--c) + 's'; if (c <= 0) { clearInterval(t); b.disabled = false; b.textContent = '重新发送'; } }, 1000); }
    else { st.textContent = '✗ ' + (r.reason || '发送失败'); st.style.color = 'var(--cinnabar-deep)'; b.textContent = '发送验证码'; }
    sending = false;
  };
  m.querySelector('#amSmsOk').onclick = async () => {
    const code = m.querySelector('#amSmsCode').value.trim(); if (!code) { st.textContent = '请填验证码'; st.style.color = 'var(--cinnabar-deep)'; return; }
    const b = m.querySelector('#amSmsOk'); b.disabled = true; b.textContent = '验证中…'; st.textContent = '正在登录…';
    const r = await api('/qr-sms-submit', 'POST', { token, code, id });
    if (r.ok) { st.textContent = '✓ 登录成功！'; st.style.color = '#00a152'; setTimeout(() => { document.getElementById('__authM') && document.getElementById('__authM').remove(); load(); }, 800); }
    else { st.textContent = '✗ ' + (r.reason || '验证失败'); st.style.color = 'var(--cinnabar-deep)'; b.disabled = false; b.textContent = '提交验证码登录'; }
  };
}
$('#addBtn').addEventListener('click', async () => {
  const nickname = $('#fNick').value.trim();
  if (!nickname) { $('#addStatus').textContent = '请填账号昵称'; $('#addStatus').style.color = 'var(--cinnabar-deep)'; return; }
  $('#addBtn').disabled = true;
  await api('', 'POST', { platform: $('#fPlatform').value, nickname, grp: $('#fGroup').value.trim(), note: $('#fNote').value.trim() });
  $('#fNick').value = ''; $('#fNote').value = '';
  $('#addStatus').textContent = '✓ 已添加'; $('#addStatus').style.color = '#00a152';
  $('#addBtn').disabled = false; load();
});
// 赛道矩阵预设：一键铺设 3 个角色号（老号先养号）
(function renderMatrixPreset(){
  const box = document.getElementById('matrixPreset'); if (!box) return;
  let mx = null, tname = ''; try { let t = getTrack(); if (!(t && t.matrix) && window.TRACKS) { for (const id in window.TRACKS) { if (window.TRACKS[id].matrix) { t = window.TRACKS[id]; break; } } } mx = t && t.matrix; tname = t ? t.name : ''; } catch (e) {}
  if (!mx || !mx.accounts || !mx.accounts.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<div class="card p-5">
    <div class="flex items-center justify-between gap-3 mb-1 flex-wrap">
      <div class="font-song font-bold text-[15px]">🎯 一键铺设「${mark(mx.groupName || (tname + '矩阵'))}」</div>
      <div class="flex gap-2">
        <a href="/矩阵起盘.html" class="btn-ghost rounded-lg px-3 py-1.5 text-[12px]" style="text-decoration:none">📖 矩阵起盘 SOP</a>
        <button id="mxAdd" class="btn-go rounded-lg px-4 py-1.5 text-[12px] font-medium">＋ 添加这 3 个号到矩阵</button>
      </div>
    </div>
    <div class="text-[11px] text-[var(--ink-soft)] mb-3">⚠️ 老号先养号：添加后请到「获客计划」给这 3 个号各建一条<b>搜索页·起号养号</b>计划，养 7 天再开始日更。</div>
    <div class="grid sm:grid-cols-3 gap-2.5">${mx.accounts.map(a=>`
      <div class="out p-3 rounded-xl">
        <div class="text-[13px] font-medium" style="color:var(--cinnabar-deep)">${mark(a.role)}</div>
        <div class="text-[12px] mt-1">${mark(a.nick)}</div>
        <div class="text-[11px] text-[var(--ink-soft)] mt-1.5 leading-snug">主打：${mark(a.focus)}</div>
        <div class="text-[11px] text-[var(--ink-soft)] mt-0.5 leading-snug">目标：${mark(a.goal)}</div>
      </div>`).join('')}</div>
    <div id="mxStatus" class="text-[12px] mt-2.5" style="min-height:16px"></div>
  </div>`;
  const btn = box.querySelector('#mxAdd'), st = box.querySelector('#mxStatus');
  btn.addEventListener('click', async () => {
    btn.disabled = true; const old = btn.textContent; let ok = 0;
    for (const a of mx.accounts) {
      btn.textContent = '添加中…' + a.nick;
      const r = await api('', 'POST', { platform: 'xhs', nickname: a.nick, grp: mx.groupName || (tname + '矩阵'), note: a.note || a.role });
      if (r && r.ok) ok++;
    }
    st.textContent = '✓ 已铺设 ' + ok + ' 个号到「' + (mx.groupName || tname) + '」分组（待接入）。下一步：去获客计划给它们建养号计划。';
    st.style.color = '#00a152'; btn.disabled = false; btn.textContent = old; load();
  });
})();
// 一键重置「扫码误标已登录」的号为待接入（不动手动粘贴 cookie 的号）
$('#resetQrBtn')?.addEventListener('click', async () => {
  if (!await zConfirm('把「扫码接入但未真正登录」的号重置为待接入？\n（手动粘贴 cookie 接入的号不受影响，可重新扫码接入）', { okText: '重置' })) return;
  const r = await api('/reset-qr', 'POST', {});
  if (r && r.ok) { zToast(r.reset ? ('✓ 已重置 ' + r.reset + ' 个号为待接入') : '没有需要重置的扫码号', 'ok'); load(); }
  else zToast('重置失败，请重试', 'err');
});
load();
</script>
