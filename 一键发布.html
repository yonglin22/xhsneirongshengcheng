<!DOCTYPE html>
<html lang="zh-CN">

<body class="stage grain min-h-screen" data-page="matrix">
<main class="ag-page">
  <a href="/" class="btn-ghost rounded-lg px-3.5 py-2 text-[13px] inline-flex items-center gap-1.5 mb-4">← 返回工作台</a>
  <div class="mb-5">
    <div class="text-[var(--cinnabar)] text-[11px] tracking-[.26em] font-semibold mb-1">获客 AGENT</div>
    <h1 style="font-size:clamp(26px,3.4vw,40px);font-weight:300;line-height:1.02;letter-spacing:-.02em">🚀 一键<span class="italic" style="color:var(--cinnabar)">发布</span></h1>
    <p class="mt-2 text-[13.5px] text-[var(--ink-soft)] max-w-2xl">选一篇成稿 → 选矩阵里的小红书账号（需已接入登录态）→ 一键推到对应账号<b>草稿箱</b>。终审与「发布」请在小红书 App 内完成（合规）。</p>
  </div>

  <div class="card p-4">
    <div class="font-song font-bold text-[15px] mb-1">选成稿</div>
    <div class="text-[11px] text-[var(--ink-soft)] mb-3">插件会发到你<b>浏览器当前登录的小红书账号</b>（要发哪个号就先在浏览器登哪个；多号在浏览器里切换登录即可）。</div>
    <div id="works" class="space-y-2" style="max-height:380px;overflow:auto"></div>
  </div>

  <div class="card p-4 mt-5">
    <div class="flex items-center gap-3 flex-wrap">
      <button id="extPubBtn" class="rounded-xl px-6 py-3 text-[14px] font-medium" style="background:linear-gradient(180deg,#ffb02e,#ff8a00);color:#fff">🧩 用插件发布到草稿箱（零风控）</button>
      <span id="pubStatus" class="text-[12px] text-[var(--ink-soft)]"></span>
    </div>
    <div id="extHint" class="mt-2 text-[12px]" style="display:none"></div>
    <div id="pubLog" class="mt-3 space-y-1.5"></div>
    <div id="renderHost" style="position:fixed;left:-99999px;top:0"></div>
    <div class="text-[11px] text-[var(--ink-soft)] mt-3 leading-relaxed" style="background:var(--paper-2);border-radius:var(--r-sm);padding:8px 11px">
      ⚠️ 小红书图文草稿需<b>至少 1 张图片</b>。长图笔记卡（CSS）需先在「成稿预览」导出 PNG；含 AI 封面 / 实拍上传图的成稿可直接发。发布为<b>实验功能</b>，依赖账号登录态有效，首次请小批量验证。
    </div>
  </div>
</main>

<script src="/assets/tracks.js?v=16"></script>

<script>
let WORK = null, sel = new Set();
function fmtD(ts){ try{ const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate(); }catch{ return ''; } }
if(typeof window.mark!=='function') window.mark=s=>String(s||'').replace(/==(.+?)==/g,'$1');
function asStr(x){ return typeof x==='string'?x:((x&&(x.text||x.title||x.name||x.desc))||''); }
function imgSrc(u){ u=u||''; return (u.startsWith('data:')||u.startsWith('/')||u.startsWith(location.origin))?u:'/api/img-proxy?u='+encodeURIComponent(u); }
// 叠字封面卡（与流水线/成稿预览一致）：把标题/要点叠在底图上，导出 PNG 时文字一并烤进图
function normalizeCap(cap, coverFallback){ if(!cap) return {title:coverFallback||'',lines:[],layout:'封面',theme:'photo'}; if(typeof cap==='string') return {title:cap,lines:[],layout:'要点',theme:'photo'}; return {title:asStr(cap.title),lines:(Array.isArray(cap.lines)?cap.lines:[]).map(asStr).filter(Boolean),layout:cap.layout||'要点',theme:cap.theme==='poster'?'poster':'photo'}; }
function capTheme(cap){ return (cap && cap.theme==='poster')?'poster':'photo'; }
function capCardHTML(cap, isCover, coverFallback){
  const c=normalizeCap(cap, coverFallback); if(!c.title && !c.lines.length) return '';
  const lay=c.layout||(isCover?'封面':'要点'); const lines=c.lines.filter(Boolean); let body='';
  if(lines.length){ body='<div class="cv-card-b">'+lines.map((s,k)=>{ let s2=s,cls='';
    if(lay==='对比'){ if(/^[✅✓对]/.test(s)||/正解|正确/.test(s)) cls='ok'; else if(/^[❌✗错]/.test(s)||/误区|错误|别/.test(s)) cls='no'; }
    if(lay==='编号'){ s2=s.replace(/^[①-⑩\d\.\、\s]+/,''); return `<div class="cv-li num"><b>${k+1}</b><span>${mark(s2)}</span></div>`; }
    return `<div class="cv-li ${cls}">${mark(s2)}</div>`;
  }).join('')+'</div>'; }
  return `<div class="cv-card theme-${c.theme} ${isCover?'is-cover':''} lay-${lay}">${c.title?`<div class="cv-card-t">${mark(c.title)}</div>`:''}${body}</div>`;
}
// ===== 卡片渲染器（与成稿预览一致，用于把 note:// / ctpl:// CSS 卡转 PNG）=====
function hexA(h,a){ const m=/^#?([0-9a-f]{6})$/i.exec(String(h||'').trim()); if(!m)return 'rgba(255,150,60,'+a+')'; const n=parseInt(m[1],16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
function noteStyleVars(page){ const p=page||{}; const memo=!!p.memo;
  const bg=/^#?[0-9a-f]{6}$/i.test(p.bg||'')?(p.bg[0]==='#'?p.bg:'#'+p.bg):('#ffffff');
  const acc=/^#?[0-9a-f]{6}$/i.test(p.accent||'')?(p.accent[0]==='#'?p.accent:'#'+p.accent):(memo?'#ffb300':'#ff6a3d');
  const hl=/^#?[0-9a-f]{6}$/i.test(p.hl||'')?(p.hl[0]==='#'?p.hl:'#'+p.hl):(memo?'#ffe14d':'#ff8a3d');
  const dark=!!p.dark, ink=dark?'#ffffff':'#16181d', ink2=dark?'rgba(255,255,255,.88)':'#33373d', meta=dark?'rgba(255,255,255,.62)':'#b6bbc2', tag=dark?'rgba(255,255,255,.78)':'#3a5a8c';
  return `--nt-bg:${bg};--nt-ink:${ink};--nt-ink2:${ink2};--nt-meta:${meta};--nt-tag:${tag};--nt-accent:${acc};--nt-hl:${hexA(hl,.42)};--nt-hl-line:${hl}`; }
function olStr(x){ return typeof x==='string'?x:((x&&(x.text||x.content||x.title||x.name||x.desc))||''); }
function noteBlock(b){ if(!b)return''; const t=b.t||'p';
  if(t==='title')return `<div class="nt-h1">${mark(b.text||'')}</div>`;
  if(t==='meta')return `<div class="nt-meta">${mark(b.text||'')}</div>`;
  if(t==='sec')return `<div class="nt-sec"><span class="nt-dot"></span>${mark(b.text||'')}</div>`;
  if(t==='sub')return `<div class="nt-sub">${mark(b.text||'')}</div>`;
  if(t==='ol')return `<ul class="nt-ol">${(b.items||[]).map((x,k)=>`<li><svg class="nt-num" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="#ff6a3d"/><text x="11" y="11.5" fill="#ffffff" font-size="12.5" font-weight="800" text-anchor="middle" dominant-baseline="central">${k+1}</text></svg><span class="nt-tx">${mark(olStr(x))}</span></li>`).join('')}</ul>`;
  if(t==='box')return '<div class="nt-box">'+((b.items||[]).map(function(x){return '<div class="nt-box-li">'+mark(olStr(x))+'</div>';}).join(''))+'</div>';
  if(t==='tags')return '';
  return `<p class="nt-p">${mark(b.text||'')}</p>`; }
function isCoverPage(page){ const b=(page&&page.blocks)||[]; return b.length&&b[0].t==='title'&&b.every(x=>['title','meta','tags'].includes(x.t)); }
function memoDateStr(){ const d=new Date(),h=d.getHours(),ap=h<12?'上午':'下午',h12=h%12||12; return `${d.getMonth()+1}月${d.getDate()}日 ${ap}${h12}:${String(d.getMinutes()).padStart(2,'0')}`; }
const MEMO_STATUS='<div class="nt-ios-status"><span class="nt-clock">9:41</span><span class="nt-stat-r"><svg class="nt-si" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5.5" width="3" height="6.5" rx="1"/><rect x="10" y="3" width="3" height="9" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg class="nt-batpct" viewBox="0 0 17 12"><text x="0.5" y="9.4" font-size="10.6" font-weight="600" fill="#000">100</text></svg><svg class="nt-bat" viewBox="0 0 28 13"><rect x=".6" y=".6" width="22.8" height="11.8" rx="3.4" fill="none" stroke="currentColor" stroke-opacity=".4" stroke-width="1.1"/><rect x="2.2" y="2.2" width="16" height="8.6" rx="1.8"/></svg></span></div>';
const MEMO_NAV='<div class="nt-ios-nav"><svg class="nt-nav-back" viewBox="0 0 88 26" width="88" height="26"><path d="M15 6.5 8.5 13l6.5 6.5" fill="none" stroke="#e8a400" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><text x="21" y="18" font-size="14.5" font-weight="500" fill="#e8a400">备忘录</text></svg><span class="nt-nav-r"><svg class="nt-ny" viewBox="0 0 24 24" fill="none" stroke="#e8a400" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 5.5v4h4"/><path d="M5 9.2A8 8 0 1 1 4 13"/></svg><svg class="nt-ny" viewBox="0 0 24 24" fill="none" stroke="#c4c4c9" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 5.5v4h-4"/><path d="M19 9.2A8 8 0 1 0 20 13"/></svg><svg class="nt-ny" viewBox="0 0 24 24" fill="none" stroke="#e8a400" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2v11.6"/><path d="M8 7l4-4 4 4"/><path d="M6.2 11v8a1.6 1.6 0 0 0 1.6 1.6h8.4a1.6 1.6 0 0 0 1.6-1.6v-8"/></svg><svg class="nt-ny" width="24" height="24" viewBox="0 0 24 24" fill="#e8a400"><circle cx="12" cy="12" r="10.4" fill="none" stroke="#e8a400" stroke-width="1.6"/><circle cx="7.2" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="16.8" cy="12" r="1.5"/></svg></span></div>';
const MEMO_TOOLS='<div class="nt-ios-tools"><svg class="nt-tool" viewBox="0 0 22 22"><rect x="2.5" y="3.5" width="17" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M2.5 8.7h17M2.5 13.5h17M8.7 3.5v15M13.3 3.5v15" stroke="currentColor" stroke-width="1.3"/></svg><svg class="nt-tool" viewBox="0 0 22 22"><rect x="3.5" y="3.5" width="15" height="15" rx="4" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M7 11 9.6 13.6 15 7.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><svg class="nt-tool" viewBox="0 0 28 22"><text x="14" y="16.5" font-size="15" font-weight="700" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" fill="currentColor">Aa</text></svg><svg class="nt-tool" viewBox="0 0 24 22"><rect x="2.5" y="6" width="19" height="12.5" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12.2" r="3.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8.3 6 9.7 3.8h4.6L15.7 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg><svg class="nt-tool acc" viewBox="0 0 22 22"><path d="M14.6 2.8 19.2 7.4 8.5 18.1H4v-4.5L14.6 2.8z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></div>';
const MEMO_BOTTOM='<div class="nt-ios-bottom">'+MEMO_TOOLS+'<div class="nt-home"></div></div>';
function autoEm(s){ return String(s||'').replace(/==(.+?)==/g,'<em>$1</em>').replace(/(?<!<em>)(\d+[%＋+分天]?|「[^」]+」)/g,'<em>$1</em>'); }
function coverTemplateHTML(spec, lines, opt){ opt=opt||{}; const parts=String(spec||'').split('|'); const id=parts[0];
  const adj=[parts[1]?'adj-'+parts[1]:'',parts[2]?'adj-'+parts[2]:'',parts[3]?'tsz-'+parts[3]:''].filter(Boolean).join(' ');
  lines=(lines||[]).filter(Boolean);
  const title=autoEm(lines[0]||''); const sub=(lines.slice(1).join(' ')||'').replace(/==(.+?)==/g,'$1');
  const acc=((parts[5]&&/^[0-9a-f]{6}$/i.test(parts[5]))?('#'+parts[5]):'')||'#ff2442';
  const adjBg=(parts[4]&&/^[0-9a-f]{6}$/i.test(parts[4]))?('#'+parts[4]):'';
  const bg=adjBg||'#ffffff';
  const isDark=(h=>{const m=/^#?([0-9a-f]{6})$/i.exec(h||'');if(!m)return false;const n=parseInt(m[1],16);return (0.299*(n>>16&255)+0.587*(n>>8&255)+0.114*(n&255))<110;})(bg);
  const ink=isDark?'#ffffff':'#16181d';
  const vars=`--c-bg:${bg};--c-ink:${ink};--c-accent:${acc}`;
  const tt=`<div class="ct-t">${title}</div>`, ss=sub?`<div class="ct-s">${sub}</div>`:'';
  let inner;
  if(id==='memo') return `<div class="cv-note is-memo" style="--nt-bg:${bg};--nt-hl:rgba(255,221,77,.75)">${MEMO_STATUS}${MEMO_NAV}<div class="cv-note-fit"><div class="nt-h1">${title}</div>${sub?`<div class="nt-p">${sub}</div>`:''}</div>${MEMO_BOTTOM}</div>`;
  if(id==='mag') inner=`<div class="ct-kicker"><span>FEATURE</span><span>VOL.01</span></div>${tt}${ss}<div class="ct-foot">朱砂·操盘台</div>`;
  else if(id==='block') inner=`<div class="ct-block">${tt}</div>${ss}`;
  else if(id==='split') inner=`<div class="ct-img"></div><div class="ct-cap">${tt}${ss}</div>`;
  else if(id==='grid') inner=`<div class="ct-kicker"><span>VERTICAL</span><span>NO.01</span></div>${tt}${ss}`;
  else if(id==='clash') inner=`<div class="ct-top">${tt}</div>${ss}`;
  else if(id==='frame') inner=`<div class="ct-corner tl"></div><div class="ct-corner tr"></div><div class="ct-corner bl"></div><div class="ct-corner br"></div>${tt}${ss}`;
  else if(id==='ribbon') inner=`<div class="ct-ribbon">${memoDateStr().split(' ')[0]}</div>${tt}${ss}`;
  else if(id==='stamp') inner=`<div class="ct-stamp">精选</div>${tt}${ss}<div class="ct-foot">朱砂·操盘台 · NO.01</div>`;
  else if(id==='ticket') inner=`<div class="ct-tkhead"><span>BOARDING</span><span>VIP</span></div>${tt}${ss}<div class="ct-tkhole"></div>`;
  else if(id==='neon') inner=`${tt}${ss}`;
  else if(id==='paper') inner=`<div class="ct-papertape"></div>${tt}${ss}`;
  else inner=`${tt}${ss}`;
  return `<div class="cv-ctpl ctpl-${id} ${adj}" style="${vars}">${inner}</div>`;
}
function noteCardHTML(page){ const cover=isCoverPage(page); const memo=!!(page&&page.memo); const inner=((page&&page.blocks)||[]).map(noteBlock).join(''); if(memo){ const nav = MEMO_NAV; const top='<div class="nt-ios-top">'+MEMO_STATUS+nav+'</div>'; return `<div class="cv-note is-memo" style="${noteStyleVars(page)}">${top}<div class="cv-note-fit">${inner}</div>${MEMO_BOTTOM}</div>`; } return `<div class="cv-note${cover?' is-cover':''}" style="${noteStyleVars(page)}">${cover?inner:`<div class="cv-note-fit">${inner}</div>`}</div>`; }
function fitNote(noteEl){ const fit=noteEl.querySelector('.cv-note-fit'); if(!fit) return; fit.style.transform=''; fit.style.width='100%'; const cs=getComputedStyle(noteEl); const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom); const avail=noteEl.clientHeight-padV; const need=fit.scrollHeight; if(need>avail+1&&avail>0){ const s=Math.max(0.45, avail/need); fit.style.transform='scale('+s+')'; fit.style.width=(100/s)+'%'; } }
// note:// / ctpl:// → PNG（html2canvas）；http → 原样
async function renderCardsToPng(coverImages, notePages, coverLines, imgRatio, coverCaptions, coverFallback){
  const host=$('#renderHost'); const out=[]; const caps=coverCaptions||[]; let i=-1;
  const W=540, H=Math.round(W*({'2:3':3/2,'3:4':4/3,'9:16':16/9}[imgRatio||'3:4']||4/3)); // 画框高度随出图比例（发布/下载尺寸正确）
  const shot=async(html)=>{ host.innerHTML='<div class="cv-frame" style="width:'+W+'px;height:'+H+'px">'+html+'</div>';
    const noteEl=host.querySelector('.cv-note:not(.is-cover)'); if(noteEl) fitNote(noteEl);
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch{}
    // 等底图加载完，否则截到空白
    const im=host.querySelector('img'); if(im && !im.complete){ try{ await new Promise(r=>{im.onload=im.onerror=r;}); }catch{} }
    const cv=await html2canvas(host.querySelector('.cv-frame'),{scale:2,backgroundColor:'#ffffff',useCORS:true,width:W,height:H});
    return cv.toDataURL('image/jpeg',0.92); };
  for(const u of (coverImages||[])){ i++;
    const cap=caps[i];
    // 真图/AI 封面(http、data、同源 /gen)：若带叠字封面卡(非 raw 实拍)，把"底图+标题叠层"一起烤进 PNG，发布后才有封面样式；否则原样推链接
    if(/^https?:\/\//.test(u) || (u||'').startsWith('data:') || (u||'').startsWith('/')){
      const abs=(u||'').startsWith('/')?(location.origin+u):u;
      if(cap && !cap.raw && (asStr(cap.title) || (Array.isArray(cap.lines)&&cap.lines.length))){
        const overlay=(capTheme(cap)==='poster'?'':'<div class="cv-scrim"></div>')+capCardHTML(cap, i===0, coverFallback);
        out.push(await shot('<img src="'+imgSrc(u)+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"/>'+overlay));
      } else { out.push(abs); }
      continue;
    }
    let html='';
    if((u||'').startsWith('note://')) html=noteCardHTML((notePages||[])[+u.slice(7)]);
    else if((u||'').startsWith('ctpl://')) html=coverTemplateHTML(u.slice(7), coverLines);
    else continue;
    out.push(await shot(html));
  }
  host.innerHTML='';
  return out;
}
// 插件检测
let EXT_READY=false;
window.addEventListener('message', e=>{ if(e.source===window && e.data && e.data.__zhusha_ext==='ready'){ EXT_READY=true; const h=$('#extHint'); if(h){ h.style.display='block'; h.style.color='#00a152'; h.textContent='✓ 检测到发布插件（v'+(e.data.v||'')+'）'; } } });
window.postMessage({ type:'ZHUSHA_EXT_PING' }, '*');
setTimeout(()=>{ if(!EXT_READY){ const h=$('#extHint'); if(h){ h.style.display='block'; h.style.color='var(--ink-soft)'; h.innerHTML='⚠ 未检测到发布插件。请先安装：Chrome → chrome://extensions → 开发者模式 → 加载已解压扩展（extension 文件夹）。装好刷新本页。'; } } }, 1500);
$('#extPubBtn').addEventListener('click', async ()=>{
  if(!WORK){ $('#pubStatus').textContent='请先选一篇成稿'; $('#pubStatus').style.color='var(--cinnabar-deep)'; return; }
  if(!EXT_READY){ $('#pubStatus').textContent='没装发布插件，见下方安装说明'; $('#pubStatus').style.color='var(--cinnabar-deep)'; return; }
  const btn=$('#extPubBtn'); btn.disabled=true; const o=btn.textContent; btn.textContent='转图中…';
  $('#pubStatus').textContent='正在把封面/卡片转成图片…'; $('#pubStatus').style.color='var(--ink-soft)';
  try{
    const images=await renderCardsToPng(WORK.coverImages, WORK.notePages, WORK.coverLines, WORK.imgRatio, WORK.coverCaptions, WORK.coverFallback);
    if(!images.length){ $('#pubStatus').textContent='这篇没有可发布的图片'; $('#pubStatus').style.color='var(--cinnabar-deep)'; btn.disabled=false; btn.textContent=o; return; }
    btn.textContent='发送给插件…';
    window.postMessage({ type:'ZHUSHA_PUBLISH', payload:{ title:WORK.title, body:WORK.body, images, tags:WORK.tags||[] } }, '*');
    $('#pubStatus').textContent='✓ 已发给插件，正在打开小红书创作页自动填充（用你当前登录的小红书账号）…'; $('#pubStatus').style.color='#00a152';
  }catch(e){ $('#pubStatus').textContent='转图失败：'+(e.message||e); $('#pubStatus').style.color='var(--cinnabar-deep)'; }
  btn.disabled=false; btn.textContent=o;
});
window.addEventListener('message', e=>{ if(e.source===window && e.data && e.data.type==='ZHUSHA_PUBLISH_ACK'){ $('#pubStatus').textContent=(e.data.ok?'✓ ':'✗ ')+(e.data.msg||''); $('#pubStatus').style.color=e.data.ok?'#00a152':'var(--cinnabar-deep)'; } });
// 把一篇成稿数据装进 WORK（草稿/云端历史共用）
function buildWORK(data, id){
  const raw=(data.coverImages||(data.coverImage?[data.coverImage]:[])).filter(Boolean);
  return { id, title:(data.titles&&data.titles[0])||((data.cover&&(data.cover.cover_lines||[]).join(' '))||data.topic||''), body:(data.body||[]).join('\n\n'), coverImages:raw, notePages:data.notePages||[], coverLines:(data.cover&&data.cover.cover_lines)||[], imgRatio:data.imgRatio||'3:4', coverCaptions:data.coverCaptions||[], coverFallback:((data.cover&&data.cover.cover_lines)||[]).filter(Boolean).join(' '), tags:(data.tags||[]).map(t=>String(t||'').trim().replace(/^#/,'')).filter(Boolean) };
}
function loadDraft(){ try{ return JSON.parse(localStorage.getItem('ag_draft')||'{}'); }catch{ return {}; } }
async function loadWorks(){
  const j = await (await fetch('/api/history')).json();
  const list = ((j&&j.list)||[]).filter(w=>w.platform!=='gzh'); // 发布到小红书草稿箱，仅列小红书成稿
  // 本地草稿 = 刚在「创作流水线」编辑/出图的这篇（同步写入，永远最新；云端历史可能因防抖/未刷新而滞后，导致少图）
  const draft = loadDraft();
  const draftImgs = (draft.coverImages||(draft.coverImage?[draft.coverImage]:[])).filter(Boolean).length;
  const draftHtml = draftImgs ? `
    <label class="flex items-center gap-2.5" style="border:1.5px solid var(--cinnabar);border-radius:10px;padding:9px 11px;cursor:pointer;background:rgba(255,36,66,.04)" data-id="__draft__">
      <input type="radio" name="wk" value="__draft__" checked style="width:15px;height:15px"/>
      <span style="flex:1;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 当前编辑中这篇（最新 · ${draftImgs} 张图）${(draft.topic||'').trim()?'：'+(draft.topic||'').trim().replace(/</g,'&lt;'):''}</span>
      <span style="font-size:10px;color:#fff;background:var(--cinnabar);border-radius:6px;padding:1px 6px">推荐</span>
    </label>` : '';
  $('#works').innerHTML = draftHtml + (list.length ? list.map(w=>`
    <label class="flex items-center gap-2.5" style="border:1px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer" data-id="${w.id}">
      <input type="radio" name="wk" value="${w.id}" style="width:15px;height:15px"/>
      <span style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(w.topic||'（未命名）').replace(/</g,'&lt;')}</span>
      <span style="font-size:10px;color:#fff;background:${w.platform==='gzh'?'#07c160':'#ff2442'};border-radius:6px;padding:1px 6px">${w.platform==='gzh'?'公众号':'小红书'}</span>
      <span style="font-size:11px;color:var(--ink-soft)">${fmtD(w.ts)}</span>
    </label>`).join('') : (draftHtml?'':'<div class="text-[13px] text-[var(--ink-soft)] text-center py-6">还没有成稿，先去创作流水线生成。</div>'));
  function setStatus(WORK){
    const n=(WORK.coverImages||[]).filter(u=>/^https?:\/\//.test(u)||/^\//.test(u)||/^(note|ctpl):\/\//.test(u)).length;
    $('#pubStatus').textContent = `✓ 已选「${(WORK.title||'').slice(0,16)}」· 共 ${n} 张图（CSS 卡发布时自动转 PNG）`;
    $('#pubStatus').style.color = n? '#00a152':'var(--cinnabar-deep)';
  }
  $$('#works input[name=wk]').forEach(r=>r.addEventListener('change', async e=>{
    const id=e.target.value; WORK=null;
    if(id==='__draft__'){ WORK=buildWORK(loadDraft(), '__draft__'); setStatus(WORK); return; }
    $('#pubStatus').textContent='读取成稿…'; $('#pubStatus').style.color='var(--ink-soft)';
    const t0=Date.now(); const tk=setInterval(()=>{ if(!WORK) $('#pubStatus').textContent='读取成稿…（'+Math.round((Date.now()-t0)/1000)+'s，数据较大请稍候）'; },1500);
    try{
      const resp=await fetch('/api/history/get?light=1&id='+encodeURIComponent(id),{ signal:AbortSignal.timeout(30000) });
      const d=await resp.json(); clearInterval(tk);
      const data=(d&&d.data)||d||{};
      WORK=buildWORK(data, id); setStatus(WORK);
    }catch(err){ clearInterval(tk); $('#pubStatus').textContent='读取成稿失败：'+((err&&err.name==='TimeoutError')?'超时（数据过大），请重试或换一篇':(err.message||err)); $('#pubStatus').style.color='var(--cinnabar-deep)'; }
  }));
  // 默认选中本地草稿这篇（最新、图最全），免得用户误发到滞后的云端旧版
  if(draftImgs){ WORK=buildWORK(loadDraft(), '__draft__'); setStatus(WORK); }
}
loadWorks();
</script>
</body>
</html>
