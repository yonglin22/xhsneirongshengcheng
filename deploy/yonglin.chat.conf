# Nginx 站点配置：放 /etc/nginx/conf.d/yonglin.chat.conf（或 sites-available 软链）
# 证书最简方案：先只保留 80 段 → 装 certbot 自动签发：
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yonglin.chat -d www.yonglin.chat
# certbot 会自动补全下面的 443 ssl 配置；或按下面手动填证书路径。

server {
    listen 80;
    server_name yonglin.chat www.yonglin.chat;
    # 上线后强制跳 HTTPS（certbot 也会自动加）
    return 301 https://yonglin.chat$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yonglin.chat www.yonglin.chat;

    # —— SSL 证书（certbot 自动填，或手动改成你的路径）——
    ssl_certificate     /etc/letsencrypt/live/yonglin.chat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yonglin.chat/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 图片上传放行 + gzip
    client_max_body_size 30m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # 本地静态资源（tailwind/qrcode/html2canvas/jszip/图片）适度缓存
    location /assets/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;   # 验证码限流取真实IP
        proxy_set_header X-Forwarded-Proto $scheme;                    # 配合 COOKIE_SECURE
        proxy_read_timeout 120s;                                       # AI 生成较慢，给足超时
        proxy_send_timeout 120s;
    }
}
